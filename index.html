<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>NTA Bot</title>

  <!-- PWA Meta Tags -->
  <meta name="description" content="NTA employee curriculum lookup with citations.">
  <meta name="theme-color" content="#4a7c59">
  <meta name="mobile-web-app-capable" content="yes">

  <!-- iOS PWA Meta Tags -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="NTA Bot">
  <meta name="format-detection" content="telephone=no">

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">

  <!-- Favicons and App Icons -->
  <link rel="icon" type="image/png" sizes="32x32" href="assets/icons/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="assets/icons/favicon-16.png">
  <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png">
  <link rel="apple-touch-icon" sizes="152x152" href="assets/icons/icon-152.png">
  <link rel="apple-touch-icon" sizes="167x167" href="assets/icons/icon-167.png">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/icons/icon-180.png">

  <!-- iOS Splash Screens (basic) -->
  <link rel="apple-touch-startup-image" href="assets/icons/icon-512.png">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ===== CSS RESET & BASE ===== */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* ===== CSS VARIABLES - NTA EARTH TONE DARK THEME ===== */
    :root {
      --bg-primary: #2d2d2d;
      --bg-secondary: #3d3d3d;
      --bg-chat: #2d2d2d;
      --bg-card: #454545;
      --bg-input: #525252;
      --bg-user-msg: linear-gradient(135deg, #4a7c59 0%, #3d6b4a 100%);
      --bg-bot-msg: #3d3d3d;
      --bg-source: #454545;
      --bg-source-expanded: #525252;
      --text-primary: #ffffff;
      --text-secondary: #b0b0b0;
      --text-muted: #888888;
      --text-on-accent: #ffffff;
      --accent: #4a7c59;
      --accent-hover: #5d9070;
      --accent-subtle: rgba(74, 124, 89, 0.15);
      --border: #555555;
      --border-focus: #4a7c59;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.2);
      --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.3);
      --shadow-lg: 0 10px 25px -5px rgba(0,0,0,0.4);
      --confidence-high: #4ade80;
      --confidence-medium: #fbbf24;
      --confidence-low: #f87171;
      --radius-sm: 0.375rem;
      --radius-md: 0.5rem;
      --radius-lg: 0.75rem;
      --radius-xl: 1rem;
      --radius-pill: 25px;
      --transition: 200ms ease;
    }

    /* ===== LIGHT THEME OVERRIDE ===== */
    [data-theme="light"] {
      --bg-primary: #f5f5f0;
      --bg-secondary: #ffffff;
      --bg-chat: #f5f5f0;
      --bg-card: #ffffff;
      --bg-input: #ffffff;
      --bg-user-msg: linear-gradient(135deg, #4a7c59 0%, #3d6b4a 100%);
      --bg-bot-msg: #ffffff;
      --bg-source: #f0f0eb;
      --bg-source-expanded: #e5e5de;
      --text-primary: #1a1a1a;
      --text-secondary: #4a4a4a;
      --text-muted: #777777;
      --text-on-accent: #ffffff;
      --accent: #4a7c59;
      --accent-hover: #3d6b4a;
      --accent-subtle: rgba(74, 124, 89, 0.1);
      --border: #d5d5cc;
      --border-focus: #4a7c59;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
      --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1);
      --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.1);
      --confidence-high: #16a34a;
      --confidence-medium: #ca8a04;
      --confidence-low: #dc2626;
    }

    /* ===== SCREEN READER ONLY ===== */
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    /* ===== TYPOGRAPHY ===== */
    body {
      font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 15px;
      line-height: 1.6;
      color: var(--text-primary);
      background: var(--bg-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ===== LAYOUT ===== */
    .app-container {
      max-width: 900px;
      width: 100%;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      height: 100vh;
      background: var(--bg-secondary);
      box-shadow: var(--shadow-lg);
    }

    @media (min-width: 768px) {
      .app-container {
        margin: 1rem auto;
        height: calc(100vh - 2rem);
        border-radius: var(--radius-xl);
        overflow: hidden;
      }
    }

    /* ===== ACCESS GATE ===== */
    .access-gate {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 20000;
      background: #2d2d2d;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .access-gate.hidden {
      display: none;
    }

    .access-gate-card {
      background: #3d3d3d;
      border-radius: var(--radius-xl);
      padding: 2.5rem 2rem;
      max-width: 400px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
      animation: welcomeFadeIn 0.5s ease;
    }

    .access-gate-icon {
      font-size: 3rem;
      margin-bottom: 1rem;
    }

    .access-gate h2 {
      font-size: 1.375rem;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 0.5rem;
    }

    .access-gate p {
      font-size: 0.875rem;
      color: #b0b0b0;
      margin-bottom: 1.5rem;
      line-height: 1.5;
    }

    .access-gate-input {
      width: 100%;
      padding: 0.875rem 1.25rem;
      border: 1px solid #555555;
      border-radius: var(--radius-pill);
      background: #525252;
      color: #ffffff;
      font-size: 1rem;
      font-family: inherit;
      text-align: center;
      letter-spacing: 0.1em;
      outline: none;
      transition: all 0.2s ease;
      margin-bottom: 1rem;
    }

    .access-gate-input:focus {
      border-color: #4a7c59;
      box-shadow: 0 0 0 3px rgba(74, 124, 89, 0.3);
    }

    .access-gate-input::placeholder {
      color: #888888;
      letter-spacing: normal;
    }

    .access-gate-btn {
      width: 100%;
      padding: 0.875rem;
      background: #4a7c59;
      color: white;
      border: none;
      border-radius: var(--radius-pill);
      font-size: 1rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .access-gate-btn:hover {
      background: #5d9070;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(74, 124, 89, 0.3);
    }

    .access-gate-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .access-gate-error {
      color: #f87171;
      font-size: 0.8125rem;
      margin-top: 0.75rem;
      display: none;
    }

    .access-gate-error.visible {
      display: block;
    }

    /* ===== HEADER (removed — logo is in welcome hero) ===== */

    .header-actions {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .theme-toggle {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: var(--radius-pill);
      padding: 0.5rem;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .theme-toggle:hover {
      border-color: var(--accent);
      background: var(--accent-subtle);
    }

    .theme-toggle svg {
      width: 18px;
      height: 18px;
      color: var(--text-secondary);
    }

    .theme-toggle:hover svg {
      color: var(--accent);
    }

    /* Dark theme is default, so show moon by default */
    .theme-toggle .sun { display: block; }
    .theme-toggle .moon { display: none; }
    [data-theme="light"] .theme-toggle .sun { display: none; }
    [data-theme="light"] .theme-toggle .moon { display: block; }

    /* ===== CHAT AREA ===== */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      background: var(--bg-chat);
    }

    /* ===== MESSAGES ===== */
    .message {
      max-width: 85%;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message-user {
      align-self: flex-end;
    }

    .message-bot {
      align-self: flex-start;
    }

    .message-content {
      padding: 0.875rem 1rem;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
    }

    .message-user .message-content {
      background: var(--bg-user-msg);
      color: var(--text-on-accent);
      border-bottom-right-radius: var(--radius-sm);
      box-shadow: var(--shadow-md);
    }

    .message-bot .message-content {
      background: var(--bg-bot-msg);
      color: var(--text-primary);
      border-bottom-left-radius: var(--radius-sm);
      border: 1px solid var(--border);
    }

    .message-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.5rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .message-sender {
      font-weight: 600;
      font-size: 0.875rem;
      color: var(--accent);
    }

    /* ===== CONFIDENCE BADGE ===== */
    .confidence-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.375rem;
      font-size: 0.75rem;
      font-weight: 500;
      padding: 0.25rem 0.5rem;
      border-radius: var(--radius-sm);
      background: var(--bg-source);
      cursor: pointer;
      position: relative;
      transition: var(--transition);
    }

    .confidence-badge:hover {
      opacity: 0.8;
    }

    .confidence-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .confidence-high .confidence-dot { background: var(--confidence-high); }
    .confidence-medium .confidence-dot { background: var(--confidence-medium); }
    .confidence-low .confidence-dot { background: var(--confidence-low); }

    .confidence-high { color: var(--confidence-high); }
    .confidence-medium { color: var(--confidence-medium); }
    .confidence-low { color: var(--confidence-low); }

    .confidence-tooltip {
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      width: 280px;
      padding: 0.75rem;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-lg);
      font-size: 0.8125rem;
      font-weight: 400;
      color: var(--text-secondary);
      line-height: 1.5;
      z-index: 100;
      display: none;
      animation: tooltipFadeIn 0.15s ease;
    }

    .confidence-tooltip::before {
      content: '';
      position: absolute;
      top: -6px;
      right: 16px;
      width: 10px;
      height: 10px;
      background: var(--bg-secondary);
      border-left: 1px solid var(--border);
      border-top: 1px solid var(--border);
      transform: rotate(45deg);
    }

    .confidence-badge.tooltip-open .confidence-tooltip {
      display: block;
    }

    @keyframes tooltipFadeIn {
      from { opacity: 0; transform: translateY(-4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ===== MESSAGE HEADER ACTIONS ===== */
    .message-header-left {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .message-header-right {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .copy-btn {
      background: transparent;
      border: none;
      padding: 0.25rem;
      cursor: pointer;
      color: var(--text-muted);
      border-radius: var(--radius-sm);
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .copy-btn:hover {
      color: var(--text-secondary);
      background: var(--bg-source);
    }

    .copy-btn svg {
      width: 14px;
      height: 14px;
    }

    .copy-btn.copied {
      color: var(--confidence-high);
    }

    /* ===== SPEAK BUTTON & WAVEFORM ===== */
    .speak-btn {
      background: transparent;
      border: none;
      padding: 0.25rem;
      cursor: pointer;
      color: var(--text-muted);
      border-radius: var(--radius-sm);
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .speak-btn:hover {
      color: var(--text-secondary);
      background: var(--bg-source);
    }

    .speak-btn .speaker-icon {
      width: 14px;
      height: 14px;
    }

    .speak-btn .waveform {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 2px;
      height: 14px;
    }

    .speak-btn.speaking .speaker-icon {
      display: none;
    }

    .speak-btn.speaking .waveform {
      display: flex;
    }

    .speak-btn.speaking {
      color: var(--accent);
    }

    .waveform span {
      display: block;
      width: 2px;
      height: 4px;
      background: currentColor;
      border-radius: 1px;
      animation: waveform-bar 0.8s ease-in-out infinite;
    }

    .waveform span:nth-child(1) { animation-delay: 0s; }
    .waveform span:nth-child(2) { animation-delay: 0.1s; }
    .waveform span:nth-child(3) { animation-delay: 0.2s; }
    .waveform span:nth-child(4) { animation-delay: 0.3s; }
    .waveform span:nth-child(5) { animation-delay: 0.4s; }

    @keyframes waveform-bar {
      0%, 100% { height: 4px; }
      50% { height: 14px; }
    }

    .speak-btn.loading {
      color: var(--accent);
      pointer-events: none;
    }

    .speak-btn.loading .speaker-icon {
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* Tap to play state - shows when autoplay is blocked on mobile */
    .speak-btn.tap-to-play {
      color: #f59e0b;
      animation: tap-pulse 1s ease-in-out infinite;
      pointer-events: auto;
    }

    .speak-btn.tap-to-play .speaker-icon {
      animation: none;
    }

    @keyframes tap-pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.2); }
    }

    /* ===== ANSWER SECTION ===== */
    .answer-section {
      margin-bottom: 0.75rem;
    }

    .answer-label {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.375rem;
    }

    .answer-text {
      line-height: 1.7;
      color: var(--text-primary);
    }

    .answer-text p {
      margin-bottom: 0.5rem;
    }

    .answer-text p:last-child {
      margin-bottom: 0;
    }

    /* ===== SOURCES & REQUIREMENTS SECTION ===== */
    .sources-section {
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
    }

    .sources-title {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* ===== SOURCE ITEM WITH REQUIREMENTS ===== */
    .source-item {
      background: var(--bg-source);
      border-radius: var(--radius-md);
      margin-bottom: 0.625rem;
      overflow: hidden;
      transition: all 0.2s ease;
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
    }

    .source-item:hover {
      border-color: var(--accent);
      box-shadow: var(--shadow-sm);
    }

    .source-item:last-child {
      margin-bottom: 0;
    }

    .source-header {
      display: flex;
      align-items: flex-start;
      gap: 0.5rem;
      padding: 0.75rem;
    }

    .source-info {
      flex: 1;
      min-width: 0;
    }

    .source-path {
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--text-primary);
      margin-bottom: 0.125rem;
      line-height: 1.4;
    }

    .source-meta {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    /* ===== AUTHORITY BADGE ===== */
    .authority-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
      font-size: 0.625rem;
      font-weight: 600;
      padding: 0.125rem 0.5rem;
      border-radius: var(--radius-sm);
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .authority-binding {
      background: var(--accent-subtle);
      color: var(--accent);
    }

    .authority-guidance {
      background: rgba(136, 136, 136, 0.15);
      color: var(--text-muted);
    }

    /* ===== SOURCE REQUIREMENTS ===== */
    .source-requirements {
      padding: 0.5rem 0.75rem 0.75rem 1rem;
      border-left: 3px solid var(--accent);
      margin: 0 0.75rem 0.5rem 0.75rem;
      background: var(--accent-subtle);
      border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    }

    .requirements-label {
      font-size: 0.6875rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
    }

    .source-requirements ul {
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .source-requirements li {
      position: relative;
      padding-left: 1rem;
      margin-bottom: 0.375rem;
      font-size: 0.8125rem;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    .source-requirements li:last-child {
      margin-bottom: 0;
    }

    .source-requirements li::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0.5rem;
      width: 5px;
      height: 5px;
      background: var(--accent);
      border-radius: 50%;
    }

    /* ===== VIEW SOURCE LINK ===== */
    .view-source-link {
      display: inline-flex;
      align-items: center;
      gap: 0.375rem;
      padding: 0.375rem 0.75rem;
      margin: 0 0.75rem 0.75rem 0.75rem;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: var(--radius-pill);
      cursor: pointer;
      color: var(--text-muted);
      font-size: 0.6875rem;
      font-family: inherit;
      transition: all 0.2s ease;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      font-weight: 500;
    }

    .view-source-link:hover {
      color: var(--accent);
      border-color: var(--accent);
      background: var(--accent-subtle);
    }

    .view-source-link svg {
      width: 12px;
      height: 12px;
    }

    .source-actions {
      display: flex;
      gap: 0.5rem;
      padding: 0 0.75rem 0.75rem 0.75rem;
    }

    .source-actions .view-source-link {
      margin: 0;
    }

    .source-url-link {
      text-decoration: none;
      color: var(--accent);
      border-color: var(--accent);
    }

    .source-url-link:hover {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--text-on-accent);
    }

    .page-badge {
      font-size: 0.6875rem;
      color: var(--text-muted);
      background: var(--bg-source);
      padding: 0.125rem 0.5rem;
      border-radius: var(--radius-sm);
      font-weight: 500;
    }

    /* ===== SOURCE MODAL ===== */
    .source-modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.6);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      animation: fadeIn 0.15s ease;
    }

    .source-modal-overlay.active {
      display: flex;
    }

    .source-modal {
      background: var(--bg-primary);
      border-radius: var(--radius-lg);
      max-width: 700px;
      width: 100%;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      animation: slideUp 0.2s ease;
    }

    .source-modal-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    .source-modal-title {
      font-size: 0.9375rem;
      font-weight: 600;
      color: var(--text-primary);
      line-height: 1.4;
    }

    .source-modal-close {
      background: none;
      border: none;
      padding: 0.25rem;
      cursor: pointer;
      color: var(--text-muted);
      transition: var(--transition);
      flex-shrink: 0;
    }

    .source-modal-close:hover {
      color: var(--text-primary);
    }

    .source-modal-close svg {
      width: 20px;
      height: 20px;
    }

    .source-modal-body {
      padding: 1.5rem;
      overflow-y: auto;
      font-size: 0.875rem;
      line-height: 1.7;
      color: var(--text-secondary);
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes slideDown {
      from { opacity: 0; max-height: 0; }
      to { opacity: 1; max-height: 200px; }
    }

    /* ===== MESSAGE BODY ===== */
    .message-body {
      line-height: 1.7;
    }

    .message-body p {
      margin-bottom: 0.75rem;
    }

    .message-body p:last-child {
      margin-bottom: 0;
    }

    .message-body strong {
      font-weight: 600;
    }

    .message-body ul, .message-body ol {
      margin: 0.5rem 0 0.75rem 1.25rem;
    }

    .message-body li {
      margin-bottom: 0.25rem;
    }

    /* ===== WELCOME PANEL ===== */
    .welcome-panel {
      max-width: 800px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
      animation: welcomeFadeIn 0.5s ease;
    }

    @keyframes welcomeFadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Hero Section */
    .welcome-hero {
      text-align: center;
      margin-bottom: 2rem;
      animation: welcomeFadeIn 0.5s ease;
      position: relative;
    }

    .welcome-logo {
      width: 240px;
      height: auto;
      margin: 0 auto 1.25rem;
      display: block;
      cursor: pointer;
    }

    .welcome-theme-toggle {
      position: absolute;
      top: 0;
      right: 0;
    }

    .welcome-hero h2 {
      font-size: 1.375rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 0.5rem;
      letter-spacing: -0.01em;
    }

    .welcome-tagline {
      font-size: 0.875rem;
      color: var(--text-secondary);
      max-width: 520px;
      margin: 0 auto;
      line-height: 1.6;
    }

    /* Stacked Sections */
    .welcome-section {
      background: var(--bg-card);
      border-radius: var(--radius-lg);
      padding: 1.25rem;
      margin-bottom: 1rem;
      animation: welcomeFadeIn 0.5s ease 0.15s both;
    }

    .welcome-section:last-of-type {
      margin-bottom: 0;
    }

    .welcome-section h3 {
      font-size: 0.6875rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.75rem;
    }

    /* ===== COVERAGE CARDS ===== */
    .coverage-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.625rem;
    }

    @media (max-width: 560px) {
      .coverage-grid {
        grid-template-columns: 1fr;
      }
    }

    .coverage-card {
      background: var(--bg-source);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 0.75rem;
      animation: welcomeFadeIn 0.4s ease both;
    }

    .coverage-card:nth-child(1) { animation-delay: 0.15s; }
    .coverage-card:nth-child(2) { animation-delay: 0.2s; }
    .coverage-card:nth-child(3) { animation-delay: 0.25s; }
    .coverage-card:nth-child(4) { animation-delay: 0.3s; }

    .coverage-card-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.375rem;
    }

    .coverage-card-title {
      font-size: 0.8125rem;
      font-weight: 600;
      color: var(--text-primary);
    }

    .coverage-card-desc {
      font-size: 0.75rem;
      color: var(--text-muted);
      line-height: 1.5;
      margin: 0;
    }

    .coverage-badge {
      font-size: 0.5625rem;
      font-weight: 700;
      padding: 0.125rem 0.375rem;
      border-radius: var(--radius-sm);
      text-transform: uppercase;
      letter-spacing: 0.03em;
      flex-shrink: 0;
    }

    .coverage-badge.ntp {
      background: rgba(74, 124, 89, 0.15);
      color: var(--accent);
    }

    .coverage-badge.phwc {
      background: rgba(251, 191, 36, 0.15);
      color: var(--confidence-medium);
    }

    .coverage-badge.ref {
      background: rgba(136, 136, 136, 0.15);
      color: var(--text-muted);
    }

    /* ===== WELCOME DISCLAIMER ===== */
    .welcome-disclaimer {
      font-size: 0.6875rem;
      color: var(--text-muted);
      text-align: center;
      margin-top: 1.25rem;
    }

    /* ===== GET STARTED / QUESTION CHIPS ===== */
    .question-chips {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.5rem;
    }

    @media (max-width: 560px) {
      .question-chips {
        grid-template-columns: 1fr;
      }
    }

    .question-chip {
      background: var(--bg-source);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 0.625rem 0.875rem;
      font-size: 0.75rem;
      font-family: inherit;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.2s ease;
      text-align: left;
      line-height: 1.4;
    }

    .question-chip:hover {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--text-on-accent);
      transform: translateY(-1px);
      box-shadow: var(--shadow-sm);
    }

    .question-chip {
      animation: welcomeFadeIn 0.3s ease both;
    }

    .question-chip:nth-child(1) { animation-delay: 0.25s; }
    .question-chip:nth-child(2) { animation-delay: 0.3s; }
    .question-chip:nth-child(3) { animation-delay: 0.35s; }
    .question-chip:nth-child(4) { animation-delay: 0.4s; }

    @media (max-width: 640px) {
      .welcome-panel {
        padding: 1.5rem 1rem;
      }
    }

    /* ===== TYPING INDICATOR ===== */
    .typing-indicator {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 1rem;
      background: var(--bg-bot-msg);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      border-bottom-left-radius: var(--radius-sm);
      width: fit-content;
      min-width: 200px;
    }

    .typing-dots {
      display: flex;
      align-items: center;
      gap: 0.375rem;
    }

    .typing-dot {
      width: 8px;
      height: 8px;
      background: var(--accent);
      border-radius: 50%;
      animation: typingBounce 1.4s infinite ease-in-out;
    }

    .typing-dot:nth-child(1) { animation-delay: -0.32s; }
    .typing-dot:nth-child(2) { animation-delay: -0.16s; }
    .typing-dot:nth-child(3) { animation-delay: 0s; }

    @keyframes typingBounce {
      0%, 80%, 100% { transform: scale(0.8); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }

    .typing-status {
      display: flex;
      flex-direction: column;
      gap: 0.125rem;
    }

    .typing-message {
      font-size: 0.8125rem;
      color: var(--text-secondary);
      font-weight: 500;
    }

    .typing-time {
      font-size: 0.6875rem;
      color: var(--text-muted);
      font-variant-numeric: tabular-nums;
    }

    .typing-retry {
      font-size: 0.75rem;
      color: var(--confidence-medium);
      font-weight: 500;
    }

    /* ===== INPUT AREA ===== */
    .input-area {
      padding: 1rem 1.5rem;
      background: var(--bg-secondary);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .input-container {
      display: flex;
      gap: 0.75rem;
      align-items: flex-end;
    }

    .new-chat-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: var(--radius-pill);
      padding: 0.75rem;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .new-chat-btn:hover {
      border-color: var(--accent);
      background: var(--accent-subtle);
    }

    .new-chat-btn svg {
      width: 20px;
      height: 20px;
      color: var(--text-secondary);
    }

    .new-chat-btn:hover svg {
      color: var(--accent);
    }

    .voice-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: var(--radius-pill);
      padding: 0.75rem;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      position: relative;
    }

    .voice-btn:hover {
      border-color: var(--accent);
      background: var(--accent-subtle);
    }

    .voice-btn svg {
      width: 20px;
      height: 20px;
      color: var(--text-secondary);
    }

    .voice-btn:hover svg {
      color: var(--accent);
    }

    .voice-btn.listening {
      border-color: #ef4444;
      background: rgba(239, 68, 68, 0.1);
      animation: voice-pulse 1.5s ease-in-out infinite;
    }

    .voice-btn.listening svg {
      color: #ef4444;
    }

    @keyframes voice-pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
      50% { box-shadow: 0 0 0 8px rgba(239, 68, 68, 0); }
    }

    /* ===== VOICE INPUT MODE ===== */
    .voice-input-mode {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      width: 100%;
      padding: 0.5rem 1rem;
      min-height: 46px;
    }

    .input-area.voice-active .message-input {
      display: none;
    }

    .input-area.voice-active .voice-input-mode {
      display: flex;
    }

    .input-area.voice-active .voice-btn {
      border-color: #ef4444;
      background: rgba(239, 68, 68, 0.1);
    }

    .input-area.voice-active .voice-btn svg {
      color: #ef4444;
    }

    /* Voice Input Orb */
    .voice-input-orb {
      position: relative;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .voice-input-orb-core {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent) 0%, #3a6045 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2;
      box-shadow: 0 0 20px rgba(74, 124, 89, 0.4);
    }

    .voice-input-orb-core svg {
      width: 18px;
      height: 18px;
      color: white;
    }

    .voice-input-orb-ring {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 2px solid var(--accent);
      opacity: 0;
    }

    .voice-input-mode[data-state="connecting"] .voice-input-orb-core {
      animation: voice-orb-connecting 0.8s ease-in-out infinite;
      opacity: 0.7;
    }

    @keyframes voice-orb-connecting {
      0%, 100% { transform: scale(0.95); opacity: 0.5; }
      50% { transform: scale(1); opacity: 0.8; }
    }

    .voice-input-mode[data-state="listening"] .voice-input-orb-ring {
      animation: voice-ring-expand 2s ease-out infinite;
    }

    .voice-input-mode[data-state="listening"] .voice-input-orb-ring:nth-child(2) {
      animation-delay: 0.5s;
    }

    .voice-input-mode[data-state="listening"] .voice-input-orb-ring:nth-child(3) {
      animation-delay: 1s;
    }

    @keyframes voice-ring-expand {
      0% { transform: scale(1); opacity: 0.6; }
      100% { transform: scale(2.5); opacity: 0; }
    }

    .voice-input-mode[data-state="processing"] .voice-input-orb-core {
      animation: voice-orb-processing 1s ease-in-out infinite;
      background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
    }

    @keyframes voice-orb-processing {
      0%, 100% { box-shadow: 0 0 20px rgba(245, 158, 11, 0.4); }
      50% { box-shadow: 0 0 35px rgba(245, 158, 11, 0.7); }
    }

    .voice-input-mode[data-state="speaking"] .voice-input-orb-core {
      animation: voice-orb-speaking 0.6s ease-in-out infinite;
      background: linear-gradient(135deg, #16a34a 0%, #15803d 100%);
    }

    @keyframes voice-orb-speaking {
      0%, 100% {
        transform: scale(1);
        box-shadow: 0 0 20px rgba(22, 163, 74, 0.4);
      }
      50% {
        transform: scale(1.1);
        box-shadow: 0 0 30px rgba(22, 163, 74, 0.6);
      }
    }

    .voice-input-status {
      font-size: 0.875rem;
      color: var(--text-secondary);
      font-weight: 500;
    }

    .voice-input-mode[data-state="connecting"] .voice-input-status { color: var(--text-muted); }
    .voice-input-mode[data-state="listening"] .voice-input-status { color: #ef4444; }
    .voice-input-mode[data-state="processing"] .voice-input-status { color: #f59e0b; }
    .voice-input-mode[data-state="speaking"] .voice-input-status { color: #16a34a; }

    .voice-done-btn {
      display: none;
      padding: 0.5rem 1rem;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: var(--radius-pill);
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
    }

    .voice-done-btn:hover {
      background: #3a6045;
      transform: scale(1.05);
    }

    .voice-input-mode[data-state="listening"] .voice-done-btn {
      display: block;
    }

    .message-bot.speaking .message-header-left::after {
      content: '';
      display: inline-block;
      width: 8px;
      height: 8px;
      background: #16a34a;
      border-radius: 50%;
      margin-left: 0.5rem;
      animation: speaking-dot 0.6s ease-in-out infinite;
    }

    @keyframes speaking-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    .input-wrapper {
      flex: 1;
      position: relative;
    }

    .message-input {
      width: 100%;
      padding: 0.75rem 1.25rem;
      border: 1px solid var(--border);
      border-radius: var(--radius-pill);
      background: var(--bg-input);
      color: var(--text-primary);
      font-size: 0.9375rem;
      font-family: inherit;
      resize: none;
      outline: none;
      transition: all 0.2s ease;
      min-height: 44px;
      max-height: 120px;
    }

    .message-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-subtle);
    }

    .message-input::placeholder {
      color: var(--text-muted);
    }

    .send-btn {
      background: var(--accent);
      border: none;
      border-radius: var(--radius-pill);
      padding: 0.75rem 1.5rem;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-weight: 600;
    }

    .send-btn:hover:not(:disabled) {
      background: var(--accent-hover);
      transform: translateY(-1px);
      box-shadow: var(--shadow-md);
    }

    .send-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .send-btn svg {
      width: 20px;
      height: 20px;
      color: var(--text-on-accent);
    }

    /* ===== ERROR STATE ===== */
    .error-message {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #dc2626;
      padding: 0.875rem 1rem;
      border-radius: var(--radius-md);
      font-size: 0.875rem;
      display: flex;
      flex-direction: column;
      gap: 0.625rem;
    }

    .error-message-content {
      display: flex;
      align-items: flex-start;
      gap: 0.5rem;
    }

    .error-message-content svg {
      flex-shrink: 0;
      margin-top: 0.125rem;
    }

    .error-message-text {
      flex: 1;
    }

    .error-message-title {
      font-weight: 600;
      margin-bottom: 0.25rem;
    }

    .error-message-detail {
      font-size: 0.8125rem;
      opacity: 0.9;
    }

    .error-actions {
      display: flex;
      gap: 0.5rem;
      margin-left: 1.5rem;
    }

    .error-retry-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.375rem;
      padding: 0.375rem 0.75rem;
      background: transparent;
      border: 1px solid currentColor;
      border-radius: var(--radius-pill);
      color: inherit;
      font-size: 0.75rem;
      font-family: inherit;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .error-retry-btn:hover {
      background: #dc2626;
      border-color: #dc2626;
      color: white;
    }

    .error-retry-btn svg {
      width: 12px;
      height: 12px;
    }

    [data-theme="dark"] .error-message,
    :root:not([data-theme="light"]) .error-message {
      background: #450a0a;
      border-color: #7f1d1d;
      color: #fca5a5;
    }

    [data-theme="dark"] .error-retry-btn:hover,
    :root:not([data-theme="light"]) .error-retry-btn:hover {
      background: #fca5a5;
      border-color: #fca5a5;
      color: #450a0a;
    }

    /* ===== CANCEL BUTTON STATE ===== */
    .send-btn.cancel-mode {
      background: var(--confidence-low);
    }

    .send-btn.cancel-mode:hover:not(:disabled) {
      background: #ef4444;
    }

    /* ===== SCROLLBAR ===== */
    .chat-area::-webkit-scrollbar,
    .source-modal-body::-webkit-scrollbar {
      width: 6px;
    }

    .chat-area::-webkit-scrollbar-track,
    .source-modal-body::-webkit-scrollbar-track {
      background: transparent;
    }

    .chat-area::-webkit-scrollbar-thumb,
    .source-modal-body::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    .chat-area::-webkit-scrollbar-thumb:hover,
    .source-modal-body::-webkit-scrollbar-thumb:hover {
      background: var(--text-muted);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 640px) {
      .chat-area {
        padding: 1rem;
      }

      .message {
        max-width: 92%;
      }

      .input-area {
        padding: 0.875rem 1rem;
      }

      .voice-btn span {
        display: none;
      }
    }

    /* ===== PWA: OFFLINE BANNER ===== */
    .offline-banner {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 10000;
      background: var(--color-error, #dc2626);
      color: white;
      text-align: center;
      padding: 0.5rem 1rem;
      padding-top: calc(0.5rem + env(safe-area-inset-top));
      font-size: 0.8125rem;
      font-weight: 500;
      transform: translateY(-100%);
      transition: transform 0.3s ease;
    }

    .offline-banner.visible {
      transform: translateY(0);
    }

    .offline-banner.online {
      background: var(--color-success, #16a34a);
    }

    /* ===== PWA: INSTALL BANNER ===== */
    .install-banner {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 9999;
      background: var(--bg-secondary);
      border-top: 1px solid var(--border-color);
      padding: 1rem;
      padding-bottom: calc(1rem + env(safe-area-inset-bottom));
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      transform: translateY(100%);
      transition: transform 0.3s ease;
      box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.3);
    }

    .install-banner.visible {
      transform: translateY(0);
    }

    .install-banner-content {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex: 1;
      min-width: 0;
    }

    .install-icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      flex-shrink: 0;
    }

    .install-text {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
      min-width: 0;
    }

    .install-text strong {
      font-size: 0.9375rem;
      color: var(--text-primary);
    }

    .install-text span {
      font-size: 0.75rem;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 0.25rem;
    }

    .install-text svg {
      flex-shrink: 0;
    }

    .install-actions {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-shrink: 0;
    }

    .install-btn {
      background: var(--accent);
      color: white;
      border: none;
      padding: 0.625rem 1.25rem;
      border-radius: 8px;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      min-height: 44px;
      min-width: 44px;
      transition: background 0.2s ease;
    }

    .install-btn:hover {
      background: var(--accent-hover);
    }

    .install-dismiss {
      background: transparent;
      border: none;
      padding: 0.5rem;
      cursor: pointer;
      color: var(--text-secondary);
      min-height: 44px;
      min-width: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      transition: background 0.2s ease;
    }

    .install-dismiss:hover {
      background: var(--bg-card);
    }

    /* ===== MOBILE: SAFE AREA HANDLING ===== */
    @supports (padding: env(safe-area-inset-top)) {
      .input-area {
        padding-bottom: calc(0.875rem + env(safe-area-inset-bottom));
      }
      .app-container {
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
      }
    }

    /* ===== MOBILE: TOUCH TARGETS ===== */
    @media (max-width: 768px) {
      .question-chip {
        min-height: 44px;

      const currentTheme = document.documentElement.getAttribute('data-theme');
      const newTheme = currentTheme === 'light' ? 'dark' : 'light';

    // ===== MESSAGE RENDERING =====
    function renderUserMessage(text) {
      return `
        <div class="message message-user">
          <div class="message-content">

      `;
    }

    function renderBotMessage(response) {
      let rawAnswer = response.answer || response.response || 'No response received.';
      let sources = response.sources || [];
      let confidence = response.confidence || null;

      // Safety net: extract embedded JSON if parsing failed upstream
      if (sources.length === 0 && rawAnswer.includes('"answer"')) {
        try {
          const fenceMatch = rawAnswer.match(/```(?:json)?\s*([\s\S]*?)```/);
          if (fenceMatch) {
            const parsed = JSON.parse(fenceMatch[1].trim());
            if (parsed.answer) rawAnswer = parsed.answer;
            if (parsed.sources) sources = parsed.sources;
          }
        } catch (e) {
          console.warn('[Frontend Safety Net] JSON extraction failed:', e.message);
        }
      }

      if (!confidence || !confidence.level) {
        const confidenceMatch = rawAnswer.match(/\*\*Confidence:\*\*\s*(High|Medium|Low)/i) ||
                                rawAnswer.match(/Confidence:\s*(High|Medium|Low)/i);
        if (confidenceMatch) {
          const level = confidenceMatch[1];
          const explanationMatch = rawAnswer.match(/Confidence:\s*(?:High|Medium|Low)\s*[---]\s*([^\n]+)/i);
          confidence = {
            level: level.charAt(0).toUpperCase() + level.slice(1).toLowerCase(),
            explanation: explanationMatch ? explanationMatch[1].trim() : ''
          };
        } else {
          confidence = { level: 'Medium', explanation: 'Confidence level not provided.' };
        }
      }

      let cleanAnswer = rawAnswer
        .replace(/\*\*Confidence:\*\*[^\n]*/gi, '')
        .replace(/Confidence:\s*(?:High|Medium|Low)\s*[---][^\n]*/gi, '')
        .replace(/\*\*Short Answer:?\*\*\s*/gi, '')
        .replace(/\*\*Requirements:?\*\*\s*/gi, '')
        .replace(/\*\*Sources:?\*\*[\s\S]*$/gi, '')
        .replace(/\*\*Additional Notes:?\*\*\s*/gi, '')
        .trim();

      const validLevels = ['high', 'medium', 'low'];
      const normalizedLevel = confidence.level ? confidence.level.toLowerCase() : 'medium';
      const confidenceClass = validLevels.includes(normalizedLevel) ? normalizedLevel : 'medium';
      const messageId = 'msg-' + Date.now() + '-' + Math.random().toString(36).substring(2, 7);

      let sourcesHtml = '';
      const validSources = sources.filter(s => s && (s.content || s.section_title || s.document_name));
      if (validSources.length > 0) {
        sourcesHtml = `
          <div class="sources-section">
            <div class="sources-title">Sources & References</div>
            ${validSources.map((source, index) => renderSourceItem(source, index, messageId)).join('')}

      }

      return `
        <div class="message message-bot" id="${messageId}">

                    <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                    <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>

                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>

                ${formatAnswerText(cleanAnswer)}

            ${sourcesHtml}
          </div>
        </div>
      `;
    }

    function renderSourceItem(source, index, messageId) {
      const hierarchy = source.section_hierarchy || [];
      const title = source.section_title || hierarchy[hierarchy.length - 1] || 'Unknown Section';
      const docName = source.document_name || 'Document';
      const content = source.content || 'Source content not available.';
      const pageNumber = source.page_number || null;
      const sourceUrl = source.source_url || null;

      // Build full breadcrumb: Document > Hierarchy > Title
      const pathParts = [docName];
      if (hierarchy.length > 0) pathParts.push(...hierarchy);
      if (title && !hierarchy.includes(title) && title !== docName) pathParts.push(title);
      const fullPath = pathParts.join(' \u203a ');

      const sourceId = `${messageId}-source-${index}`;
      sourceDataStore[sourceId] = { path: fullPath, content, sourceUrl };

      const pageHtml = pageNumber ? `<span class="page-badge">Page ${pageNumber}</span>` : '';

      const isPodcast = sourceUrl && sourceUrl.includes('podcasts.apple.com');
      const sourceLinkLabel = isPodcast ? 'Listen on Apple Podcasts' : 'View on NTA website';
      const sourceLinkIcon = isPodcast
        ? '<path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle>'
        : '<path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line>';
      const sourceLink = sourceUrl ? `
            <a class="view-source-link source-url-link" href="${escapeHtml(sourceUrl)}" target="_blank" rel="noopener">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                ${sourceLinkIcon}
              </svg>
              ${sourceLinkLabel}
            </a>` : '';

      return `
        <div class="source-item" id="${sourceId}">
          <div class="source-header">
            <div class="source-info">
              <div class="source-path">${escapeHtml(fullPath)}</div>
              <div class="source-meta">
                <span class="authority-badge authority-binding">Curriculum</span>
                ${pageHtml}
              </div>
            </div>
          </div>
          <div class="source-actions">
            <button class="view-source-link" onclick="openSourceModal('${sourceId}')">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                <polyline points="14 2 14 8 20 8"></polyline>
                <line x1="16" y1="13" x2="8" y2="13"></line>
                <line x1="16" y1="17" x2="8" y2="17"></line>
              </svg>
              View source text
            </button>${sourceLink}
          </div>
        </div>
      `;
    }

    function openSourceModal(sourceId) {
      const data = sourceDataStore[sourceId];
      if (!data) return;
      const modal = document.getElementById('sourceModal');
      document.getElementById('sourceModalTitle').textContent = data.path;
      document.getElementById('sourceModalBody').textContent = data.content;
      modal.classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function closeSourceModal() {
      document.getElementById('sourceModal').classList.remove('active');
      document.body.style.overflow = '';
    }

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') closeSourceModal();
    });

    function formatAnswerText(text) {
      if (!text) return '';
      let html = escapeHtml(text);
      html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      const lines = html.split('\n');
      let inList = false;
      let result = [];
      for (let i = 0; i < lines.length; i++) {
        const line = lines[i].trim();
        if (line.startsWith('- ')) {
          if (!inList) { result.push('<ul>'); inList = true; }
          result.push(`<li>${line.substring(2)}</li>`);
        } else {
          if (inList) { result.push('</ul>'); inList = false; }
          if (line) result.push(`<p>${line}</p>`);
        }
      }
      if (inList) result.push('</ul>');
      html = result.join('');
      html = html.replace(/<p><\/p>/g, '');
      return html || '<p>No answer available.</p>';
    }

    function toggleConfidenceTooltip(badge, event) {
      event.stopPropagation();
      document.querySelectorAll('.confidence-badge.tooltip-open').forEach(b => {
        if (b !== badge) b.classList.remove('tooltip-open');
      });
      badge.classList.toggle('tooltip-open');

    document.addEventListener('click', function(event) {
      if (!event.target.closest('.confidence-badge')) {

    function copyAnswer(button, messageId) {

        }, 2000);

    // ===== TYPING INDICATOR =====
    function getStageMessage(elapsedSeconds) {
      if (elapsedSeconds < 5) return 'Searching curriculum...';
      if (elapsedSeconds < 15) return 'Analyzing content...';
      if (elapsedSeconds < 30) return 'Generating response...';
      return 'Still working, please wait...';
    }

    function renderTypingIndicator(message, retryInfo) {
      const stageMessage = message || 'Searching curriculum...';
      const retryHtml = retryInfo ? `<div class="typing-retry">${retryInfo}</div>` : '';
      return `
        <div class="message message-bot" id="typingIndicator">
          <div class="typing-indicator">
            <div class="typing-dots">
              <div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>
            </div>
            <div class="typing-status">
              <div class="typing-message">${escapeHtml(stageMessage)}</div>
              <div class="typing-time" id="typingTime">0s</div>

    function showTypingIndicator(message, retryInfo) {
      const chatArea = document.getElementById('chatArea');
