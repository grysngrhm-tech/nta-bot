<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>NTA Bot</title>

  <!-- PWA Meta Tags -->
  <meta name="description" content="NTA employee curriculum lookup with citations.">
  <meta name="theme-color" content="#4a7c59">
  <meta name="mobile-web-app-capable" content="yes">

  <!-- iOS PWA Meta Tags -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="NTA Bot">
  <meta name="format-detection" content="telephone=no">

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">

  <!-- Favicons and App Icons -->
  <link rel="icon" type="image/png" sizes="32x32" href="assets/icons/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="assets/icons/favicon-16.png">
  <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png">
  <link rel="apple-touch-icon" sizes="152x152" href="assets/icons/icon-152.png">
  <link rel="apple-touch-icon" sizes="167x167" href="assets/icons/icon-167.png">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/icons/icon-180.png">

  <!-- iOS Splash Screens (basic) -->
  <link rel="apple-touch-startup-image" href="assets/icons/icon-512.png">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ===== CSS RESET & BASE ===== */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* ===== CSS VARIABLES - LIGHT THEME ===== */
    :root {
      --bg-primary: #f5f5f0;
      --bg-secondary: #ffffff;
      --bg-chat: #f5f5f0;
      --bg-card: #ffffff;
      --bg-input: #ffffff;
      --bg-user-msg: linear-gradient(135deg, #4a7c59 0%, #3d6b4a 100%);
      --bg-bot-msg: #ffffff;
      --bg-source: #f0f0eb;
      --bg-source-expanded: #e5e5de;
      --text-primary: #1a1a1a;
      --text-secondary: #4a4a4a;
      --text-muted: #777777;
      --text-on-accent: #ffffff;
      --accent: #4a7c59;
      --accent-hover: #3d6b4a;
      --accent-subtle: rgba(74, 124, 89, 0.1);
      --border: #d5d5cc;
      --border-focus: #4a7c59;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
      --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1);
      --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.1);
      --confidence-high: #16a34a;
      --confidence-medium: #ca8a04;
      --confidence-low: #dc2626;
      --radius-sm: 0.375rem;
      --radius-md: 0.5rem;
      --radius-lg: 0.75rem;
      --radius-xl: 1rem;
      --radius-pill: 25px;
      --transition: 200ms ease;
    }

    /* ===== SCREEN READER ONLY ===== */
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    /* ===== TYPOGRAPHY ===== */
    body {
      font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 15px;
      line-height: 1.6;
      color: var(--text-primary);
      background: var(--bg-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ===== LAYOUT ===== */
    .app-container {
      max-width: 900px;
      width: 100%;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      height: 100vh;
      background: var(--bg-secondary);
      box-shadow: var(--shadow-lg);
      position: relative;
    }

    @media (min-width: 768px) {
      .app-container {
        margin: 1rem auto;
        height: calc(100vh - 2rem);
        border-radius: var(--radius-xl);
        overflow: hidden;
      }
    }

    /* ===== ACCESS GATE ===== */
    .access-gate {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 20000;
      background: #f5f5f0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .access-gate.hidden {
      display: none;
    }

    .access-gate-card {
      background: #ffffff;
      border-radius: var(--radius-xl);
      padding: 2.5rem 2rem;
      max-width: 400px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
      animation: welcomeFadeIn 0.5s ease;
    }

    .access-gate-icon {
      font-size: 3rem;
      margin-bottom: 1rem;
    }

    .access-gate h2 {
      font-size: 1.375rem;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 0.5rem;
    }

    .access-gate p {
      font-size: 0.875rem;
      color: #4a4a4a;
      margin-bottom: 1.5rem;
      line-height: 1.5;
    }

    .access-gate-input {
      width: 100%;
      padding: 0.875rem 1.25rem;
      border: 1px solid #d5d5cc;
      border-radius: var(--radius-pill);
      background: #f5f5f0;
      color: #1a1a1a;
      font-size: 1rem;
      font-family: inherit;
      text-align: center;
      letter-spacing: 0.1em;
      outline: none;
      transition: all 0.2s ease;
      margin-bottom: 1rem;
    }

    .access-gate-input:focus {
      border-color: #4a7c59;
      box-shadow: 0 0 0 3px rgba(74, 124, 89, 0.3);
    }

    .access-gate-input::placeholder {
      color: #999;
      letter-spacing: normal;
    }

    .access-gate-btn {
      width: 100%;
      padding: 0.875rem;
      background: #4a7c59;
      color: white;
      border: none;
      border-radius: var(--radius-pill);
      font-size: 1rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .access-gate-btn:hover {
      background: #5d9070;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(74, 124, 89, 0.3);
    }

    .access-gate-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .access-gate-error {
      color: #dc2626;
      font-size: 0.8125rem;
      margin-top: 0.75rem;
      display: none;
    }

    .access-gate-error.visible {
      display: block;
    }

    /* ===== HEADER (removed — logo is in welcome hero) ===== */

    .header-actions {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    /* ===== CHAT AREA ===== */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      background: var(--bg-chat);
    }

    /* ===== MESSAGES ===== */
    .message {
      max-width: 85%;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message-user {
      align-self: flex-end;
    }

    .message-bot {
      align-self: flex-start;
    }

    .message-content {
      padding: 0.875rem 1rem;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
    }

    .message-user .message-content {
      background: var(--bg-user-msg);
      color: var(--text-on-accent);
      border-bottom-right-radius: var(--radius-sm);
      box-shadow: var(--shadow-md);
    }

    .message-bot .message-content {
      background: var(--bg-bot-msg);
      color: var(--text-primary);
      border-bottom-left-radius: var(--radius-sm);
      border: 1px solid var(--border);
    }

    .message-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.5rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .message-sender {
      font-weight: 600;
      font-size: 0.875rem;
      color: var(--accent);
    }

    /* ===== CONFIDENCE BADGE ===== */
    .confidence-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.375rem;
      font-size: 0.75rem;
      font-weight: 500;
      padding: 0.25rem 0.5rem;
      border-radius: var(--radius-sm);
      background: var(--bg-source);
      cursor: pointer;
      position: relative;
      transition: var(--transition);
    }

    .confidence-badge:hover {
      opacity: 0.8;
    }

    .confidence-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .confidence-high .confidence-dot { background: var(--confidence-high); }
    .confidence-medium .confidence-dot { background: var(--confidence-medium); }
    .confidence-low .confidence-dot { background: var(--confidence-low); }

    .confidence-high { color: var(--confidence-high); }
    .confidence-medium { color: var(--confidence-medium); }
    .confidence-low { color: var(--confidence-low); }

    .confidence-tooltip {
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      width: 280px;
      padding: 0.75rem;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-lg);
      font-size: 0.8125rem;
      font-weight: 400;
      color: var(--text-secondary);
      line-height: 1.5;
      z-index: 100;
      display: none;
      animation: tooltipFadeIn 0.15s ease;
    }

    .confidence-tooltip::before {
      content: '';
      position: absolute;
      top: -6px;
      right: 16px;
      width: 10px;
      height: 10px;
      background: var(--bg-secondary);
      border-left: 1px solid var(--border);
      border-top: 1px solid var(--border);
      transform: rotate(45deg);
    }

    .confidence-badge.tooltip-open .confidence-tooltip {
      display: block;
    }

    @keyframes tooltipFadeIn {
      from { opacity: 0; transform: translateY(-4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ===== MESSAGE HEADER ACTIONS ===== */
    .message-header-left {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .message-header-right {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .copy-btn {
      background: transparent;
      border: none;
      padding: 0.25rem;
      cursor: pointer;
      color: var(--text-muted);
      border-radius: var(--radius-sm);
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .copy-btn:hover {
      color: var(--text-secondary);
      background: var(--bg-source);
    }

    .copy-btn svg {
      width: 14px;
      height: 14px;
    }

    .copy-btn.copied {
      color: var(--confidence-high);
    }

    /* ===== SPEAK BUTTON & WAVEFORM ===== */
    .speak-btn {
      background: transparent;
      border: none;
      padding: 0.25rem;
      cursor: pointer;
      color: var(--text-muted);
      border-radius: var(--radius-sm);
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .speak-btn:hover {
      color: var(--text-secondary);
      background: var(--bg-source);
    }

    .speak-btn .speaker-icon {
      width: 14px;
      height: 14px;
    }

    .speak-btn .waveform {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 2px;
      height: 14px;
    }

    .speak-btn.speaking .speaker-icon {
      display: none;
    }

    .speak-btn.speaking .waveform {
      display: flex;
    }

    .speak-btn.speaking {
      color: var(--accent);
    }

    .waveform span {
      display: block;
      width: 2px;
      height: 4px;
      background: currentColor;
      border-radius: 1px;
      animation: waveform-bar 0.8s ease-in-out infinite;
    }

    .waveform span:nth-child(1) { animation-delay: 0s; }
    .waveform span:nth-child(2) { animation-delay: 0.1s; }
    .waveform span:nth-child(3) { animation-delay: 0.2s; }
    .waveform span:nth-child(4) { animation-delay: 0.3s; }
    .waveform span:nth-child(5) { animation-delay: 0.4s; }

    @keyframes waveform-bar {
      0%, 100% { height: 4px; }
      50% { height: 14px; }
    }

    .speak-btn.loading {
      color: var(--accent);
      pointer-events: none;
    }

    .speak-btn.loading .speaker-icon {
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* Tap to play state - shows when autoplay is blocked on mobile */
    .speak-btn.tap-to-play {
      color: #f59e0b;
      animation: tap-pulse 1s ease-in-out infinite;
      pointer-events: auto;
    }

    .speak-btn.tap-to-play .speaker-icon {
      animation: none;
    }

    @keyframes tap-pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.2); }
    }

    /* ===== ANSWER SECTION ===== */
    .answer-section {
      margin-bottom: 0.75rem;
    }

    .answer-label {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.375rem;
    }

    .answer-text {
      line-height: 1.7;
      color: var(--text-primary);
    }

    .answer-text p {
      margin-bottom: 0.5rem;
    }

    .answer-text p:last-child {
      margin-bottom: 0;
    }

    .answer-text strong { font-weight: 600; }
    .answer-text em { font-style: italic; }
    .answer-text code { background: rgba(0,0,0,0.05); padding: 0.1rem 0.3rem; border-radius: 3px; font-size: 0.85em; font-family: inherit; }
    .answer-text ul, .answer-text ol { margin: 0.375rem 0; padding-left: 1.5rem; }
    .answer-text li { margin-bottom: 0.25rem; line-height: 1.6; }
    .answer-text li:last-child { margin-bottom: 0; }

    /* ===== SOURCES & REQUIREMENTS SECTION ===== */
    .sources-section {
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
    }

    .sources-title {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* ===== SOURCE ITEM WITH REQUIREMENTS ===== */
    .source-item {
      background: var(--bg-source);
      border-radius: var(--radius-md);
      margin-bottom: 0.625rem;
      overflow: hidden;
      transition: all 0.2s ease;
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
    }

    .source-item:hover {
      border-color: var(--accent);
      box-shadow: var(--shadow-sm);
    }

    .source-item:last-child, .source-group:last-child {
      margin-bottom: 0;
    }

    /* ===== GROUPED SOURCE ACCORDION ===== */
    .source-group {
      background: var(--bg-source);
      border-radius: var(--radius-md);
      margin-bottom: 0.625rem;
      overflow: hidden;
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
    }

    .source-group-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 0.75rem;
      cursor: pointer;
      user-select: none;
      transition: background 0.15s ease;
    }

    .source-group-header:hover {
      background: rgba(0,0,0,0.02);
    }

    .source-group-info {
      flex: 1;
      min-width: 0;
    }

    .source-group-name {
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--text-primary);
      line-height: 1.4;
    }

    .source-group-meta {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 0.125rem;
    }

    .source-group-count {
      font-size: 0.6875rem;
      color: var(--text-muted);
    }

    .source-group-chevron {
      width: 16px;
      height: 16px;
      color: var(--text-muted);
      transition: transform 0.2s ease;
      flex-shrink: 0;
    }

    .source-group.expanded .source-group-chevron {
      transform: rotate(90deg);
    }

    .source-group-body {
      display: none;
      border-top: 1px solid var(--border);
    }

    .source-group.expanded .source-group-body {
      display: block;
    }

    .source-group-section {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
      padding: 0.375rem 0.75rem;
      border-bottom: 1px solid var(--border);
    }

    .source-group-section:last-child {
      border-bottom: none;
    }

    .source-group-section-title {
      font-size: 0.6875rem;
      font-weight: 500;
      color: var(--text-secondary);
      flex: 1;
      min-width: 0;
    }

    .source-group-section .source-actions {
      padding: 0;
      flex-shrink: 0;
    }

    .source-group-section .view-source-link {
      font-size: 0.625rem;
      padding: 0.25rem 0.5rem;
    }

    .source-header {
      display: flex;
      align-items: flex-start;
      gap: 0.5rem;
      padding: 0.75rem;
    }

    .source-info {
      flex: 1;
      min-width: 0;
    }

    .source-path {
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--text-primary);
      margin-bottom: 0.125rem;
      line-height: 1.4;
    }

    .source-meta {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    /* ===== AUTHORITY BADGE ===== */
    .authority-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
      font-size: 0.625rem;
      font-weight: 600;
      padding: 0.125rem 0.5rem;
      border-radius: var(--radius-sm);
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .authority-binding {
      background: var(--accent-subtle);
      color: var(--accent);
    }

    .authority-guidance {
      background: rgba(136, 136, 136, 0.15);
      color: var(--text-muted);
    }

    .authority-web {
      background: rgba(59, 130, 246, 0.1);
      color: #3b82f6;
    }

    .authority-podcast {
      background: rgba(234, 179, 8, 0.1);
      color: #ca8a04;
    }

    .authority-textbook {
      background: rgba(16, 185, 129, 0.1);
      color: #059669;
    }

    /* ===== SOURCE REQUIREMENTS ===== */
    .source-requirements {
      padding: 0.5rem 0.75rem 0.75rem 1rem;
      border-left: 3px solid var(--accent);
      margin: 0 0.75rem 0.5rem 0.75rem;
      background: var(--accent-subtle);
      border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    }

    .requirements-label {
      font-size: 0.6875rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
    }

    .source-requirements ul {
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .source-requirements li {
      position: relative;
      padding-left: 1rem;
      margin-bottom: 0.375rem;
      font-size: 0.8125rem;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    .source-requirements li:last-child {
      margin-bottom: 0;
    }

    .source-requirements li::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0.5rem;
      width: 5px;
      height: 5px;
      background: var(--accent);
      border-radius: 50%;
    }

    /* ===== VIEW SOURCE LINK ===== */
    .view-source-link {
      display: inline-flex;
      align-items: center;
      gap: 0.375rem;
      padding: 0.375rem 0.75rem;
      margin: 0 0.75rem 0.75rem 0.75rem;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: var(--radius-pill);
      cursor: pointer;
      color: var(--text-muted);
      font-size: 0.6875rem;
      font-family: inherit;
      transition: all 0.2s ease;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      font-weight: 500;
    }

    .view-source-link:hover {
      color: var(--accent);
      border-color: var(--accent);
      background: var(--accent-subtle);
    }

    .view-source-link svg {
      width: 12px;
      height: 12px;
    }

    .source-actions {
      display: flex;
      gap: 0.5rem;
      padding: 0 0.75rem 0.75rem 0.75rem;
    }

    .source-actions .view-source-link {
      margin: 0;
    }

    .source-url-link {
      text-decoration: none;
      color: var(--accent);
      border-color: var(--accent);
    }

    .source-url-link:hover {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--text-on-accent);
    }

    .page-badge {
      font-size: 0.6875rem;
      color: var(--text-muted);
      background: var(--bg-source);
      padding: 0.125rem 0.5rem;
      border-radius: var(--radius-sm);
      font-weight: 500;
    }

    /* ===== SOURCE MODAL ===== */
    .source-modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.6);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      animation: fadeIn 0.15s ease;
    }

    .source-modal-overlay.active {
      display: flex;
    }

    .source-modal {
      background: var(--bg-primary);
      border-radius: var(--radius-lg);
      max-width: 700px;
      width: 100%;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      animation: slideUp 0.2s ease;
    }

    .source-modal-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    .source-modal-title {
      font-size: 0.9375rem;
      font-weight: 600;
      color: var(--text-primary);
      line-height: 1.4;
    }

    .source-modal-close {
      background: none;
      border: none;
      padding: 0.25rem;
      cursor: pointer;
      color: var(--text-muted);
      transition: var(--transition);
      flex-shrink: 0;
    }

    .source-modal-close:hover {
      color: var(--text-primary);
    }

    .source-modal-close svg {
      width: 20px;
      height: 20px;
    }

    .source-modal-body {
      padding: 1.5rem;
      overflow-y: auto;
      font-size: 0.875rem;
      line-height: 1.7;
      color: var(--text-secondary);
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes slideDown {
      from { opacity: 0; max-height: 0; }
      to { opacity: 1; max-height: 200px; }
    }

    /* ===== MESSAGE BODY ===== */
    .message-body {
      line-height: 1.7;
    }

    .message-body p {
      margin-bottom: 0.75rem;
    }

    .message-body p:last-child {
      margin-bottom: 0;
    }

    .message-body strong {
      font-weight: 600;
    }

    .message-body ul, .message-body ol {
      margin: 0.5rem 0 0.75rem 1.25rem;
    }

    .message-body li {
      margin-bottom: 0.25rem;
    }

    /* ===== WELCOME PANEL ===== */
    .welcome-panel {
      max-width: 800px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
      animation: welcomeFadeIn 0.5s ease;
    }

    @keyframes welcomeFadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Hero Section */
    .welcome-hero {
      text-align: center;
      margin-bottom: 2rem;
      animation: welcomeFadeIn 0.5s ease;
      position: relative;
    }

    .welcome-logo {
      width: 240px;
      height: auto;
      margin: 0 auto 1.25rem;
      display: block;
      cursor: pointer;
    }

    .welcome-hero h2 {
      font-size: 1.375rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 0.5rem;
      letter-spacing: -0.01em;
    }

    .welcome-tagline {
      font-size: 0.875rem;
      color: var(--text-secondary);
      max-width: 520px;
      margin: 0 auto;
      line-height: 1.6;
    }

    .welcome-doc-link {
      font-size: 0.75rem;
      margin-top: 0.5rem;
      opacity: 0.5;
    }

    .welcome-doc-link a {
      color: var(--text-muted);
      text-decoration: none;
    }

    .welcome-doc-link a:hover {
      color: var(--accent);
      opacity: 1;
    }

    /* Stacked Sections */
    .welcome-section {
      background: var(--bg-card);
      border-radius: var(--radius-lg);
      padding: 1.25rem;
      margin-bottom: 1rem;
      animation: welcomeFadeIn 0.5s ease 0.15s both;
    }

    .welcome-section:last-of-type {
      margin-bottom: 0;
    }

    .welcome-section h3 {
      font-size: 0.6875rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.75rem;
    }

    /* ===== COVERAGE CARDS ===== */
    .coverage-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.625rem;
    }

    @media (max-width: 560px) {
      .coverage-grid {
        grid-template-columns: 1fr;
      }
    }

    .coverage-card {
      background: var(--bg-source);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 0.75rem;
      animation: welcomeFadeIn 0.4s ease both;
    }

    .coverage-card:nth-child(1) { animation-delay: 0.15s; }
    .coverage-card:nth-child(2) { animation-delay: 0.2s; }
    .coverage-card:nth-child(3) { animation-delay: 0.25s; }
    .coverage-card:nth-child(4) { animation-delay: 0.3s; }

    .coverage-card-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.375rem;
    }

    .coverage-card-title {
      font-size: 0.8125rem;
      font-weight: 600;
      color: var(--text-primary);
    }

    .coverage-card-desc {
      font-size: 0.75rem;
      color: var(--text-muted);
      line-height: 1.5;
      margin: 0;
    }

    .coverage-badge {
      font-size: 0.5625rem;
      font-weight: 700;
      padding: 0.125rem 0.375rem;
      border-radius: var(--radius-sm);
      text-transform: uppercase;
      letter-spacing: 0.03em;
      flex-shrink: 0;
    }

    .coverage-badge.ntp {
      background: rgba(74, 124, 89, 0.15);
      color: var(--accent);
    }

    .coverage-badge.phwc {
      background: rgba(251, 191, 36, 0.15);
      color: var(--confidence-medium);
    }

    .coverage-badge.ref {
      background: rgba(136, 136, 136, 0.15);
      color: var(--text-muted);
    }

    .coverage-badge.podcast {
      background: rgba(234, 179, 8, 0.1);
      color: #ca8a04;
    }

    .coverage-badge.textbook {
      background: rgba(16, 185, 129, 0.1);
      color: #059669;
    }

    .coverage-badge.coming-soon {
      background: rgba(0, 0, 0, 0.06);
      color: var(--text-muted);
    }

    .coverage-card.muted {
      opacity: 0.55;
      border-style: dashed;
    }

    /* ===== WELCOME DISCLAIMER ===== */
    .welcome-disclaimer {
      font-size: 0.6875rem;
      color: var(--text-muted);
      text-align: center;
      margin-top: 1.25rem;
    }

    /* ===== DASHBOARD ICON ===== */
    .dashboard-icon {
      position: absolute;
      top: 0.75rem;
      right: 0.75rem;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border-radius: var(--radius-md);
      color: var(--text-muted);
      opacity: 0.35;
      transition: all 0.2s ease;
      text-decoration: none;
    }

    .dashboard-icon:hover {
      opacity: 1;
      color: var(--accent);
      background: var(--accent-subtle);
    }

    .dashboard-icon svg {
      width: 16px;
      height: 16px;
    }

    /* ===== DASHBOARD FOOTER LINK ===== */
    .dashboard-link {
      display: block;
      text-align: center;
      padding: 0.375rem;
      font-size: 0.625rem;
      color: var(--text-muted);
      text-decoration: none;
      opacity: 0.4;
      transition: opacity 0.2s ease;
    }

    .dashboard-link:hover {
      opacity: 1;
      color: var(--accent);
    }

    /* ===== GET STARTED / QUESTION CHIPS ===== */
    .question-chips {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.5rem;
    }

    @media (max-width: 560px) {
      .question-chips {
        grid-template-columns: 1fr;
      }
    }

    .question-chip {
      background: var(--bg-source);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 0.625rem 0.875rem;
      font-size: 0.75rem;
      font-family: inherit;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.2s ease;
      text-align: left;
      line-height: 1.4;
    }

    .question-chip:hover {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--text-on-accent);
      transform: translateY(-1px);
      box-shadow: var(--shadow-sm);
    }

    .question-chip {
      animation: welcomeFadeIn 0.3s ease both;
    }

    .question-chip:nth-child(1) { animation-delay: 0.25s; }
    .question-chip:nth-child(2) { animation-delay: 0.3s; }
    .question-chip:nth-child(3) { animation-delay: 0.35s; }
    .question-chip:nth-child(4) { animation-delay: 0.4s; }

    @media (max-width: 640px) {
      .welcome-panel {
        padding: 1.5rem 1rem;
      }
    }

    /* ===== TYPING INDICATOR ===== */
    .typing-indicator {
      position: relative;
      padding: 1rem;
      background: var(--bg-bot-msg);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      border-bottom-left-radius: var(--radius-sm);
      width: 320px;
      overflow: hidden;
    }

    .typing-indicator::before,
    .typing-indicator::after {
      content: '';
      position: absolute;
      left: 0;
      height: 2px;
      background: var(--accent);
      width: var(--progress, 0%);
      transition: width 0.5s linear;
      opacity: 0.7;
    }

    .typing-indicator::before {
      top: 0;
      border-radius: 0 0 2px 0;
    }

    .typing-indicator::after {
      bottom: 0;
      border-radius: 0 2px 0 0;
    }

    .typing-content {
      display: flex;
      align-items: center;
      gap: 0.625rem;
    }

    .typing-dots {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      flex-shrink: 0;
    }

    .typing-dot {
      width: 6px;
      height: 6px;
      background: var(--accent);
      border-radius: 50%;
      animation: typingBounce 1.4s infinite ease-in-out;
    }

    .typing-dot:nth-child(1) { animation-delay: -0.32s; }
    .typing-dot:nth-child(2) { animation-delay: -0.16s; }
    .typing-dot:nth-child(3) { animation-delay: 0s; }

    @keyframes typingBounce {
      0%, 80%, 100% { transform: scale(0.8); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }

    .typing-status {
      min-width: 0;
    }

    .typing-message {
      font-size: 0.8125rem;
      color: var(--text-secondary);
      font-weight: 500;
      transition: opacity 0.3s ease;
    }

    .typing-message.fade {
      opacity: 0;
    }

    .typing-retry {
      font-size: 0.75rem;
      color: var(--confidence-medium);
      font-weight: 500;
      margin-top: 0.125rem;
    }

    /* ===== INPUT AREA ===== */
    .input-area {
      padding: 1rem 1.5rem;
      background: var(--bg-secondary);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .input-container {
      display: flex;
      gap: 0.75rem;
      align-items: flex-end;
    }

    .new-chat-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: var(--radius-pill);
      padding: 0.75rem;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .new-chat-btn:hover {
      border-color: var(--accent);
      background: var(--accent-subtle);
    }

    .new-chat-btn svg {
      width: 20px;
      height: 20px;
      color: var(--text-secondary);
    }

    .new-chat-btn:hover svg {
      color: var(--accent);
    }

    .voice-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: var(--radius-pill);
      padding: 0.75rem;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      position: relative;
    }

    .voice-btn:hover {
      border-color: var(--accent);
      background: var(--accent-subtle);
    }

    .voice-btn svg {
      width: 20px;
      height: 20px;
      color: var(--text-secondary);
    }

    .voice-btn:hover svg {
      color: var(--accent);
    }

    .voice-btn.listening {
      border-color: #ef4444;
      background: rgba(239, 68, 68, 0.1);
      animation: voice-pulse 1.5s ease-in-out infinite;
    }

    .voice-btn.listening svg {
      color: #ef4444;
    }

    @keyframes voice-pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
      50% { box-shadow: 0 0 0 8px rgba(239, 68, 68, 0); }
    }

    .input-wrapper {
      flex: 1;
      position: relative;
    }

    .message-input {
      width: 100%;
      padding: 0.75rem 1.25rem;
      border: 1px solid var(--border);
      border-radius: var(--radius-pill);
      background: var(--bg-input);
      color: var(--text-primary);
      font-size: 0.9375rem;
      font-family: inherit;
      resize: none;
      outline: none;
      transition: all 0.2s ease;
      min-height: 44px;
      max-height: 200px;
      overflow: hidden;
    }

    .message-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-subtle);
    }

    .message-input::placeholder {
      color: var(--text-muted);
    }

    .send-btn {
      background: var(--accent);
      border: none;
      border-radius: var(--radius-pill);
      padding: 0.75rem 1.5rem;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-weight: 600;
    }

    .send-btn:hover:not(:disabled) {
      background: var(--accent-hover);
      transform: translateY(-1px);
      box-shadow: var(--shadow-md);
    }

    .send-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .send-btn svg {
      width: 20px;
      height: 20px;
      color: var(--text-on-accent);
    }

    /* ===== ERROR STATE ===== */
    .error-message {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #dc2626;
      padding: 0.875rem 1rem;
      border-radius: var(--radius-md);
      font-size: 0.875rem;
      display: flex;
      flex-direction: column;
      gap: 0.625rem;
    }

    .error-message-content {
      display: flex;
      align-items: flex-start;
      gap: 0.5rem;
    }

    .error-message-content svg {
      flex-shrink: 0;
      margin-top: 0.125rem;
    }

    .error-message-text {
      flex: 1;
    }

    .error-message-title {
      font-weight: 600;
      margin-bottom: 0.25rem;
    }

    .error-message-detail {
      font-size: 0.8125rem;
      opacity: 0.9;
    }

    .error-actions {
      display: flex;
      gap: 0.5rem;
      margin-left: 1.5rem;
    }

    .error-retry-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.375rem;
      padding: 0.375rem 0.75rem;
      background: transparent;
      border: 1px solid currentColor;
      border-radius: var(--radius-pill);
      color: inherit;
      font-size: 0.75rem;
      font-family: inherit;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .error-retry-btn:hover {
      background: #dc2626;
      border-color: #dc2626;
      color: white;
    }

    .error-retry-btn svg {
      width: 12px;
      height: 12px;
    }

    /* ===== CANCEL BUTTON STATE ===== */
    .send-btn.cancel-mode {
      background: var(--confidence-low);
    }

    .send-btn.cancel-mode:hover:not(:disabled) {
      background: #ef4444;
    }

    /* ===== SCROLLBAR ===== */
    .chat-area::-webkit-scrollbar,
    .source-modal-body::-webkit-scrollbar {
      width: 6px;
    }

    .chat-area::-webkit-scrollbar-track,
    .source-modal-body::-webkit-scrollbar-track {
      background: transparent;
    }

    .chat-area::-webkit-scrollbar-thumb,
    .source-modal-body::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    .chat-area::-webkit-scrollbar-thumb:hover,
    .source-modal-body::-webkit-scrollbar-thumb:hover {
      background: var(--text-muted);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 640px) {
      .chat-area {
        padding: 1rem;
      }

      .message {
        max-width: 92%;
      }

      .input-area {
        padding: 0.875rem 1rem;
      }

      .voice-btn span {
        display: none;
      }
    }

    /* ===== MOBILE: SAFE AREA HANDLING ===== */
    @supports (padding: env(safe-area-inset-top)) {
      .input-area {
        padding-bottom: calc(0.875rem + env(safe-area-inset-bottom));
      }
      .app-container {
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
      }
    }

    /* ===== MOBILE: TOUCH TARGETS ===== */
    @media (max-width: 768px) {
      .question-chip {
        min-height: 44px;
        padding: 0.75rem 1rem;
      }
      .source-item {
        min-height: 44px;
        padding: 0.75rem;
      }
      .new-chat-btn,
      .voice-btn {
        min-height: 44px;
        min-width: 44px;
      }
      .confidence-badge {
        min-height: 36px;
        padding: 0.5rem 0.75rem;
      }
      .error-retry-btn {
        min-height: 44px;
        padding: 0.625rem 1rem;
      }
    }

    /* ===== MOBILE: INPUT OPTIMIZATION ===== */
    @media (max-width: 768px) {
      .message-input {
        font-size: 16px !important;
      }
      .input-area {
        gap: 0.5rem;
      }
      .message-input {
        padding: 0.875rem 1rem;
        min-height: 48px;
      }
      .send-btn {
        min-height: 48px;
        min-width: 48px;
      }
    }

    /* ===== MOBILE: VIEWPORT FIXES ===== */
    html {
      overscroll-behavior: none;
      scroll-behavior: smooth;
    }

    body {
      overscroll-behavior-y: contain;
      -webkit-overflow-scrolling: touch;
    }

    .chat-area {
      overscroll-behavior: contain;
    }

    /* ===== MOBILE: LANDSCAPE ORIENTATION ===== */
    @media (max-height: 500px) and (orientation: landscape) {
      .welcome-panel {
        padding: 1rem;
      }
      .welcome-logo {
        width: 160px;
        margin-bottom: 0.75rem;
      }
    }

  </style>
</head>
<body>
  <!-- Access Gate -->
  <div class="access-gate" id="accessGate">
    <div class="access-gate-card">
      <img src="assets/icons/nta-logo.svg" alt="Nutritional Therapy Association" style="width:180px;margin:0 auto 1.5rem;display:block;">
      <p>Enter your password to continue.</p>
      <input
        type="password"
        class="access-gate-input"
        id="accessCodeInput"
        placeholder="Password"
        autocomplete="off"
        onkeydown="if(event.key==='Enter')submitAccessCode()"
      >
      <button class="access-gate-btn" id="accessCodeBtn" onclick="submitAccessCode()">Continue</button>
      <div class="access-gate-error" id="accessCodeError">Incorrect password. Please try again.</div>
    </div>
  </div>

  <div class="app-container">
    <h1 class="sr-only">NTA Bot</h1>
    <a href="dashboard.html" class="dashboard-icon" title="Analytics Dashboard">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="20" x2="18" y2="10"></line>
        <line x1="12" y1="20" x2="12" y2="4"></line>
        <line x1="6" y1="20" x2="6" y2="14"></line>
      </svg>
    </a>

    <!-- Chat Area -->
    <main class="chat-area" id="chatArea">
      <!-- Welcome panel is generated dynamically by JavaScript -->
    </main>

    <!-- Input Area -->
    <footer class="input-area">
      <div class="input-container">
        <button class="new-chat-btn" id="newChatBtn" onclick="startNewChat()" title="New conversation" aria-label="Start new conversation">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 20h9"></path>
            <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path>
          </svg>
        </button>
        <button class="voice-btn" id="voiceBtn" onclick="toggleSpeechToText()" title="Voice input" aria-label="Toggle voice input">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
            <line x1="12" y1="19" x2="12" y2="23"></line>
            <line x1="8" y1="23" x2="16" y2="23"></line>
          </svg>
        </button>
        <div class="input-wrapper">
          <textarea
            class="message-input"
            id="messageInput"
            placeholder="Ask me anything..."
            aria-label="Ask me anything"
            rows="1"
            inputmode="text"
            enterkeyhint="send"
            autocapitalize="sentences"
            autocomplete="off"
            autocorrect="on"
            spellcheck="true"
            onkeydown="handleKeyDown(event)"
            oninput="autoResize(this)"
          ></textarea>
        </div>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="Send message">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>

    // Device info (computed once, cached for session)
    function getDeviceInfo() {
      const cached = sessionStorage.getItem('nta_device');
      if (cached) { try { return JSON.parse(cached); } catch {} }

      const ua = navigator.userAgent;
      let browser = 'Unknown', os = 'Unknown', deviceType = 'Desktop';

      // Browser detection
      if (ua.includes('Edg/')) browser = 'Edge';
      else if (ua.includes('Chrome/') && !ua.includes('Edg/')) browser = 'Chrome';
      else if (ua.includes('Safari/') && !ua.includes('Chrome/')) browser = 'Safari';
      else if (ua.includes('Firefox/')) browser = 'Firefox';

      // OS detection
      if (ua.includes('Windows')) os = 'Windows';
      else if (ua.includes('Mac OS X') || ua.includes('Macintosh')) os = 'macOS';
      else if (ua.includes('iPhone') || ua.includes('iPad')) os = 'iOS';
      else if (ua.includes('Android')) os = 'Android';
      else if (ua.includes('Linux')) os = 'Linux';
      else if (ua.includes('CrOS')) os = 'ChromeOS';

      // Device type
      if (ua.includes('iPhone') || (ua.includes('Android') && ua.includes('Mobile'))) deviceType = 'Mobile';
      else if (ua.includes('iPad') || (ua.includes('Android') && !ua.includes('Mobile'))) deviceType = 'Tablet';
      else if (navigator.maxTouchPoints > 0 && screen.width < 1024) deviceType = 'Mobile';

      const resolution = screen.width + 'x' + screen.height;

      const info = { device_type: deviceType, browser, os, screen_resolution: resolution };
      sessionStorage.setItem('nta_device', JSON.stringify(info));
      return info;

    // Topic classifier via n8n webhook (async, non-blocking, 10s timeout)

    async function classifyTopic(question) {

        const controller = new AbortController();
        setTimeout(() => controller.abort(), 10000);
        const resp = await fetch(TOPIC_LABEL_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question: question }),
          signal: controller.signal
        });
        if (!resp.ok) return null;
        const data = await resp.json();
        return {
          topic_category: data.topic_category || null,
          topic_label: data.topic_label || null
        };
      } catch (e) {
        return null;
      }
    }

    // Log a completed query with all metadata

      const sourceTopics = sources.map(s => {
        const h = s.section_hierarchy || [];
        return h.length > 1 ? h.join(' > ') : h[0] || 'Unknown';
      });
      const sourceDocuments = [...new Set(sources.map(s => s.document_name || 'Unknown'))];
      const confidence = responseData.confidence?.level || 'Medium';
      const answerSummary = (responseData.answer || '').substring(0, 300);
      const geo = getGeoData();
      const sourceTypes = deriveSourceTypes(sourceTopics);
      const device = getDeviceInfo();

      // Fallback label from first source topic
      const fallbackLabel = sourceTopics.length > 0 ? sourceTopics[0].replace('Podcast > ', '') : 'General';

      const logEntry = {
        question: question,
        answer_summary: answerSummary,
        confidence_level: confidence,
        source_topics: sourceTopics,
        source_documents: sourceDocuments,
        source_count: sources.length,
        topic_label: fallbackLabel,
        topic_category: null,
        source_types: sourceTypes,
        session_id: getSessionId(),
        city: geo.city || null,
        country: geo.country || null,
        device_type: device.device_type,
        browser: device.browser,
        os: device.os,
        screen_resolution: device.screen_resolution,
        latency_ms: elapsedMs || null
      };

      // Log right away with fallback label
      logToSupabase(logEntry);

      // Async: get proper category + label from GPT-4o-mini, then PATCH
      classifyTopic(question).then(result => {
        if (!result) return;
        const updates = {};
        if (result.topic_label) updates.topic_label = result.topic_label;
        if (result.topic_category) updates.topic_category = result.topic_category;
        if (Object.keys(updates).length === 0) return;

        fetch(`${SUPABASE_URL}/rest/v1/nta_query_log?question=eq.${encodeURIComponent(question)}&session_id=eq.${encodeURIComponent(getSessionId())}&order=created_at.desc&limit=1`, {
          method: 'PATCH',
          headers: {
            'apikey': SUPABASE_ANON_KEY,
            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
            'Content-Type': 'application/json',
            'Prefer': 'return=minimal'
          },
          body: JSON.stringify(updates),
          keepalive: true
        }).catch(() => {});
      });

    // ===== MESSAGE RENDERING =====
    function renderUserMessage(text) {
      return `
        <div class="message message-user">
          <div class="message-content">

      `;

    function renderBotMessage(response) {
      let rawAnswer = response.answer || response.response || 'No response received.';
      let sources = response.sources || [];
      let confidence = response.confidence || null;

      // Safety net: extract embedded JSON if parsing failed upstream
      if (sources.length === 0 && rawAnswer.includes('"answer"')) {
        try {
          const fenceMatch = rawAnswer.match(/```(?:json)?\s*([\s\S]*?)```/);
          if (fenceMatch) {
            const parsed = JSON.parse(fenceMatch[1].trim());
            if (parsed.answer) rawAnswer = parsed.answer;
            if (parsed.sources) sources = parsed.sources;
          }
        } catch (e) {
          console.warn('[Frontend Safety Net] JSON extraction failed:', e.message);
        }
      }

      if (!confidence || !confidence.level) {
        const confidenceMatch = rawAnswer.match(/\*\*Confidence:\*\*\s*(High|Medium|Low)/i) ||
                                rawAnswer.match(/Confidence:\s*(High|Medium|Low)/i);
        if (confidenceMatch) {
          const level = confidenceMatch[1];
          const explanationMatch = rawAnswer.match(/Confidence:\s*(?:High|Medium|Low)\s*[---]\s*([^\n]+)/i);
          confidence = {
            level: level.charAt(0).toUpperCase() + level.slice(1).toLowerCase(),
            explanation: explanationMatch ? explanationMatch[1].trim() : ''
          };
        } else {
          confidence = { level: 'Medium', explanation: 'Confidence level not provided.' };
        }
      }

      let cleanAnswer = rawAnswer
        .replace(/\*\*Confidence:\*\*[^\n]*/gi, '')
        .replace(/Confidence:\s*(?:High|Medium|Low)\s*[---][^\n]*/gi, '')
        .replace(/\*\*Short Answer:?\*\*\s*/gi, '')
        .replace(/\*\*Requirements:?\*\*\s*/gi, '')
        .replace(/\*\*Sources:?\*\*[\s\S]*$/gi, '')
        .replace(/\*\*Additional Notes:?\*\*\s*/gi, '')
        .trim();

      const validLevels = ['high', 'medium', 'low'];
      const normalizedLevel = confidence.level ? confidence.level.toLowerCase() : 'medium';
      const confidenceClass = validLevels.includes(normalizedLevel) ? normalizedLevel : 'medium';
      const messageId = 'msg-' + Date.now() + '-' + Math.random().toString(36).substring(2, 7);

      let sourcesHtml = '';
      const validSources = sources.filter(s => s && (s.content || s.section_title || s.document_name));
      if (validSources.length > 0) {
        // Group sources by document_name
        const grouped = {};
        validSources.forEach((source, index) => {
          const key = source.document_name || 'Unknown';
          if (!grouped[key]) grouped[key] = [];
          grouped[key].push({ ...source, _originalIndex: index });
        });

        const sourceCards = Object.entries(grouped).map(([docName, sections]) => {
          return renderGroupedSource(docName, sections, messageId);
        }).join('');

        sourcesHtml = `
          <div class="sources-section">
            <div class="sources-title">Sources & References</div>
            ${sourceCards}
          </div>
        `;
      }

      return `
        <div class="message message-bot" id="${messageId}">
          <div class="message-content">
            <div class="message-header">
              <div class="message-header-left">
                <span class="message-sender">NTA Bot</span>
              </div>
              <div class="message-header-right">
                <span class="confidence-badge confidence-${confidenceClass}" onclick="toggleConfidenceTooltip(this, event)" data-explanation="${escapeHtml(confidence.explanation || 'No additional details available.')}">
                  <span class="confidence-dot"></span>
                  ${escapeHtml(confidence.level || 'Medium')}
                  <div class="confidence-tooltip">${escapeHtml(confidence.explanation || 'No additional details available.')}</div>
                </span>
                <button class="speak-btn" onclick="speakMessage(this)" title="Read aloud">

    function openSourceModal(sourceId) {
      const data = sourceDataStore[sourceId];

    function formatAnswerText(text) {
      if (!text) return '';
      let html = escapeHtml(text);
      // Inline formatting (order matters: bold before italic)
      html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      html = html.replace(/(?<!\*)\*(?!\*)(.+?)(?<!\*)\*(?!\*)/g, '<em>$1</em>');
      html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
      // Block-level: split into lines and detect lists
      const lines = html.split('\n');
      let listType = null; // 'ul' | 'ol' | null
      let result = [];
      for (let i = 0; i < lines.length; i++) {
        const line = lines[i].trim();
        const bulletMatch = line.match(/^[-\u2022]\s+(.+)/);
        const numberMatch = line.match(/^\d+[.)]\s+(.+)/);
        if (bulletMatch) {
          if (listType !== 'ul') { if (listType) result.push(`</${listType}>`); result.push('<ul>'); listType = 'ul'; }
          result.push(`<li>${bulletMatch[1]}</li>`);
        } else if (numberMatch) {
          if (listType !== 'ol') { if (listType) result.push(`</${listType}>`); result.push('<ol>'); listType = 'ol'; }
          result.push(`<li>${numberMatch[1]}</li>`);
        } else {
          if (listType) { result.push(`</${listType}>`); listType = null; }
          if (line) result.push(`<p>${line}</p>`);
        }
      }
      if (listType) result.push(`</${listType}>`);
      html = result.join('');
      html = html.replace(/<p><\/p>/g, '');
      return html || '<p>No answer available.</p>';
    }

    // ===== TYPING INDICATOR =====
    const TYPING_STAGES = [

    let _typingCurrentStage = -1;

    function getStageForElapsed(elapsed) {
      let stage = TYPING_STAGES[0];
      for (const s of TYPING_STAGES) {
        if (elapsed >= s.at) stage = s;
      }
      return stage;
    }

    function renderTypingIndicator(message, retryInfo) {
      const stageMessage = message || 'Searching the knowledge base...';
      const retryHtml = retryInfo ? `<div class="typing-retry">${retryInfo}</div>` : '';
      return `
        <div class="message message-bot" id="typingIndicator">
          <div class="typing-indicator" style="--progress: 0%">
            <div class="typing-content">
              <div class="typing-dots">

    }

    function showTypingIndicator(message, retryInfo) {
      const chatArea = document.getElementById('chatArea');
      const existing = document.getElementById('typingIndicator');
      if (existing) existing.remove();
      _typingCurrentStage = -1;
      chatArea.insertAdjacentHTML('beforeend', renderTypingIndicator(message, retryInfo));
      scrollToBottom();
      typingStartTime = Date.now();
      if (typingIntervalId) clearInterval(typingIntervalId);
      typingIntervalId = setInterval(() => {
        const elapsed = Math.floor((Date.now() - typingStartTime) / 1000);
        if (retryInfo) return;
        const stage = getStageForElapsed(elapsed);
        const stageIndex = TYPING_STAGES.indexOf(stage);
        // Interpolate progress smoothly between stages
        const nextStage = TYPING_STAGES[stageIndex + 1];
        let progress = stage.glow;
        if (nextStage) {
          const stageElapsed = elapsed - stage.at;
          const stageDuration = nextStage.at - stage.at;
          const t = Math.min(stageElapsed / stageDuration, 1);
          progress = stage.glow + (nextStage.glow - stage.glow) * t;
        }
        const indicator = document.querySelector('#typingIndicator .typing-indicator');
        if (indicator) indicator.style.setProperty('--progress', progress + '%');
        // Update message when stage changes
        if (stageIndex !== _typingCurrentStage) {
          _typingCurrentStage = stageIndex;
          const messageEl = document.querySelector('#typingIndicator .typing-message');
          if (messageEl) {
            messageEl.classList.add('fade');
            setTimeout(() => {
              messageEl.textContent = stage.messages[Math.floor(Math.random() * stage.messages.length)];
              messageEl.classList.remove('fade');
            }, 300);
          }
        }
      }, 1000);
    }

    function updateTypingIndicator(message, retryInfo) {
      const indicator = document.getElementById('typingIndicator');
      if (!indicator) return;
      const messageEl = indicator.querySelector('.typing-message');
      if (messageEl) messageEl.textContent = message;
      const statusEl = indicator.querySelector('.typing-status');
      let retryEl = indicator.querySelector('.typing-retry');
      if (retryInfo && statusEl) {
        if (retryEl) { retryEl.textContent = retryInfo; }
        else { statusEl.insertAdjacentHTML('beforeend', `<div class="typing-retry">${escapeHtml(retryInfo)}</div>`); }
      } else if (retryEl) { retryEl.remove(); }
    }

    function hideTypingIndicator() {
      if (typingIntervalId) { clearInterval(typingIntervalId); typingIntervalId = null; }

      const indicator = document.getElementById('typingIndicator');

        // Flash glow to 100% before removing
        const glow = indicator.querySelector('.typing-indicator');

    // ===== ERROR CLASSIFICATION =====
    const ErrorTypes = {
      NETWORK: 'network', TIMEOUT: 'timeout', CANCELLED: 'cancelled',
      SERVER: 'server', RATE_LIMITED: 'rate_limited', BAD_RESPONSE: 'bad_response', UNKNOWN: 'unknown'
    };

    function classifyError(error, response) {
      if (wasCancelled) return ErrorTypes.CANCELLED;
      if (error.name === 'AbortError') return ErrorTypes.TIMEOUT;
      if (error instanceof TypeError || !navigator.onLine) return ErrorTypes.NETWORK;
      if (response) {
        if (response.status === 429) return ErrorTypes.RATE_LIMITED;
        if (response.status >= 500) return ErrorTypes.SERVER;
      }
      if (error.message && error.message.includes('JSON')) return ErrorTypes.BAD_RESPONSE;
      return ErrorTypes.UNKNOWN;
    }

    function getErrorDetails(errorType, elapsedTime) {
      const details = {
        [ErrorTypes.NETWORK]: { title: 'Connection failed', message: 'Unable to reach the server. Please check your internet connection.', icon: 'wifi-off', canRetry: true },
        [ErrorTypes.TIMEOUT]: { title: 'Request timed out', message: `The server took too long to respond${elapsedTime ? ` (${elapsedTime}s)` : ''}. It may be busy.`, icon: 'clock', canRetry: true },
        [ErrorTypes.CANCELLED]: { title: 'Request cancelled', message: 'You cancelled the request.', icon: 'x-circle', canRetry: false },
        [ErrorTypes.SERVER]: { title: 'Server error', message: 'The server encountered an error. Please try again in a moment.', icon: 'server', canRetry: true },
        [ErrorTypes.RATE_LIMITED]: { title: 'Too many requests', message: 'Please wait a moment before sending another message.', icon: 'alert-triangle', canRetry: false },
        [ErrorTypes.BAD_RESPONSE]: { title: 'Invalid response', message: 'Received an unexpected response from the server.', icon: 'alert-circle', canRetry: true },
        [ErrorTypes.UNKNOWN]: { title: 'Something went wrong', message: 'An unexpected error occurred. Please try again.', icon: 'alert-circle', canRetry: true }
      };
      return details[errorType] || details[ErrorTypes.UNKNOWN];
    }

    function getErrorIcon(iconName) {
      const icons = {
        'wifi-off': '<path d="M1 1l22 22M16.72 11.06A10.94 10.94 0 0 1 19 12.55M5 12.55a10.94 10.94 0 0 1 5.17-2.39M10.71 5.05A16 16 0 0 1 22.58 9M1.42 9a15.91 15.91 0 0 1 4.7-2.88M8.53 16.11a6 6 0 0 1 6.95 0M12 20h.01"></path>',
        'clock': '<circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline>',
        'x-circle': '<circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line>',
        'server': '<rect x="2" y="2" width="20" height="8" rx="2" ry="2"></rect><rect x="2" y="14" width="20" height="8" rx="2" ry="2"></rect><line x1="6" y1="6" x2="6.01" y2="6"></line><line x1="6" y1="18" x2="6.01" y2="18"></line>',
        'alert-triangle': '<path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line>',
        'alert-circle': '<circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line>'
      };
      return icons[iconName] || icons['alert-circle'];
    }

    function renderError(errorType, elapsedTime) {
      const details = getErrorDetails(errorType, elapsedTime);
      const iconPath = getErrorIcon(details.icon);
      const retryButton = details.canRetry && lastMessageForRetry ? `
        <div class="error-actions">
          <button class="error-retry-btn" onclick="retryLastMessage()">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"></polyline><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path></svg>

      ` : '';
      return `
        <div class="message message-bot">
          <div class="error-message">
            <div class="error-message-content">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${iconPath}</svg>
              <div class="error-message-text">
                <div class="error-message-title">${escapeHtml(details.title)}</div>
                <div class="error-message-detail">${escapeHtml(details.message)}</div>

    }

    // ===== UTILITIES =====
    function escapeHtml(text) {
      if (!text) return '';
      return String(text).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    function scrollToBottom() {
      const chatArea = document.getElementById('chatArea');
      chatArea.scrollTop = chatArea.scrollHeight;
    }

    // ===== SEND BUTTON MANAGEMENT =====
    function setSendButtonMode(mode) {
      const sendBtn = document.getElementById('sendBtn');
      if (!sendBtn) return;
      if (mode === 'cancel') {
        sendBtn.classList.add('cancel-mode');
        sendBtn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>`;
        sendBtn.title = 'Cancel request';
        sendBtn.onclick = cancelCurrentRequest;
        sendBtn.disabled = false;
      } else {
        sendBtn.classList.remove('cancel-mode');
        sendBtn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>`;
        sendBtn.title = 'Send message';
        sendBtn.onclick = sendMessage;
      }
    }

    function resetSendButton() {
      setSendButtonMode('send');
      const sendBtn = document.getElementById('sendBtn');
      const input = document.getElementById('messageInput');
      if (sendBtn) sendBtn.disabled = false;
      if (input) input.disabled = false;
    }

    function cancelCurrentRequest() {
      if (currentAbortController) { wasCancelled = true; currentAbortController.abort(); }
    }

    // ===== RETRY LOGIC =====
    function isRetryableError(errorType) {
      return [ErrorTypes.NETWORK, ErrorTypes.TIMEOUT, ErrorTypes.SERVER].includes(errorType);
    }

    function sleep(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }

    async function sendMessageAttempt(message, signal) {
      const response = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          message: message,
          session_id: getSessionId(),
          access_code: getAccessCode()
        }),
        signal: signal
      });
      if (!response.ok) {
        const error = new Error(`HTTP error! status: ${response.status}`);
        error.response = response;
        throw error;
      }
      return await response.json();
    }

    async function sendMessageWithRetry(message, signal) {
      let lastError;
      let lastErrorType = ErrorTypes.UNKNOWN;
      for (let attempt = 1; attempt <= MAX_RETRIES; attempt++) {
        try {
          if (attempt === 1) wasCancelled = false;
          return await sendMessageAttempt(message, signal);
        } catch (error) {
          lastError = error;
          lastErrorType = classifyError(error, error.response);
          if (wasCancelled || !isRetryableError(lastErrorType)) throw error;
          if (attempt === MAX_RETRIES) throw error;
          const delay = Math.pow(2, attempt - 1) * RETRY_DELAY_BASE_MS;
          updateTypingIndicator(`Retrying...`, `Attempt ${attempt + 1} of ${MAX_RETRIES} in ${delay / 1000}s`);
          await sleep(delay);
          updateTypingIndicator('Searching curriculum...', `Attempt ${attempt + 1} of ${MAX_RETRIES}`);
        }
      }
      throw lastError;
    }

    // ===== API COMMUNICATION =====
    async function sendMessage() {
      const input = document.getElementById('messageInput');
      const message = input.value.trim();
      if (!message || isLoading) return;

      lastMessageForRetry = message;
      wasCancelled = false;
      input.value = '';
      autoResize(input);

      const chatArea = document.getElementById('chatArea');
      chatArea.insertAdjacentHTML('beforeend', renderUserMessage(message));
      showTypingIndicator();

      currentAbortController = new AbortController();
      const timeoutId = setTimeout(() => { if (currentAbortController) currentAbortController.abort(); }, REQUEST_TIMEOUT_MS);

      isLoading = true;
      input.disabled = true;
      setSendButtonMode('cancel');

      let elapsedTime = null;
      try {
        const data = await sendMessageWithRetry(message, currentAbortController.signal);
        if (typingStartTime) elapsedTime = Math.floor((Date.now() - typingStartTime) / 1000);
        hideTypingIndicator();
        chatArea.insertAdjacentHTML('beforeend', renderBotMessage(data));
        messages.push({ role: 'user', content: message });
        messages.push({ role: 'assistant', content: data });
        lastMessageForRetry = null;

        // Log query for analytics (async, non-blocking)
        logQuery(message, data, elapsedTime ? elapsedTime * 1000 : null);
      } catch (error) {
        console.error('Error sending message:', error);
        if (typingStartTime) elapsedTime = Math.floor((Date.now() - typingStartTime) / 1000);
        hideTypingIndicator();
        const errorType = classifyError(error, error.response);
        if (errorType !== ErrorTypes.CANCELLED) {
          chatArea.insertAdjacentHTML('beforeend', renderError(errorType, elapsedTime));
        }
      } finally {
        clearTimeout(timeoutId);
        currentAbortController = null;
        isLoading = false;
        resetSendButton();
        input.disabled = false;
        input.focus();
      }
      scrollToBottom();
    }

    // ===== SPEECH-TO-TEXT (replaces voice mode) =====
    let recognition = null;
    let isListening = false;

    function toggleSpeechToText() {
      const voiceBtn = document.getElementById('voiceBtn');

      if (isListening && recognition) {
        recognition.stop();
        return;
      }

      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) {
        voiceBtn.title = 'Speech recognition not supported in this browser';
        setTimeout(() => { voiceBtn.title = 'Voice input'; }, 3000);
        return;
      }

      recognition = new SpeechRecognition();
      recognition.continuous = true;
      recognition.interimResults = true;
      recognition.lang = 'en-US';

      recognition.onstart = () => {
        isListening = true;
        voiceBtn.classList.add('listening');
      };

      recognition.onresult = (event) => {
        const input = document.getElementById('messageInput');
        let transcript = '';
        for (let i = 0; i < event.results.length; i++) {
          transcript += event.results[i][0].transcript;
        }
        input.value = transcript;
        autoResize(input);
      };

      recognition.onend = () => {
        isListening = false;
        voiceBtn.classList.remove('listening');
        recognition = null;
      };

      recognition.onerror = (event) => {
        isListening = false;
        voiceBtn.classList.remove('listening');
        recognition = null;
      };

      recognition.start();
    }

    // ===== TEXT-TO-SPEECH (TTS) =====
    const TTS_API_URL = 'https://n8n.srv1208741.hstgr.cloud/webhook/nta-tts';

    let currentTTSAudio = null;
    let ttsAudioUrl = null;
    let pendingTTSButton = null;
    const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
    const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);

    async function speakMessage(button) {
      if (button.classList.contains('speaking') || button.classList.contains('loading')) { stopSpeaking(); return; }
      stopSpeaking();
      const messageEl = button.closest('.message-bot');
      if (!messageEl) return;
      const answerTextEl = messageEl.querySelector('.answer-text');
      if (!answerTextEl) return;
      const text = answerTextEl.getAttribute('data-raw-answer') || answerTextEl.textContent;
      if (!text || text.trim().length === 0) return;
      button.classList.add('loading');
      try {
        if (isMobile) { await playAudioBlob(text.trim(), button); return; }
        const response = await fetch(TTS_API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text: text.trim(), access_code: getAccessCode() })
        });
        if (!response.ok) throw new Error('TTS request failed');
        await playAudioBlob(text.trim(), button);
      } catch (error) {
        console.error('[TTS] Error:', error);
        button.classList.remove('loading', 'speaking');
        if (error.name === 'NotAllowedError') { showTapToPlay(button); return; }
        button.title = 'Audio unavailable';
        setTimeout(() => { button.title = 'Read aloud'; }, 2000);
      }
    }

    function showTapToPlay(button) {
      pendingTTSButton = button;
      button.classList.add('tap-to-play');
      button.title = 'Tap to play audio';
    }

    async function playAudioBlob(text, button) {
      const response = await fetch(TTS_API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text, access_code: getAccessCode() })
      });
      if (!response.ok) throw new Error('TTS request failed');
      const audioBlob = await response.blob();
      ttsAudioUrl = URL.createObjectURL(audioBlob);
      currentTTSAudio = new Audio(ttsAudioUrl);
      if (isIOS) { currentTTSAudio.playsInline = true; currentTTSAudio.setAttribute('playsinline', ''); }
      currentTTSAudio.onplay = () => { button.classList.remove('loading', 'tap-to-play'); button.classList.add('speaking'); pendingTTSButton = null; };
      currentTTSAudio.onended = () => { button.classList.remove('speaking'); cleanupTTSAudio(); };
      currentTTSAudio.onerror = () => { button.classList.remove('loading', 'speaking', 'tap-to-play'); cleanupTTSAudio(); };
      await currentTTSAudio.play();
    }

    function cleanupTTSAudio() {
      if (ttsAudioUrl) { URL.revokeObjectURL(ttsAudioUrl); ttsAudioUrl = null; }
      currentTTSAudio = null; pendingTTSButton = null;
    }

    function stopSpeaking() {
      if (currentTTSAudio) { currentTTSAudio.pause(); currentTTSAudio.currentTime = 0; }
      cleanupTTSAudio();
      document.querySelectorAll('.speak-btn.speaking, .speak-btn.loading').forEach(btn => btn.classList.remove('speaking', 'loading'));
    }

    // ===== PWA: SERVICE WORKER =====
    async function registerServiceWorker() {
      if ('serviceWorker' in navigator) {
        try {
          const registration = await navigator.serviceWorker.register('./sw.js');
          registration.addEventListener('updatefound', () => {
            const newWorker = registration.installing;
            newWorker.addEventListener('statechange', () => {
              if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                console.log('[PWA] New version available');
              }
            });
          });
        } catch (error) { console.error('[PWA] Service worker registration failed:', error); }
      }
    }

    // ===== INITIALIZATION =====
    document.addEventListener('DOMContentLoaded', () => {
      checkAccessGate();
      getSessionId();
      fetchGeolocation();

      const chatArea = document.getElementById('chatArea');
      if (chatArea) chatArea.innerHTML = generateWelcomePanel();

      const messageInput = document.getElementById('messageInput');
      if (messageInput) messageInput.focus();

      registerServiceWorker();
    });
  </script>

  <!-- Source Text Modal -->
  <div class="source-modal-overlay" id="sourceModal" onclick="if(event.target === this) closeSourceModal()">
    <div class="source-modal">
      <div class="source-modal-header">
        <div class="source-modal-title" id="sourceModalTitle"></div>
        <button class="source-modal-close" onclick="closeSourceModal()">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
      <div class="source-modal-body" id="sourceModalBody"></div>
    </div>
  </div>
