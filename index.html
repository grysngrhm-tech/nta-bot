    function updateTypingIndicator(message, retryInfo) {
      const indicator = document.getElementById('typingIndicator');
      if (!indicator) return;
      const messageEl = indicator.querySelector('.typing-message');
      if (messageEl) messageEl.textContent = message;
      const statusEl = indicator.querySelector('.typing-status');
      let retryEl = indicator.querySelector('.typing-retry');
      if (retryInfo && statusEl) {
        if (retryEl) { retryEl.textContent = retryInfo; }
        else { statusEl.insertAdjacentHTML('beforeend', `<div class="typing-retry">${escapeHtml(retryInfo)}</div>`); }
      } else if (retryEl) { retryEl.remove(); }
    }

    function hideTypingIndicator() {
      if (typingIntervalId) { clearInterval(typingIntervalId); typingIntervalId = null; }
      typingStartTime = null;
      const indicator = document.getElementById('typingIndicator');
      if (indicator) indicator.remove();
    }

    // ===== ERROR CLASSIFICATION =====
    const ErrorTypes = {
      NETWORK: 'network', TIMEOUT: 'timeout', CANCELLED: 'cancelled',
      SERVER: 'server', RATE_LIMITED: 'rate_limited', BAD_RESPONSE: 'bad_response', UNKNOWN: 'unknown'
    };

    function classifyError(error, response) {
      if (wasCancelled) return ErrorTypes.CANCELLED;
      if (error.name === 'AbortError') return ErrorTypes.TIMEOUT;
      if (error instanceof TypeError || !navigator.onLine) return ErrorTypes.NETWORK;
      if (response) {
        if (response.status === 429) return ErrorTypes.RATE_LIMITED;
        if (response.status >= 500) return ErrorTypes.SERVER;
      }
      if (error.message && error.message.includes('JSON')) return ErrorTypes.BAD_RESPONSE;
      return ErrorTypes.UNKNOWN;
    }

    function getErrorDetails(errorType, elapsedTime) {
      const details = {
        [ErrorTypes.NETWORK]: { title: 'Connection failed', message: 'Unable to reach the server. Please check your internet connection.', icon: 'wifi-off', canRetry: true },
        [ErrorTypes.TIMEOUT]: { title: 'Request timed out', message: `The server took too long to respond${elapsedTime ? ` (${elapsedTime}s)` : ''}. It may be busy.`, icon: 'clock', canRetry: true },
        [ErrorTypes.CANCELLED]: { title: 'Request cancelled', message: 'You cancelled the request.', icon: 'x-circle', canRetry: false },
        [ErrorTypes.SERVER]: { title: 'Server error', message: 'The server encountered an error. Please try again in a moment.', icon: 'server', canRetry: true },
        [ErrorTypes.RATE_LIMITED]: { title: 'Too many requests', message: 'Please wait a moment before sending another message.', icon: 'alert-triangle', canRetry: false },
        [ErrorTypes.BAD_RESPONSE]: { title: 'Invalid response', message: 'Received an unexpected response from the server.', icon: 'alert-circle', canRetry: true },
        [ErrorTypes.UNKNOWN]: { title: 'Something went wrong', message: 'An unexpected error occurred. Please try again.', icon: 'alert-circle', canRetry: true }
      };
      return details[errorType] || details[ErrorTypes.UNKNOWN];
    }

    function getErrorIcon(iconName) {
      const icons = {
        'wifi-off': '<path d="M1 1l22 22M16.72 11.06A10.94 10.94 0 0 1 19 12.55M5 12.55a10.94 10.94 0 0 1 5.17-2.39M10.71 5.05A16 16 0 0 1 22.58 9M1.42 9a15.91 15.91 0 0 1 4.7-2.88M8.53 16.11a6 6 0 0 1 6.95 0M12 20h.01"></path>',
        'clock': '<circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline>',
        'x-circle': '<circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line>',
        'server': '<rect x="2" y="2" width="20" height="8" rx="2" ry="2"></rect><rect x="2" y="14" width="20" height="8" rx="2" ry="2"></rect><line x1="6" y1="6" x2="6.01" y2="6"></line><line x1="6" y1="18" x2="6.01" y2="18"></line>',
        'alert-triangle': '<path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line>',
        'alert-circle': '<circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line>'
      };
      return icons[iconName] || icons['alert-circle'];
    }

    function renderError(errorType, elapsedTime) {
      const details = getErrorDetails(errorType, elapsedTime);
      const iconPath = getErrorIcon(details.icon);
      const retryButton = details.canRetry && lastMessageForRetry ? `
        <div class="error-actions">
          <button class="error-retry-btn" onclick="retryLastMessage()">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"></polyline><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path></svg>
            Try again
          </button>
        </div>
      ` : '';
      return `
        <div class="message message-bot">
          <div class="error-message">
            <div class="error-message-content">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${iconPath}</svg>
              <div class="error-message-text">
                <div class="error-message-title">${escapeHtml(details.title)}</div>
                <div class="error-message-detail">${escapeHtml(details.message)}</div>
              </div>
            </div>
            ${retryButton}
          </div>
        </div>
      `;
    }

    function retryLastMessage() {
      if (lastMessageForRetry && !isLoading) {
        document.getElementById('messageInput').value = lastMessageForRetry;
        sendMessage();
      }
    }

    // ===== UTILITIES =====
    function escapeHtml(text) {
      if (!text) return '';
      return String(text).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    function scrollToBottom() {
      const chatArea = document.getElementById('chatArea');
      chatArea.scrollTop = chatArea.scrollHeight;
    }

    // ===== SEND BUTTON MANAGEMENT =====
    function setSendButtonMode(mode) {
      const sendBtn = document.getElementById('sendBtn');
      if (!sendBtn) return;
      if (mode === 'cancel') {
        sendBtn.classList.add('cancel-mode');
        sendBtn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>`;
        sendBtn.title = 'Cancel request';
        sendBtn.onclick = cancelCurrentRequest;
        sendBtn.disabled = false;
      } else {
        sendBtn.classList.remove('cancel-mode');
        sendBtn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>`;
        sendBtn.title = 'Send message';
        sendBtn.onclick = sendMessage;
      }
    }

    function resetSendButton() {
      setSendButtonMode('send');
      const sendBtn = document.getElementById('sendBtn');
      const input = document.getElementById('messageInput');
      if (sendBtn) sendBtn.disabled = false;
      if (input) input.disabled = false;
    }

    function cancelCurrentRequest() {
      if (currentAbortController) { wasCancelled = true; currentAbortController.abort(); }
    }

    // ===== RETRY LOGIC =====
    function isRetryableError(errorType) {
      return [ErrorTypes.NETWORK, ErrorTypes.TIMEOUT, ErrorTypes.SERVER].includes(errorType);
    }

    function sleep(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }

    async function sendMessageAttempt(message, signal) {
      const response = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          message: message,
          session_id: getSessionId(),
          access_code: getAccessCode()
        }),
        signal: signal
      });
      if (!response.ok) {
        const error = new Error(`HTTP error! status: ${response.status}`);
        error.response = response;
        throw error;
      }
      return await response.json();
    }

    async function sendMessageWithRetry(message, signal) {
      let lastError;
      let lastErrorType = ErrorTypes.UNKNOWN;
      for (let attempt = 1; attempt <= MAX_RETRIES; attempt++) {
        try {
          if (attempt === 1) wasCancelled = false;
          return await sendMessageAttempt(message, signal);
        } catch (error) {
          lastError = error;
          lastErrorType = classifyError(error, error.response);
          if (wasCancelled || !isRetryableError(lastErrorType)) throw error;
          if (attempt === MAX_RETRIES) throw error;
          const delay = Math.pow(2, attempt - 1) * RETRY_DELAY_BASE_MS;
          updateTypingIndicator(`Retrying...`, `Attempt ${attempt + 1} of ${MAX_RETRIES} in ${delay / 1000}s`);
          await sleep(delay);
          updateTypingIndicator('Searching curriculum...', `Attempt ${attempt + 1} of ${MAX_RETRIES}`);
        }
      }
      throw lastError;
    }

    // ===== API COMMUNICATION =====
    async function sendMessage() {
      const input = document.getElementById('messageInput');
      const message = input.value.trim();
      if (!message || isLoading) return;

      lastMessageForRetry = message;
      wasCancelled = false;
      input.value = '';
      autoResize(input);

      const chatArea = document.getElementById('chatArea');
      chatArea.insertAdjacentHTML('beforeend', renderUserMessage(message));
      showTypingIndicator();

      currentAbortController = new AbortController();
      const timeoutId = setTimeout(() => { if (currentAbortController) currentAbortController.abort(); }, REQUEST_TIMEOUT_MS);

      isLoading = true;
      input.disabled = true;
      setSendButtonMode('cancel');

      let elapsedTime = null;
      try {
        const data = await sendMessageWithRetry(message, currentAbortController.signal);
        if (typingStartTime) elapsedTime = Math.floor((Date.now() - typingStartTime) / 1000);
        hideTypingIndicator();
        chatArea.insertAdjacentHTML('beforeend', renderBotMessage(data));
        messages.push({ role: 'user', content: message });
        messages.push({ role: 'assistant', content: data });
        lastMessageForRetry = null;
      } catch (error) {
        console.error('Error sending message:', error);
        if (typingStartTime) elapsedTime = Math.floor((Date.now() - typingStartTime) / 1000);
        hideTypingIndicator();
        const errorType = classifyError(error, error.response);
        if (errorType !== ErrorTypes.CANCELLED) {
          chatArea.insertAdjacentHTML('beforeend', renderError(errorType, elapsedTime));
        }
      } finally {
        clearTimeout(timeoutId);
        currentAbortController = null;
        isLoading = false;
        resetSendButton();
        input.disabled = false;
        input.focus();
      }
      scrollToBottom();
    }

    // ===== VOICE MODE =====
    const VOICE_API_URL = 'https://n8n.srv1208741.hstgr.cloud/webhook/nta-voice-session';
    const TTS_API_URL = 'https://n8n.srv1208741.hstgr.cloud/webhook/nta-tts';

    let voiceState = 'idle';
    let peerConnection = null;
    let dataChannel = null;
    let localStream = null;
    let voiceSessionActive = false;
    let voiceMode = false;
    let currentVoiceTranscript = '';
    let currentTTSAudio = null;
    let transcriptionTimeout = null;
    let ttsAudioUrl = null;
    let pendingTTSButton = null;
    const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
    const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);

    async function speakMessage(button) {
      if (button.classList.contains('speaking') || button.classList.contains('loading')) { stopSpeaking(); return; }
      stopSpeaking();
      const messageEl = button.closest('.message-bot');
      if (!messageEl) return;
      const answerTextEl = messageEl.querySelector('.answer-text');
      if (!answerTextEl) return;
      const text = answerTextEl.getAttribute('data-raw-answer') || answerTextEl.textContent;
      if (!text || text.trim().length === 0) return;
      button.classList.add('loading');
      if (voiceMode) setVoiceInputState('speaking');
      try {
        if (isMobile) { await playAudioBlob(text.trim(), button); return; }
        const response = await fetch(TTS_API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text: text.trim(), access_code: getAccessCode() })
        });
        if (!response.ok) throw new Error('TTS request failed');
        await playAudioBlob(text.trim(), button);
      } catch (error) {
        console.error('[TTS] Error:', error);
        button.classList.remove('loading', 'speaking');
        if (error.name === 'NotAllowedError') { showTapToPlay(button); return; }
        if (voiceMode) stopVoiceMode();
        button.title = 'Audio unavailable';
        setTimeout(() => { button.title = 'Read aloud'; }, 2000);
      }
    }

    function showTapToPlay(button) {
      pendingTTSButton = button;
      button.classList.add('tap-to-play');
      button.title = 'Tap to play audio';
    }

    async function playAudioBlob(text, button) {
      const response = await fetch(TTS_API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text, access_code: getAccessCode() })
      });
      if (!response.ok) throw new Error('TTS request failed');
      const audioBlob = await response.blob();
      ttsAudioUrl = URL.createObjectURL(audioBlob);
      currentTTSAudio = new Audio(ttsAudioUrl);
      if (isIOS) { currentTTSAudio.playsInline = true; currentTTSAudio.setAttribute('playsinline', ''); }
      currentTTSAudio.onplay = () => { button.classList.remove('loading', 'tap-to-play'); button.classList.add('speaking'); pendingTTSButton = null; };
      currentTTSAudio.onended = () => { button.classList.remove('speaking'); cleanupTTSAudio(); if (voiceMode) stopVoiceMode(); };
      currentTTSAudio.onerror = () => { button.classList.remove('loading', 'speaking', 'tap-to-play'); cleanupTTSAudio(); };
      await currentTTSAudio.play();
    }

    function cleanupTTSAudio() {
      if (ttsAudioUrl) { URL.revokeObjectURL(ttsAudioUrl); ttsAudioUrl = null; }
      currentTTSAudio = null; pendingTTSButton = null;
    }

    function stopSpeaking() {
      if (currentTTSAudio) { currentTTSAudio.pause(); currentTTSAudio.currentTime = 0; }
      cleanupTTSAudio();
      document.querySelectorAll('.speak-btn.speaking, .speak-btn.loading').forEach(btn => btn.classList.remove('speaking', 'loading'));
    }

    async function toggleVoiceMode() {
      if (voiceMode) { stopVoiceMode(); } else { await startVoiceMode(); }
    }

    async function startVoiceMode() {
      voiceMode = true;
      const inputArea = document.querySelector('.input-area');
      if (inputArea) inputArea.classList.add('voice-active');
      setVoiceInputState('connecting');
      await startVoiceCapture();
    }

    function stopVoiceMode() {
      voiceMode = false;
      const inputArea = document.querySelector('.input-area');
      if (inputArea) inputArea.classList.remove('voice-active');
      setVoiceInputState('idle');
      currentVoiceTranscript = '';
      if (transcriptionTimeout) { clearTimeout(transcriptionTimeout); transcriptionTimeout = null; }
      stopVoiceCapture();
      cleanupVoiceSession();
    }

    function setVoiceInputState(state) {
      voiceState = state;
      const voiceInputMode = document.getElementById('voiceInputMode');
      const statusText = document.getElementById('voiceInputStatus');
      const voiceBtn = document.getElementById('voiceBtn');
      if (voiceInputMode) voiceInputMode.setAttribute('data-state', state);
      const statusMessages = { idle: 'Tap microphone to speak', connecting: 'Connecting to voice...', listening: 'Listening... speak now', processing: 'Getting your answer...', speaking: 'Reading answer...' };
      if (statusText) statusText.textContent = statusMessages[state] || 'Ready';
      if (voiceBtn) voiceBtn.classList.toggle('listening', state === 'listening');
    }

    function submitVoiceInput() {
      if (dataChannel && dataChannel.readyState === 'open') {
        dataChannel.send(JSON.stringify({ type: 'input_audio_buffer.commit' }));
        setVoiceInputState('processing');
      } else { showVoiceError('Voice connection lost. Please try again.'); }
    }

    function showVoiceError(message) {
      const statusText = document.getElementById('voiceInputStatus');
      if (statusText) {
        statusText.textContent = message;
        statusText.style.color = '#ef4444';
        setTimeout(() => { statusText.style.color = ''; if (voiceMode) stopVoiceMode(); }, 3000);
      }
    }

    async function startVoiceCapture() {
      try {
        setVoiceInputState('connecting');
        currentVoiceTranscript = '';
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) throw new Error('Microphone not supported in this browser');
        const tokenResponse = await fetch(VOICE_API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ session_id: getSessionId(), access_code: getAccessCode() })
        });
        if (!tokenResponse.ok) throw new Error('Failed to get voice session token');
        const tokenData = await tokenResponse.json();
        if (!tokenData.client_secret || !tokenData.client_secret.value) throw new Error('Invalid token response from server');
        await initializeVoiceSession(tokenData.client_secret.value);
      } catch (error) {
        setVoiceInputState('idle');
        if (error.name === 'NotAllowedError') showVoiceError('Microphone permission denied.');
        else if (error.name === 'NotFoundError') showVoiceError('No microphone found.');
        else showVoiceError(error.message || 'Failed to start voice mode');
      }
    }

    async function initializeVoiceSession(ephemeralKey) {
      peerConnection = new RTCPeerConnection();
      localStream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true } });
      localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));
      dataChannel = peerConnection.createDataChannel('oai-events');
      dataChannel.onopen = () => { voiceSessionActive = true; configureVoiceSession(); };
      dataChannel.onmessage = handleVoiceEvent;
      dataChannel.onclose = () => { voiceSessionActive = false; };
      const offer = await peerConnection.createOffer();
      await peerConnection.setLocalDescription(offer);
      const sdpResponse = await fetch(`https://api.openai.com/v1/realtime?model=gpt-4o-realtime-preview-2024-12-17`, {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${ephemeralKey}`, 'Content-Type': 'application/sdp' },
        body: offer.sdp
      });
      if (!sdpResponse.ok) throw new Error('Failed to connect to OpenAI Realtime API');
      const answerSdp = await sdpResponse.text();
      await peerConnection.setRemoteDescription({ type: 'answer', sdp: answerSdp });
      setVoiceInputState('listening');
    }

    function configureVoiceSession() {
      if (!dataChannel || dataChannel.readyState !== 'open') return;
      const sessionConfig = {
        type: 'session.update',
        session: {
          modalities: ['text'],
          instructions: `You are a voice interface for NTA Bot, the Nutritional Therapy Association's internal curriculum assistant for employees.

CRITICAL RULE: You do NOT have NTA curriculum knowledge. For ANY question about:
- The Five Foundations of Health (nutrient-dense diet, digestion, blood sugar regulation, sleep, stress management)
- Bio-individuality, innate intelligence, root-cause approach, or food-first philosophy
- NTP program content (NACA process, NAQ, Nutri-Q, functional labs, supplements)
- PHWC program content (coaching models, behavior change, motivational interviewing)
- FCA course, Lingual-Neural Testing, or FNTP credential
- Scope of practice boundaries for NTPs, FNTPs, or PHWCs
- Program structure, prerequisites, credentials, or board exam eligibility

You MUST call the get_nta_answer function and then read the response naturally to the user.

DO NOT attempt to answer curriculum questions from your own knowledge. ALWAYS use the get_nta_answer tool first.

After receiving the answer from the tool:
1. Read the answer conversationally and naturally
2. Preserve ALL specific details, terminology, and scope distinctions exactly
3. Include source citations naturally
4. If the answer includes a confidence warning, mention it

For simple greetings or requests to repeat, you may respond directly without using the tool.`,
          input_audio_transcription: { model: 'whisper-1' },
          turn_detection: { type: 'server_vad', threshold: 0.5, prefix_padding_ms: 300, silence_duration_ms: 1200 },
          tools: [{
            type: 'function',
            name: 'get_nta_answer',
            description: 'Get the authoritative answer to any question about NTA curriculum content. Covers the Five Foundations of Health, NTP and PHWC program materials, clinical application (NACA, NAQ, Nutri-Q), FCA/FNTP training, scope of practice, credentials, and NTA philosophy (bio-individuality, innate intelligence, root-cause, food-first approach). Returns a cited answer from official curriculum documents.',
            parameters: { type: 'object', properties: { question: { type: 'string', description: 'The user\'s question about NTA curriculum, programs, or nutritional therapy concepts' } }, required: ['question'] }
          }]
        }
      };
      dataChannel.send(JSON.stringify(sessionConfig));
    }

    async function handleVoiceEvent(event) {
      try {
        const data = JSON.parse(event.data);
        switch (data.type) {
          case 'session.created': case 'session.updated': break;
          case 'input_audio_buffer.speech_started':
            setVoiceInputState('listening');
            const st = document.getElementById('voiceInputStatus');
            if (st) st.textContent = 'Hearing you...';
            break;
          case 'input_audio_buffer.speech_stopped':
            setVoiceInputState('processing');
            if (transcriptionTimeout) clearTimeout(transcriptionTimeout);
            transcriptionTimeout = setTimeout(() => showVoiceError('No transcription received. Please try again.'), 30000);
            break;
          case 'conversation.item.input_audio_transcription.completed':
            if (transcriptionTimeout) { clearTimeout(transcriptionTimeout); transcriptionTimeout = null; }
            if (data.transcript && data.transcript.trim()) {
              currentVoiceTranscript = data.transcript.trim();
              const chatArea = document.getElementById('chatArea');
              if (chatArea) { chatArea.insertAdjacentHTML('beforeend', renderUserMessage(currentVoiceTranscript)); scrollToBottom(); messages.push({ role: 'user', content: currentVoiceTranscript }); }
            }
            break;
          case 'response.function_call_arguments.done':
            if (data.name === 'get_nta_answer') await handleGetAnswer(data.call_id, data.arguments);
            break;
          case 'response.done': break;
          case 'error':
            showVoiceError(data.error?.message || 'An error occurred');
            setVoiceInputState('idle');
            break;
        }
      } catch (e) { console.error('[Voice] Error handling event:', e); }
    }

    async function handleGetAnswer(callId, argsString) {
      try {
        const args = JSON.parse(argsString);
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: args.question, session_id: getSessionId(), access_code: getAccessCode() })
        });
        let voiceAnswer = '';
        if (response.ok) {
          const responseData = await response.json();
          const chatArea = document.getElementById('chatArea');
          if (chatArea && responseData.answer) {
            chatArea.insertAdjacentHTML('beforeend', renderBotMessage(responseData));
            scrollToBottom();
            messages.push({ role: 'assistant', content: responseData.answer });
            const newMessage = chatArea.querySelector('.message-bot:last-child');
            const speakBtn = newMessage?.querySelector('.speak-btn');
            if (speakBtn) setTimeout(() => speakMessage(speakBtn), 100);
          }
          voiceAnswer = responseData.answer || 'I could not find specific information about that in the NTA curriculum.';
        } else {
          voiceAnswer = 'I encountered an error while searching the curriculum. Please try again.';
        }
        if (dataChannel && dataChannel.readyState === 'open') {
          dataChannel.send(JSON.stringify({ type: 'conversation.item.create', item: { type: 'function_call_output', call_id: callId, output: voiceAnswer } }));
          dataChannel.send(JSON.stringify({ type: 'response.create' }));
        }
      } catch (error) {
        if (dataChannel && dataChannel.readyState === 'open') {
          dataChannel.send(JSON.stringify({ type: 'conversation.item.create', item: { type: 'function_call_output', call_id: callId, output: 'I encountered an error. Please try again.' } }));
          dataChannel.send(JSON.stringify({ type: 'response.create' }));
        }
      }
    }

    function stopVoiceCapture() {
      setVoiceInputState('idle');
      if (dataChannel && dataChannel.readyState === 'open') {
        try { dataChannel.send(JSON.stringify({ type: 'input_audio_buffer.commit' })); } catch (e) {}
      }
    }

    function cleanupVoiceSession() {
      voiceSessionActive = false;
      if (dataChannel) { dataChannel.close(); dataChannel = null; }
      if (peerConnection) { peerConnection.close(); peerConnection = null; }
      if (localStream) { localStream.getTracks().forEach(track => track.stop()); localStream = null; }
      currentVoiceTranscript = '';
    }

    // ===== PWA: SERVICE WORKER =====
    let deferredInstallPrompt = null;
    let isAppInstalled = false;

    async function registerServiceWorker() {
      if ('serviceWorker' in navigator) {
        try {
          const registration = await navigator.serviceWorker.register('./sw.js');
          registration.addEventListener('updatefound', () => {
            const newWorker = registration.installing;
            newWorker.addEventListener('statechange', () => {
              if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                console.log('[PWA] New version available');
              }
            });
          });
        } catch (error) { console.error('[PWA] Service worker registration failed:', error); }
      }
    }

    function setupInstallPrompt() {
      if (window.matchMedia('(display-mode: standalone)').matches) { isAppInstalled = true; hideInstallBanner(); return; }
      window.addEventListener('beforeinstallprompt', (e) => { e.preventDefault(); deferredInstallPrompt = e; showInstallBanner('android'); });
      const isIOSDevice = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
      if (isIOSDevice && !isAppInstalled && !localStorage.getItem('nta-install-dismissed')) {
        setTimeout(() => showInstallBanner('ios'), 3000);
      }
      window.addEventListener('appinstalled', () => { isAppInstalled = true; deferredInstallPrompt = null; hideInstallBanner(); });
    }

    function showInstallBanner(platform) {
      if (localStorage.getItem('nta-install-dismissed')) return;
      const banner = document.getElementById('installBanner');
      const iosInstructions = document.getElementById('iosInstructions');
      const androidButton = document.getElementById('androidInstallBtn');
      if (banner) {
        if (platform === 'ios') { iosInstructions.style.display = 'block'; androidButton.style.display = 'none'; }
        else { iosInstructions.style.display = 'none'; androidButton.style.display = 'flex'; }
        banner.classList.add('visible');
      }
    }

    function hideInstallBanner() { const banner = document.getElementById('installBanner'); if (banner) banner.classList.remove('visible'); }
    function dismissInstallBanner() { hideInstallBanner(); localStorage.setItem('nta-install-dismissed', 'true'); }

    async function promptInstall() {
      if (!deferredInstallPrompt) return;
      deferredInstallPrompt.prompt();
      await deferredInstallPrompt.userChoice;
      deferredInstallPrompt = null;
      hideInstallBanner();
    }

    // ===== PWA: OFFLINE DETECTION =====
    let isOnline = navigator.onLine;
    function updateOnlineStatus() {
      const wasOnline = isOnline; isOnline = navigator.onLine;
      const banner = document.getElementById('offlineBanner');
      if (banner) {
        if (!isOnline) { banner.classList.add('visible'); }
        else {
          banner.classList.remove('visible');
          if (!wasOnline) {
            banner.textContent = 'Back online';
            banner.classList.add('visible', 'online');
            setTimeout(() => { banner.classList.remove('visible', 'online'); banner.textContent = "You're offline — cached content only"; }, 2000);
          }
        }
      }
    }
    function setupOfflineDetection() {
      window.addEventListener('online', updateOnlineStatus);
      window.addEventListener('offline', updateOnlineStatus);
      updateOnlineStatus();
    }

    // ===== INITIALIZATION =====
    document.addEventListener('DOMContentLoaded', () => {
      initTheme();
      checkAccessGate();
      getSessionId();

      const chatArea = document.getElementById('chatArea');
      if (chatArea) chatArea.innerHTML = generateWelcomePanel();

      const messageInput = document.getElementById('messageInput');
      if (messageInput) messageInput.focus();

      registerServiceWorker();
      setupInstallPrompt();
      setupOfflineDetection();
    });
  </script>

  <!-- Source Text Modal -->
  <div class="source-modal-overlay" id="sourceModal" onclick="if(event.target === this) closeSourceModal()">
    <div class="source-modal">
      <div class="source-modal-header">
        <div class="source-modal-title" id="sourceModalTitle"></div>
        <button class="source-modal-close" onclick="closeSourceModal()">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
      <div class="source-modal-body" id="sourceModalBody"></div>
    </div>
  </div>

  <!-- Hidden audio element for voice playback -->
  <audio id="voiceAudio" style="display: none;"></audio>
</body>
