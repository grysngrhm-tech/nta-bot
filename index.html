<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>NTA Bot</title>

  <!-- PWA Meta Tags -->
  <meta name="description" content="NTA employee curriculum lookup with citations.">
  <meta name="theme-color" content="#4a7c59">
  <meta name="mobile-web-app-capable" content="yes">

  <!-- iOS PWA Meta Tags -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="NTA Bot">
  <meta name="format-detection" content="telephone=no">

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">

  <!-- Favicons and App Icons -->
  <link rel="icon" type="image/png" sizes="32x32" href="assets/icons/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="assets/icons/favicon-16.png">
  <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png">
  <link rel="apple-touch-icon" sizes="152x152" href="assets/icons/icon-152.png">
  <link rel="apple-touch-icon" sizes="167x167" href="assets/icons/icon-167.png">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/icons/icon-180.png">

  <!-- iOS Splash Screens (basic) -->
  <link rel="apple-touch-startup-image" href="assets/icons/icon-512.png">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ===== CSS RESET & BASE ===== */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* ===== CSS VARIABLES - LIGHT THEME ===== */
    :root {
      --bg-primary: #f5f5f0;
      --bg-secondary: #ffffff;
      --bg-chat: #f5f5f0;
      --bg-card: #ffffff;
      --bg-input: #ffffff;
      --bg-user-msg: linear-gradient(135deg, #4a7c59 0%, #3d6b4a 100%);
      --bg-bot-msg: #ffffff;
      --bg-source: #f0f0eb;
      --bg-source-expanded: #e5e5de;
      --text-primary: #1a1a1a;
      --text-secondary: #4a4a4a;
      --text-muted: #777777;
      --text-on-accent: #ffffff;
      --accent: #4a7c59;
      --accent-hover: #3d6b4a;
      --accent-subtle: rgba(74, 124, 89, 0.1);
      --border: #d5d5cc;
      --border-focus: #4a7c59;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
      --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1);
      --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.1);
      --confidence-high: #16a34a;
      --confidence-medium: #ca8a04;
      --confidence-low: #dc2626;
      --radius-sm: 0.375rem;
      --radius-md: 0.5rem;
      --radius-lg: 0.75rem;
      --radius-xl: 1rem;
      --radius-pill: 25px;
      --transition: 200ms ease;
      --keyboard-height: 0px;
    }

    /* ===== SCREEN READER ONLY ===== */
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    /* ===== TYPOGRAPHY ===== */
    body {
      font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 15px;
      line-height: 1.6;
      color: var(--text-primary);
      background: var(--bg-primary);
      min-height: -webkit-fill-available;
      min-height: 100svh;
      display: flex;
      flex-direction: column;
    }

    /* ===== LAYOUT ===== */
    .app-container {
      max-width: 900px;
      width: 100%;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      height: -webkit-fill-available;
      height: 100svh;
      background: var(--bg-secondary);
      box-shadow: var(--shadow-lg);
      position: relative;
    }

    @media (min-width: 768px) {
      .app-container {
        margin: 1rem auto;
        height: calc(100svh - 2rem);
        border-radius: var(--radius-xl);
        overflow: hidden;
      }
    }

    /* ===== ACCESS GATE ===== */
    .access-gate {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 20000;
      background: #f5f5f0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .access-gate.hidden {
      display: none;
    }

    .access-gate-card {
      background: #ffffff;
      border-radius: var(--radius-xl);
      padding: 2.5rem 2rem;
      max-width: 400px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
      animation: welcomeFadeIn 0.5s ease;
    }

    .access-gate-icon {
      font-size: 3rem;
      margin-bottom: 1rem;
    }

    .access-gate h2 {
      font-size: 1.375rem;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 0.5rem;
    }

    .access-gate p {
      font-size: 0.875rem;
      color: #4a4a4a;
      margin-bottom: 1.5rem;
      line-height: 1.5;
    }

    .access-gate-input {
      width: 100%;
      padding: 0.875rem 1.25rem;
      border: 1px solid #d5d5cc;
      border-radius: var(--radius-pill);
      background: #f5f5f0;
      color: #1a1a1a;
      font-size: 1rem;
      font-family: inherit;
      text-align: center;
      letter-spacing: 0.1em;
      outline: none;
      transition: all 0.2s ease;
      margin-bottom: 1rem;
    }

    .access-gate-input:focus {
      border-color: #4a7c59;
      box-shadow: 0 0 0 3px rgba(74, 124, 89, 0.3);
    }

    .access-gate-input::placeholder {
      color: #999;
      letter-spacing: normal;
    }

    .access-gate-btn {
      width: 100%;
      padding: 0.875rem;
      background: #4a7c59;
      color: white;
      border: none;
      border-radius: var(--radius-pill);
      font-size: 1rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .access-gate-btn:hover {
      background: #5d9070;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(74, 124, 89, 0.3);
    }

    .access-gate-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .access-gate-error {
      color: #dc2626;
      font-size: 0.8125rem;
      margin-top: 0.75rem;
      display: none;
    }

    .access-gate-error.visible {
      display: block;
    }

    /* ===== HEADER (removed — logo is in welcome hero) ===== */

    .header-actions {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    /* ===== CHAT AREA ===== */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      background: var(--bg-chat);
    }

    /* ===== MESSAGES ===== */
    .message {
      max-width: 85%;
      animation: fadeIn 0.3s ease;
      content-visibility: auto;
      contain-intrinsic-size: 0 120px;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message-user {
      align-self: flex-end;
    }

    .message-bot {
      align-self: flex-start;
    }

    .message-content {
      padding: 0.875rem 1rem;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
    }

    .message-user .message-content {
      background: var(--bg-user-msg);
      color: var(--text-on-accent);
      border-bottom-right-radius: var(--radius-sm);
      box-shadow: var(--shadow-md);
    }

    .message-bot .message-content {
      background: var(--bg-bot-msg);
      color: var(--text-primary);
      border-bottom-left-radius: var(--radius-sm);
      border: 1px solid var(--border);
    }

    .message-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.5rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .message-sender {
      font-weight: 600;
      font-size: 0.875rem;
      color: var(--accent);
    }

    /* ===== CONFIDENCE BADGE ===== */
    .confidence-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.375rem;
      font-size: 0.75rem;
      font-weight: 500;
      padding: 0.25rem 0.5rem;
      border-radius: var(--radius-sm);
      background: var(--bg-source);
      cursor: pointer;
      position: relative;
      transition: var(--transition);
    }

    .confidence-badge:hover {
      opacity: 0.8;
    }

    .confidence-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .confidence-high .confidence-dot { background: var(--confidence-high); }
    .confidence-medium .confidence-dot { background: var(--confidence-medium); }
    .confidence-low .confidence-dot { background: var(--confidence-low); }

    .confidence-high { color: var(--confidence-high); }
    .confidence-medium { color: var(--confidence-medium); }
    .confidence-low { color: var(--confidence-low); }

    .confidence-tooltip {
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      width: 280px;
      padding: 0.75rem;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-lg);
      font-size: 0.8125rem;
      font-weight: 400;
      color: var(--text-secondary);
      line-height: 1.5;
      z-index: 100;
      display: none;
      animation: tooltipFadeIn 0.15s ease;
    }

    .confidence-tooltip::before {
      content: '';
      position: absolute;
      top: -6px;
      right: 16px;
      width: 10px;
      height: 10px;
      background: var(--bg-secondary);
      border-left: 1px solid var(--border);
      border-top: 1px solid var(--border);
      transform: rotate(45deg);
    }

    .confidence-badge.tooltip-open .confidence-tooltip {
      display: block;
    }

    @keyframes tooltipFadeIn {
      from { opacity: 0; transform: translateY(-4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ===== MESSAGE HEADER ACTIONS ===== */
    .message-header-left {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .message-header-right {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .copy-btn {
      background: transparent;
      border: none;
      padding: 0.25rem;
      cursor: pointer;
      color: var(--text-muted);
      border-radius: var(--radius-sm);
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .copy-btn:hover {
      color: var(--text-secondary);
      background: var(--bg-source);
    }

    .copy-btn svg {
      width: 14px;
      height: 14px;
    }

    .copy-btn.copied {
      color: var(--confidence-high);
    }

    /* ===== SPEAK BUTTON & WAVEFORM ===== */
    .speak-btn {
      background: transparent;
      border: none;
      padding: 0.25rem;
      cursor: pointer;
      color: var(--text-muted);
      border-radius: var(--radius-sm);
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .speak-btn:hover {
      color: var(--text-secondary);
      background: var(--bg-source);
    }

    .speak-btn .speaker-icon {
      width: 14px;
      height: 14px;
    }

    .speak-btn .waveform {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 2px;
      height: 14px;
    }

    .speak-btn.speaking .speaker-icon {
      display: none;
    }

    .speak-btn.speaking .waveform {
      display: flex;
    }

    .speak-btn.speaking {
      color: var(--accent);
    }

    .waveform span {
      display: block;
      width: 2px;
      height: 4px;
      background: currentColor;
      border-radius: 1px;
      animation: waveform-bar 0.8s ease-in-out infinite;
    }

    .waveform span:nth-child(1) { animation-delay: 0s; }
    .waveform span:nth-child(2) { animation-delay: 0.1s; }
    .waveform span:nth-child(3) { animation-delay: 0.2s; }
    .waveform span:nth-child(4) { animation-delay: 0.3s; }
    .waveform span:nth-child(5) { animation-delay: 0.4s; }

    @keyframes waveform-bar {
      0%, 100% { height: 4px; }
      50% { height: 14px; }
    }

    .speak-btn.loading {
      color: var(--accent);
      pointer-events: none;
    }

    .speak-btn.loading .speaker-icon {
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* Tap to play state - shows when autoplay is blocked on mobile */
    .speak-btn.tap-to-play {
      color: #f59e0b;
      animation: tap-pulse 1s ease-in-out infinite;
      pointer-events: auto;
    }

    .speak-btn.tap-to-play .speaker-icon {
      animation: none;
    }

    @keyframes tap-pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.2); }
    }

    /* ===== ANSWER SECTION ===== */
    .answer-section {
      margin-bottom: 0.75rem;
    }

    .answer-label {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.375rem;
    }

    .answer-text {
      line-height: 1.7;
      color: var(--text-primary);
    }

    .answer-text p {
      margin-bottom: 0.5rem;
    }

    .answer-text p:last-child {
      margin-bottom: 0;
    }

    .answer-text strong { font-weight: 600; }
    .answer-text em { font-style: italic; }
    .answer-text code { background: rgba(0,0,0,0.05); padding: 0.1rem 0.3rem; border-radius: 3px; font-size: 0.85em; font-family: inherit; }
    .answer-text ul, .answer-text ol { margin: 0.375rem 0; padding-left: 1.5rem; }
    .answer-text li { margin-bottom: 0.25rem; line-height: 1.6; }
    .answer-text li:last-child { margin-bottom: 0; }

    /* ===== SOURCES & REQUIREMENTS SECTION ===== */
    .sources-section {
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
    }

    .sources-title {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* ===== SOURCE ITEM WITH REQUIREMENTS ===== */
    .source-item {
      background: var(--bg-source);
      border-radius: var(--radius-md);
      margin-bottom: 0.625rem;
      overflow: hidden;
      transition: all 0.2s ease;
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
    }

    .source-item:hover {
      border-color: var(--accent);
      box-shadow: var(--shadow-sm);
    }

    .source-item:last-child, .source-category:last-child {
      margin-bottom: 0;
    }

    /* ===== CATEGORY-GROUPED SOURCE ACCORDION ===== */
    .source-category {
      background: var(--bg-source);
      border-radius: var(--radius-md);
      margin-bottom: 0.625rem;
      overflow: hidden;
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
    }

    .source-category.curriculum { border-left-color: #92600e; }
    .source-category.textbook { border-left-color: #059669; }
    .source-category.nih { border-left-color: #0891b2; }
    .source-category.podcast { border-left-color: #ca8a04; }
    .source-category.web { border-left-color: #3b82f6; }

    .source-category-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 0.75rem;
      cursor: pointer;
      user-select: none;
      transition: background 0.15s ease;
    }

    .source-category-header:hover {
      background: rgba(0,0,0,0.02);
    }

    .source-category-info {
      flex: 1;
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .source-category-counts {
      font-size: 0.6875rem;
      color: var(--text-muted);
    }

    .source-category-chevron {
      width: 16px;
      height: 16px;
      color: var(--text-muted);
      transition: transform 0.2s ease;
      flex-shrink: 0;
    }

    .source-category.expanded .source-category-chevron {
      transform: rotate(90deg);
    }

    .source-category-body {
      display: none;
      border-top: 1px solid var(--border);
    }

    .source-category.expanded .source-category-body {
      display: block;
    }

    /* Document subheader within a category */
    .source-doc-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.375rem 0.75rem;
      background: rgba(0,0,0,0.015);
      border-bottom: 1px solid var(--border);
    }

    .source-doc-name {
      font-size: 0.6875rem;
      font-weight: 600;
      color: var(--text-primary);
      flex: 1;
      min-width: 0;
    }

    .source-doc-link {
      flex-shrink: 0;
    }

    /* Section rows (reused from old design) */
    .source-section-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
      padding: 0.375rem 0.75rem 0.375rem 1.25rem;
      border-bottom: 1px solid var(--border);
    }

    .source-section-row:last-child {
      border-bottom: none;
    }

    .source-section-title {
      font-size: 0.6875rem;
      font-weight: 500;
      color: var(--text-secondary);
      flex: 1;
      min-width: 0;
    }

    .source-section-row .source-actions {
      padding: 0;
      flex-shrink: 0;
    }

    .source-section-row .view-source-link {
      font-size: 0.625rem;
      padding: 0.25rem 0.5rem;
    }

    .source-header {
      display: flex;
      align-items: flex-start;
      gap: 0.5rem;
      padding: 0.75rem;
    }

    .source-info {
      flex: 1;
      min-width: 0;
    }

    .source-path {
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--text-primary);
      margin-bottom: 0.125rem;
      line-height: 1.4;
    }

    .source-meta {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    /* ===== AUTHORITY BADGE ===== */
    .authority-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
      font-size: 0.625rem;
      font-weight: 600;
      padding: 0.125rem 0.5rem;
      border-radius: var(--radius-sm);
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .authority-binding {
      background: var(--accent-subtle);
      color: var(--accent);
    }

    .authority-guidance {
      background: rgba(136, 136, 136, 0.15);
      color: var(--text-muted);
    }

    .authority-web {
      background: rgba(59, 130, 246, 0.1);
      color: #3b82f6;
    }

    .authority-podcast {
      background: rgba(234, 179, 8, 0.1);
      color: #ca8a04;
    }

    .authority-textbook {
      background: rgba(16, 185, 129, 0.1);
      color: #059669;
    }

    .authority-nih {
      background: rgba(8, 145, 178, 0.1);
      color: #0891b2;
    }

    .authority-curriculum {
      background: rgba(180, 120, 60, 0.12);
      color: #92600e;
    }

    /* ===== SOURCE REQUIREMENTS ===== */
    .source-requirements {
      padding: 0.5rem 0.75rem 0.75rem 1rem;
      border-left: 3px solid var(--accent);
      margin: 0 0.75rem 0.5rem 0.75rem;
      background: var(--accent-subtle);
      border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    }

    .requirements-label {
      font-size: 0.6875rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
    }

    .source-requirements ul {
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .source-requirements li {
      position: relative;
      padding-left: 1rem;
      margin-bottom: 0.375rem;
      font-size: 0.8125rem;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    .source-requirements li:last-child {
      margin-bottom: 0;
    }

    .source-requirements li::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0.5rem;
      width: 5px;
      height: 5px;
      background: var(--accent);
      border-radius: 50%;
    }

    /* ===== VIEW SOURCE LINK ===== */
    .view-source-link {
      display: inline-flex;
      align-items: center;
      gap: 0.375rem;
      padding: 0.375rem 0.75rem;
      margin: 0 0.75rem 0.75rem 0.75rem;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: var(--radius-pill);
      cursor: pointer;
      color: var(--text-muted);
      font-size: 0.6875rem;
      font-family: inherit;
      transition: all 0.2s ease;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      font-weight: 500;
    }

    .view-source-link:hover {
      color: var(--accent);
      border-color: var(--accent);
      background: var(--accent-subtle);
    }

    .view-source-link svg {
      width: 12px;
      height: 12px;
    }

    .source-actions {
      display: flex;
      gap: 0.5rem;
      padding: 0 0.75rem 0.75rem 0.75rem;
    }

    .source-actions .view-source-link {
      margin: 0;
    }

    .source-url-link {
      text-decoration: none;
      color: var(--accent);
      border-color: var(--accent);
    }

    .source-url-link:hover {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--text-on-accent);
    }

    .page-badge {
      font-size: 0.6875rem;
      color: var(--text-muted);
      background: var(--bg-source);
      padding: 0.125rem 0.5rem;
      border-radius: var(--radius-sm);
      font-weight: 500;
    }

    /* ===== SOURCE MODAL ===== */
    .source-modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.6);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      animation: fadeIn 0.15s ease;
    }

    .source-modal-overlay.active {
      display: flex;
    }

    .source-modal {
      background: var(--bg-primary);
      border-radius: var(--radius-lg);
      max-width: 700px;
      width: 100%;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      animation: slideUp 0.2s ease;
    }

    .source-modal-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    .source-modal-title {
      font-size: 0.9375rem;
      font-weight: 600;
      color: var(--text-primary);
      line-height: 1.4;
    }

    .source-modal-close {
      background: none;
      border: none;
      padding: 0.25rem;
      cursor: pointer;
      color: var(--text-muted);
      transition: var(--transition);
      flex-shrink: 0;
    }

    .source-modal-close:hover {
      color: var(--text-primary);
    }

    .source-modal-close svg {
      width: 20px;
      height: 20px;
    }

    .source-modal-body {
      padding: 1.5rem;
      overflow-y: auto;
      font-size: 0.875rem;
      line-height: 1.7;
      color: var(--text-secondary);
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes slideDown {
      from { opacity: 0; max-height: 0; }
      to { opacity: 1; max-height: 200px; }
    }

    /* ===== MESSAGE BODY ===== */
    .message-body {
      line-height: 1.7;
    }

    .message-body p {
      margin-bottom: 0.75rem;
    }

    .message-body p:last-child {
      margin-bottom: 0;
    }

    .message-body strong {
      font-weight: 600;
    }

    .message-body ul, .message-body ol {
      margin: 0.5rem 0 0.75rem 1.25rem;
    }

    .message-body li {
      margin-bottom: 0.25rem;
    }

    /* ===== WELCOME PANEL ===== */
    .welcome-panel {
      max-width: 800px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
      animation: welcomeFadeIn 0.5s ease;
    }

    @keyframes welcomeFadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Hero Section */
    .welcome-hero {
      text-align: center;
      margin-bottom: 2rem;
      animation: welcomeFadeIn 0.5s ease;
      position: relative;
    }

    .welcome-logo {
      width: 240px;
      height: auto;
      margin: 0 auto 1.25rem;
      display: block;
      cursor: pointer;
    }

    .welcome-hero h2 {
      font-size: 1.375rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 0.5rem;
      letter-spacing: -0.01em;
    }

    .welcome-tagline {
      font-size: 0.875rem;
      color: var(--text-secondary);
      max-width: 520px;
      margin: 0 auto;
      line-height: 1.6;
    }

    .welcome-doc-link {
      font-size: 0.75rem;
      margin-top: 0.5rem;
      opacity: 0.5;
    }

    .welcome-doc-link a {
      color: var(--text-muted);
      text-decoration: none;
    }

    .welcome-doc-link a:hover {
      color: var(--accent);
      opacity: 1;
    }

    /* Stacked Sections */
    .welcome-section {
      background: var(--bg-card);
      border-radius: var(--radius-lg);
      padding: 1.25rem;
      margin-bottom: 1rem;
      animation: welcomeFadeIn 0.5s ease 0.15s both;
    }

    .welcome-section:last-of-type {
      margin-bottom: 0;
    }

    .welcome-section h3 {
      font-size: 0.6875rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.75rem;
    }

    /* ===== COVERAGE CARDS ===== */
    .coverage-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.625rem;
    }

    @media (max-width: 560px) {
      .coverage-grid {
        grid-template-columns: 1fr;
      }
    }

    .coverage-card {
      background: var(--bg-source);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 0.75rem;
      animation: welcomeFadeIn 0.4s ease both;
    }

    .coverage-card:nth-child(1) { animation-delay: 0.15s; }
    .coverage-card:nth-child(2) { animation-delay: 0.2s; }
    .coverage-card:nth-child(3) { animation-delay: 0.25s; }
    .coverage-card:nth-child(4) { animation-delay: 0.3s; }

    .coverage-card-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.375rem;
    }

    .coverage-card-title {
      font-size: 0.8125rem;
      font-weight: 600;
      color: var(--text-primary);
    }

    .coverage-card-desc {
      font-size: 0.75rem;
      color: var(--text-muted);
      line-height: 1.5;
      margin: 0;
    }

    .coverage-badge {
      font-size: 0.5625rem;
      font-weight: 700;
      padding: 0.125rem 0.375rem;
      border-radius: var(--radius-sm);
      text-transform: uppercase;
      letter-spacing: 0.03em;
      flex-shrink: 0;
    }

    .coverage-badge.ntp {
      background: rgba(74, 124, 89, 0.15);
      color: var(--accent);
    }

    .coverage-badge.phwc {
      background: rgba(251, 191, 36, 0.15);
      color: var(--confidence-medium);
    }

    .coverage-badge.ref {
      background: rgba(136, 136, 136, 0.15);
      color: var(--text-muted);
    }

    .coverage-badge.podcast {
      background: rgba(234, 179, 8, 0.1);
      color: #ca8a04;
    }

    .coverage-badge.textbook {
      background: rgba(16, 185, 129, 0.1);
      color: #059669;
    }

    .coverage-badge.curriculum {
      background: rgba(180, 120, 60, 0.12);
      color: #92600e;
    }

    .coverage-badge.coming-soon {
      background: rgba(0, 0, 0, 0.06);
      color: var(--text-muted);
    }

    .coverage-card.muted {
      opacity: 0.55;
      border-style: dashed;
      cursor: default;
    }

    .coverage-card {
      cursor: pointer;
      transition: all 0.25s ease;
    }

    .coverage-card:not(.muted):hover {
      border-color: var(--accent);
    }

    .coverage-grid.has-expanded .coverage-card:not(.expanded) {
      display: none;
    }

    .coverage-card.expanded {
      grid-column: 1 / -1;
    }

    .coverage-card-expand {
      display: none;
      margin-top: 0.625rem;
      border-top: 1px solid var(--border);
      padding-top: 0.5rem;
      height: 200px;
      overflow-y: auto;
    }

    .coverage-card.expanded .coverage-card-expand {
      display: block;
    }

    .coverage-card.expanded .coverage-card-desc {
      display: none;
    }

    .coverage-card-toggle {
      margin-left: auto;
      font-size: 0.75rem;
      color: var(--text-muted);
      flex-shrink: 0;
    }

    .coverage-card-toggle::after {
      content: '\203a';
    }

    .coverage-card.expanded .coverage-card-toggle::after {
      content: '\d7';
    }

    .coverage-source-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.375rem 0;
      border-bottom: 1px solid rgba(0,0,0,0.05);
      gap: 0.5rem;
    }

    .coverage-source-item:last-child {
      border-bottom: none;
    }

    .coverage-source-name {
      font-size: 0.75rem;
      color: var(--text-secondary);
      font-weight: 500;
      flex: 1;
      min-width: 0;
    }

    .coverage-source-name a {
      color: var(--text-secondary);
      text-decoration: none;
    }

    .coverage-source-name a:hover {
      color: var(--accent);
      text-decoration: underline;
    }

    .coverage-subgroup-label {
      font-size: 0.6875rem;
      font-weight: 600;
      color: var(--text-secondary);
      padding: 0.5rem 0 0.25rem 0;
      margin-top: 0.25rem;
      border-top: 1px solid var(--border);
    }

    .coverage-subgroup-label:first-child {
      border-top: none;
      margin-top: 0;
      padding-top: 0;
    }

    .coverage-source-count {
      font-size: 0.625rem;
      color: var(--text-muted);
      flex-shrink: 0;
    }


    /* ===== WELCOME DISCLAIMER ===== */
    .welcome-disclaimer {
      font-size: 0.6875rem;
      color: var(--text-muted);
      text-align: center;
      margin-top: 1.25rem;
    }

    /* ===== DASHBOARD ICON ===== */
    .dashboard-icon {
      position: absolute;
      top: 0.75rem;
      right: 0.75rem;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border-radius: var(--radius-md);
      color: var(--text-muted);
      opacity: 0.35;
      transition: all 0.2s ease;
      text-decoration: none;
    }

    .dashboard-icon:hover {
      opacity: 1;
      color: var(--accent);
      background: var(--accent-subtle);
    }

    .dashboard-icon svg {
      width: 16px;
      height: 16px;
    }

    /* ===== DASHBOARD FOOTER LINK ===== */
    /* dashboard-link removed — accessible via dashboard-icon in top-right */

    /* ===== GET STARTED / QUESTION CHIPS ===== */
    .question-chips {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.5rem;
    }

    @media (max-width: 560px) {
      .question-chips {
        grid-template-columns: 1fr;
      }
    }

    .question-chip {
      background: var(--bg-source);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 0.625rem 0.875rem;
      font-size: 0.75rem;
      font-family: inherit;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.2s ease;
      text-align: left;
      line-height: 1.4;
    }

    .question-chip:hover {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--text-on-accent);
      transform: translateY(-1px);
      box-shadow: var(--shadow-sm);
    }

    .question-chip {
      animation: welcomeFadeIn 0.3s ease both;
    }

    .question-chip:nth-child(1) { animation-delay: 0.25s; }
    .question-chip:nth-child(2) { animation-delay: 0.3s; }
    .question-chip:nth-child(3) { animation-delay: 0.35s; }
    .question-chip:nth-child(4) { animation-delay: 0.4s; }

    @media (max-width: 640px) {
      .welcome-panel {
        padding: 1.5rem 1rem;
      }
    }

    /* ===== TYPING INDICATOR ===== */
    .typing-indicator {
      position: relative;
      padding: 1rem;
      background: var(--bg-bot-msg);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      border-bottom-left-radius: var(--radius-sm);
      width: 320px;
      overflow: hidden;
    }

    .typing-indicator::before,
    .typing-indicator::after {
      content: '';
      position: absolute;
      left: 0;
      height: 2px;
      background: var(--accent);
      width: var(--progress, 0%);
      transition: width 0.5s linear;
      opacity: 0.7;
    }

    .typing-indicator::before {
      top: 0;
      border-radius: 0 0 2px 0;
    }

    .typing-indicator::after {
      bottom: 0;
      border-radius: 0 2px 0 0;
    }

    .typing-content {
      display: flex;
      align-items: center;
      gap: 0.625rem;
    }

    .typing-dots {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      flex-shrink: 0;
    }

    .typing-dot {
      width: 6px;
      height: 6px;
      background: var(--accent);
      border-radius: 50%;
      animation: typingBounce 1.4s infinite ease-in-out;
    }

    .typing-dot:nth-child(1) { animation-delay: -0.32s; }
    .typing-dot:nth-child(2) { animation-delay: -0.16s; }
    .typing-dot:nth-child(3) { animation-delay: 0s; }

    @keyframes typingBounce {
      0%, 80%, 100% { transform: scale(0.8); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }

    .typing-status {
      min-width: 0;
    }

    .typing-message {
      font-size: 0.8125rem;
      color: var(--text-secondary);
      font-weight: 500;
      transition: opacity 0.3s ease;
    }

    .typing-message.fade {
      opacity: 0;
    }

    .typing-retry {
      font-size: 0.75rem;
      color: var(--confidence-medium);
      font-weight: 500;
      margin-top: 0.125rem;
    }

    /* ===== INPUT AREA ===== */
    .input-area {
      padding: 0.5rem 0.75rem;
      background: var(--bg-secondary);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .input-container {
      display: flex;
      align-items: flex-end;
    }

    .input-pill {
      flex: 1;
      display: flex;
      align-items: flex-end;
      border: 1.5px solid var(--border);
      border-radius: 24px;
      background: var(--bg-input);
      padding: 0.25rem 0.375rem 0.25rem 1rem;
      transition: border-color var(--transition);
      gap: 0.25rem;
    }

    .input-pill:focus-within {
      border-color: var(--border-focus);
    }

    .message-input {
      flex: 1;
      border: none;
      padding: 0.5rem 0;
      font-family: inherit;
      font-size: 16px;
      line-height: 1.5;
      color: var(--text-primary);
      background: transparent;
      resize: none;
      outline: none;
      max-height: 150px;
      overflow-y: auto;
      min-height: 24px;
    }

    .message-input::placeholder {
      color: var(--text-muted);
    }

    .input-action-btn {
      width: 34px;
      height: 34px;
      min-width: 34px;
      border-radius: 50%;
      border: none;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.15s ease;
      margin-bottom: 0.125rem;
    }

    .input-action-btn svg {
      width: 20px;
      height: 20px;
    }

    .input-action-btn.has-text {
      background: var(--accent);
      color: var(--text-on-accent);
    }

    .input-action-btn.has-text:hover {
      background: var(--accent-hover);
    }

    .input-action-btn.listening {
      background: rgba(239, 68, 68, 0.1);
      color: #ef4444;
      animation: voice-pulse 1.5s ease-in-out infinite;
    }

    .input-action-btn.cancel-mode {
      background: #ef4444;
      color: white;
    }

    @keyframes voice-pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
      50% { box-shadow: 0 0 0 8px rgba(239, 68, 68, 0); }
    }

    /* ===== ERROR STATE ===== */
    .error-message {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #dc2626;
      padding: 0.875rem 1rem;
      border-radius: var(--radius-md);
      font-size: 0.875rem;
      display: flex;
      flex-direction: column;
      gap: 0.625rem;
    }

    .error-message-content {
      display: flex;
      align-items: flex-start;
      gap: 0.5rem;
    }

    .error-message-content svg {
      flex-shrink: 0;
      margin-top: 0.125rem;
    }

    .error-message-text {
      flex: 1;
    }

    .error-message-title {
      font-weight: 600;
      margin-bottom: 0.25rem;
    }

    .error-message-detail {
      font-size: 0.8125rem;
      opacity: 0.9;
    }

    .error-actions {
      display: flex;
      gap: 0.5rem;
      margin-left: 1.5rem;
    }

    .error-retry-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.375rem;
      padding: 0.375rem 0.75rem;
      background: transparent;
      border: 1px solid currentColor;
      border-radius: var(--radius-pill);
      color: inherit;
      font-size: 0.75rem;
      font-family: inherit;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .error-retry-btn:hover {
      background: #dc2626;
      border-color: #dc2626;
      color: white;
    }

    .error-retry-btn svg {
      width: 12px;
      height: 12px;
    }

    /* Cancel button state handled via .input-action-btn.cancel-mode */

    /* ===== SCROLLBAR ===== */
    .chat-area::-webkit-scrollbar,
    .source-modal-body::-webkit-scrollbar {
      width: 6px;
    }

    .chat-area::-webkit-scrollbar-track,
    .source-modal-body::-webkit-scrollbar-track {
      background: transparent;
    }

    .chat-area::-webkit-scrollbar-thumb,
    .source-modal-body::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    .chat-area::-webkit-scrollbar-thumb:hover,
    .source-modal-body::-webkit-scrollbar-thumb:hover {
      background: var(--text-muted);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 640px) {
      .chat-area {
        padding: 1rem;
      }

      .message {
        max-width: 92%;
      }

      .input-area {
        padding: 0.5rem 0.625rem;
      }
    }

    /* ===== MOBILE: SAFE AREA HANDLING ===== */
    @supports (padding: env(safe-area-inset-top)) {
      .input-area {
        padding-bottom: calc(0.5rem + env(safe-area-inset-bottom));
      }
      .app-container {
        padding-top: env(safe-area-inset-top);
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
      }
      .source-modal {
        padding-top: env(safe-area-inset-top);
      }
    }

    /* ===== MOBILE: TOUCH TARGETS ===== */
    @media (max-width: 768px) {
      .question-chip {
        min-height: 44px;
        padding: 0.75rem 1rem;
      }
      .source-item {
        min-height: 44px;
        padding: 0.75rem;
      }
      .input-action-btn {
        min-height: 44px;
        min-width: 44px;
        width: 44px;
        height: 44px;
      }
      .confidence-badge {
        min-height: 36px;
        padding: 0.5rem 0.75rem;
      }
      .error-retry-btn {
        min-height: 44px;
        padding: 0.625rem 1rem;
      }
    }

    /* ===== MOBILE: INPUT OPTIMIZATION ===== */
    @media (max-width: 768px) {
      .message-input {
        font-size: 16px !important;
      }
    }

    /* ===== MOBILE: VIEWPORT FIXES ===== */
    html {
      overscroll-behavior: none;
      scroll-behavior: smooth;
    }

    body {
      overscroll-behavior-y: contain;
      -webkit-overflow-scrolling: touch;
    }

    .chat-area {
      overscroll-behavior: contain;
      touch-action: pan-y;
    }

    @media all and (display-mode: standalone) {
      html, body {
        overflow: hidden;
      }
    }

    /* ===== MOBILE: LANDSCAPE ORIENTATION ===== */
    @media (max-height: 500px) and (orientation: landscape) {
      .welcome-panel {
        padding: 1rem;
      }
      .welcome-logo {
        width: 160px;
        margin-bottom: 0.75rem;
      }
    }

    /* ===== SCROLL-TO-BOTTOM BUTTON ===== */
    .scroll-to-bottom {
      position: absolute;
      bottom: 80px;
      right: 1.25rem;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-md);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease, transform 0.2s ease;
      z-index: 10;
    }
    .scroll-to-bottom.visible {
      opacity: 1;
      pointer-events: auto;
    }
    .scroll-to-bottom:hover {
      background: var(--accent-subtle);
      border-color: var(--accent);
    }
    .scroll-to-bottom svg {
      width: 20px;
      height: 20px;
      stroke: var(--text-secondary);
    }
    @supports (padding: env(safe-area-inset-bottom)) {
      .scroll-to-bottom {
        bottom: calc(80px + env(safe-area-inset-bottom));
      }
    }

    /* ===== INSTALL BANNER ===== */
    .install-banner {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem 1rem;
      background: var(--accent-subtle);
      border-bottom: 1px solid var(--border);
      font-size: 0.8125rem;
      color: var(--text-secondary);
      flex-shrink: 0;
    }
    .install-banner-icon {
      width: 32px;
      height: 32px;
      border-radius: var(--radius-sm);
      flex-shrink: 0;
    }

      document.getElementById('messageInput').focus();
    }

      if (getAccessCode()) {

    // Log to Supabase (fire-and-forget, never blocks UI)
    async function logToSupabase(data) {
      try {
        await fetch(`${SUPABASE_URL}/rest/v1/nta_query_log`, {
          method: 'POST',
          headers: {
            'apikey': SUPABASE_ANON_KEY,
            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
            'Content-Type': 'application/json',
            'Prefer': 'return=minimal'
          },
          body: JSON.stringify(data),
          keepalive: true  // survives tab close like sendBeacon, but with proper headers
        });
      } catch (e) {
        // Silent fail — analytics must never break chat
      }
    }

    // Geolocation (once per session, non-blocking)
    async function fetchGeolocation() {
      if (sessionStorage.getItem('nta_geo')) return;
      try {
        const controller = new AbortController();
        setTimeout(() => controller.abort(), 5000);
        const resp = await fetch('https://ipapi.co/json/', { signal: controller.signal });
        const data = await resp.json();
        sessionStorage.setItem('nta_geo', JSON.stringify({ city: data.city || null, country: data.country_name || null }));
      } catch (e) {
        sessionStorage.setItem('nta_geo', JSON.stringify({ city: null, country: null }));
      }
    }

    function getGeoData() {
      try { return JSON.parse(sessionStorage.getItem('nta_geo') || '{}'); }
      catch { return {}; }
    }

    // Device info (computed once, cached for session)
    function getDeviceInfo() {
      const cached = sessionStorage.getItem('nta_device');
      if (cached) { try { return JSON.parse(cached); } catch {} }

      const ua = navigator.userAgent;
      let browser = 'Unknown', os = 'Unknown', deviceType = 'Desktop';

      // Browser detection
      if (ua.includes('Edg/')) browser = 'Edge';
      else if (ua.includes('Chrome/') && !ua.includes('Edg/')) browser = 'Chrome';
      else if (ua.includes('Safari/') && !ua.includes('Chrome/')) browser = 'Safari';
      else if (ua.includes('Firefox/')) browser = 'Firefox';

      // OS detection
      if (ua.includes('Windows')) os = 'Windows';
      else if (ua.includes('Mac OS X') || ua.includes('Macintosh')) os = 'macOS';
      else if (ua.includes('iPhone') || ua.includes('iPad')) os = 'iOS';
      else if (ua.includes('Android')) os = 'Android';
      else if (ua.includes('Linux')) os = 'Linux';
      else if (ua.includes('CrOS')) os = 'ChromeOS';

      // Device type
      if (ua.includes('iPhone') || (ua.includes('Android') && ua.includes('Mobile'))) deviceType = 'Mobile';
      else if (ua.includes('iPad') || (ua.includes('Android') && !ua.includes('Mobile'))) deviceType = 'Tablet';
      else if (navigator.maxTouchPoints > 0 && screen.width < 1024) deviceType = 'Mobile';

      const resolution = screen.width + 'x' + screen.height;

      const info = { device_type: deviceType, browser, os, screen_resolution: resolution };
      sessionStorage.setItem('nta_device', JSON.stringify(info));
      return info;
    }

    // Derive source types from source objects using section_hierarchy[0]
    function deriveSourceTypes(sources) {
      if (!sources || sources.length === 0) return ['Web'];
      const types = new Set();
      for (const s of sources) {
        const h = (s.section_hierarchy || [])[0] || '';
        if (h.endsWith('Curriculum')) types.add('Curriculum');
        else if (h === 'NIH') types.add('NIH');
        else if (h === 'Textbook') types.add('Textbook');
        else if (h === 'Podcast') types.add('Podcast');
        else types.add('Web');
      }
      return [...types];
    }

    // Topic classifier via n8n webhook (async, non-blocking, 10s timeout)
    // Returns { topic_category, topic_label } or null
    async function classifyTopic(question) {
      try {
        const controller = new AbortController();
        setTimeout(() => controller.abort(), 10000);
        const resp = await fetch(TOPIC_LABEL_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question: question }),
          signal: controller.signal
        });
        if (!resp.ok) return null;
        const data = await resp.json();
        return {
          topic_category: data.topic_category || null,
          topic_label: data.topic_label || null
        };
      } catch (e) {
        return null;
      }
    }

    // Log a completed query with all metadata
    async function logQuery(question, responseData, elapsedMs) {
      const sources = responseData.sources || [];
      const sourceTopics = sources.map(s => {
        const h = s.section_hierarchy || [];
        return h.length > 1 ? h.join(' > ') : h[0] || 'Unknown';
      });
      const sourceDocuments = [...new Set(sources.map(s => s.document_name || 'Unknown'))];
      const confidence = responseData.confidence?.level || 'Medium';
      const answerSummary = (responseData.answer || '').substring(0, 300);
      const geo = getGeoData();
      const sourceTypes = deriveSourceTypes(sources);
      const device = getDeviceInfo();

      // Fallback label from first source topic
      const fallbackLabel = sourceTopics.length > 0 ? sourceTopics[0].replace('Podcast > ', '') : 'General';

      const logEntry = {
        question: question,
        answer_summary: answerSummary,
        confidence_level: confidence,
        source_topics: sourceTopics,
        source_documents: sourceDocuments,
        source_count: sources.length,
        topic_label: fallbackLabel,
        topic_category: null,
        source_types: sourceTypes,
        session_id: getSessionId(),
        city: geo.city || null,
        country: geo.country || null,
        device_type: device.device_type,
        browser: device.browser,
        os: device.os,
        screen_resolution: device.screen_resolution,
        latency_ms: elapsedMs || null
      };

      // Log right away with fallback label
      logToSupabase(logEntry);

      // Async: get proper category + label from GPT-4o-mini, then PATCH
      classifyTopic(question).then(result => {
        if (!result) return;
        const updates = {};
        if (result.topic_label) updates.topic_label = result.topic_label;
        if (result.topic_category) updates.topic_category = result.topic_category;
        if (Object.keys(updates).length === 0) return;

        fetch(`${SUPABASE_URL}/rest/v1/nta_query_log?question=eq.${encodeURIComponent(question)}&session_id=eq.${encodeURIComponent(getSessionId())}&order=created_at.desc&limit=1`, {
          method: 'PATCH',
          headers: {
            'apikey': SUPABASE_ANON_KEY,
            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
            'Content-Type': 'application/json',
            'Prefer': 'return=minimal'
          },
          body: JSON.stringify(updates),
          keepalive: true
        }).catch(() => {});
      });
    }

    function expandTile(card, type) {
      if (card.classList.contains('expanded')) { collapseTile(card); return; }
      const grid = document.getElementById('coverageGrid');
      grid.classList.add('has-expanded');
      card.classList.add('expanded');
      card.setAttribute('aria-expanded', 'true');
      const container = document.getElementById('expand-' + type);
      if (container.children.length > 0) return; // already populated

      if (type === 'web') {
        const webData = TILE_SOURCES.web;
        let html = '<div class="coverage-subgroup-label">NTA Website</div>';
        html += webData.nta.map(s =>
          `<div class="coverage-source-item">
            <span class="coverage-source-name"><a href="${s.url}" target="_blank" rel="noopener">${s.name}</a></span>
          </div>`
        ).join('');
        if (webData.nih.length > 0) {
          html += '<div class="coverage-subgroup-label">NIH Office of Dietary Supplements</div>';
          html += webData.nih.map(s =>
            `<div class="coverage-source-item">
              <span class="coverage-source-name"><a href="${s.url}" target="_blank" rel="noopener">${s.name}</a></span>
              ${s.chunks ? `<span class="coverage-source-count">${s.chunks} chunks</span>` : ''}
            </div>`
          ).join('');
        }
        container.innerHTML = html;
      } else if (type === 'podcast') {
        container.innerHTML = TILE_SOURCES.podcast.map(s =>
          `<div class="coverage-source-item">
            <span class="coverage-source-name"><a href="${s.url}" target="_blank" rel="noopener">${s.name}</a></span>
          </div>`
        ).join('');
      } else if (type === 'textbook') {
        const tbData = TILE_SOURCES.textbook;
        const renderGroup = (label, items) => {
          if (!items || items.length === 0) return '';
          return `<div class="coverage-subgroup-label">${label}</div>` + items.map(s =>
            `<div class="coverage-source-item">
              <span class="coverage-source-name"><a href="${s.url}" target="_blank" rel="noopener">${s.name}</a></span>
              <span class="coverage-source-count">${s.chunks} chunks</span>
            </div>`
          ).join('');
        };
        container.innerHTML =
          renderGroup('Anatomy & Physiology', tbData.anatomy_physiology) +
          renderGroup('Principles of Nutrition', tbData.principles_nutrition) +
          renderGroup('Nutritional Medicine (Dr. Gaby)', tbData.gaby) +
          renderGroup('Nutrition for Nurses', tbData.nutrition_nurses);
      } else if (type === 'curriculum') {
        const curData = TILE_SOURCES.curriculum;
        const renderGroup = (label, items) => {
          if (!items || items.length === 0) return '';
          return `<div class="coverage-subgroup-label">${label}</div>` + items.map(s =>
            `<div class="coverage-source-item">
              <span class="coverage-source-name">${s.name}</span>
              ${s.chunks ? `<span class="coverage-source-count">${s.chunks} chunks</span>` : ''}
            </div>`
          ).join('');
        };
        container.innerHTML =
          renderGroup('NTP Program', curData.ntp) +
          renderGroup('PHWC Program', curData.phwc) +
          renderGroup('FOH — Foundations of Healing', curData.foh);
        if (!container.innerHTML) {
          container.innerHTML = '<div class="coverage-source-item"><span class="coverage-source-name" style="color:var(--text-muted)">Curriculum content being loaded...</span></div>';
        }
      }
    }

            </div>
          </div>

          <div class="welcome-section">
            <h3>Try a Question</h3>
            <div class="question-chips" id="questionChips">
              ${questionChipsHTML}
            </div>
          </div>

          <p class="welcome-disclaimer">Curriculum reference only — does not replace instructor guidance.</p>
        </div>
      `;
    }

    function startNewChat() {
      if (currentAbortController) {
        wasCancelled = true;
        currentAbortController.abort();
        currentAbortController = null;
      }
      if (typingIntervalId) {
        clearInterval(typingIntervalId);
        typingIntervalId = null;
      }

      const newSessionId = 'session_' + Date.now() + '_' + Math.random().toString(36).substring(2, 11);
      sessionStorage.setItem('nta_session_id', newSessionId);

      messages = [];
      isLoading = false;
      lastMessageForRetry = null;
      Object.keys(sourceDataStore).forEach(k => delete sourceDataStore[k]);

      const chatArea = document.getElementById('chatArea');
      chatArea.innerHTML = generateWelcomePanel();

      resetSendButton();
      document.getElementById('messageInput').focus();
    }

    // ===== SUGGESTED QUESTIONS =====
    function askSuggestedQuestion(button) {
      const question = button.textContent;
      const input = document.getElementById('messageInput');
      input.value = question;
      sendMessage();
    }

    // ===== INPUT HANDLING =====
    function autoResize(textarea) {
      requestAnimationFrame(() => {
        textarea.style.height = 'auto';
        textarea.style.height = Math.min(textarea.scrollHeight, 200) + 'px';
      });
    }

    function handleKeyDown(event) {
      if (event.key === 'Enter' && !event.shiftKey) {
        event.preventDefault();
        sendMessage();
      }
    }

    // ===== MESSAGE RENDERING =====
    function renderUserMessage(text) {
      return `
        <div class="message message-user">
          <div class="message-content">
            ${escapeHtml(text)}
          </div>
        </div>
      `;
    }

    function renderBotMessage(response) {
      let rawAnswer = response.answer || response.response || 'No response received.';
      let sources = response.sources || [];
      let confidence = response.confidence || null;

      // Safety net: extract embedded JSON if parsing failed upstream
      if (sources.length === 0 && rawAnswer.includes('"answer"')) {
        try {
          const fenceMatch = rawAnswer.match(/```(?:json)?\s*([\s\S]*?)```/);
          if (fenceMatch) {
            const parsed = JSON.parse(fenceMatch[1].trim());
            if (parsed.answer) rawAnswer = parsed.answer;
            if (parsed.sources) sources = parsed.sources;
          }
        } catch (e) {
          console.warn('[Frontend Safety Net] JSON extraction failed:', e.message);
        }
      }

      if (!confidence || !confidence.level) {
        const confidenceMatch = rawAnswer.match(/\*\*Confidence:\*\*\s*(High|Medium|Low)/i) ||
                                rawAnswer.match(/Confidence:\s*(High|Medium|Low)/i);
        if (confidenceMatch) {
          const level = confidenceMatch[1];
          const explanationMatch = rawAnswer.match(/Confidence:\s*(?:High|Medium|Low)\s*[---]\s*([^\n]+)/i);
          confidence = {
            level: level.charAt(0).toUpperCase() + level.slice(1).toLowerCase(),
            explanation: explanationMatch ? explanationMatch[1].trim() : ''
          };
        } else {
          confidence = { level: 'Medium', explanation: 'Confidence level not provided.' };
        }
      }

      let cleanAnswer = rawAnswer
        .replace(/\*\*Confidence:\*\*[^\n]*/gi, '')
        .replace(/Confidence:\s*(?:High|Medium|Low)\s*[---][^\n]*/gi, '')
        .replace(/\*\*Short Answer:?\*\*\s*/gi, '')
        .replace(/\*\*Requirements:?\*\*\s*/gi, '')
        .replace(/\*\*Sources:?\*\*[\s\S]*$/gi, '')
        .replace(/\*\*Additional Notes:?\*\*\s*/gi, '')
        .trim();

      const validLevels = ['high', 'medium', 'low'];
      const normalizedLevel = confidence.level ? confidence.level.toLowerCase() : 'medium';
      const confidenceClass = validLevels.includes(normalizedLevel) ? normalizedLevel : 'medium';
      const messageId = 'msg-' + Date.now() + '-' + Math.random().toString(36).substring(2, 7);

      let sourcesHtml = '';
      const validSources = sources.filter(s => s && (s.content || s.section_title || s.document_name));
      if (validSources.length > 0) {
        sourcesHtml = renderCategorizedSources(validSources, messageId);
      }

      return `
        <div class="message message-bot" id="${messageId}">
          <div class="message-content">
            <div class="message-header">
              <div class="message-header-left">
                <span class="message-sender">NTA Bot</span>
              </div>
              <div class="message-header-right">
                <span class="confidence-badge confidence-${confidenceClass}" onclick="toggleConfidenceTooltip(this, event)" data-explanation="${escapeHtml(confidence.explanation || 'No additional details available.')}">
                  <span class="confidence-dot"></span>
                  ${escapeHtml(confidence.level || 'Medium')}
                  <div class="confidence-tooltip">${escapeHtml(confidence.explanation || 'No additional details available.')}</div>
                </span>
                <button class="speak-btn" onclick="speakMessage(this)" title="Read aloud">
                  <svg class="speaker-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                    <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
                    <path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
                  </svg>
                  <div class="waveform">
                    <span></span><span></span><span></span><span></span><span></span>
                  </div>
                </button>
                <button class="copy-btn" onclick="copyAnswer(this, '${messageId}')" title="Copy answer">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                  </svg>
                </button>
              </div>
            </div>
            <div class="answer-section">
              <div class="answer-label">Answer</div>
              <div class="answer-text" data-raw-answer="${escapeHtml(cleanAnswer)}">
                ${formatAnswerText(cleanAnswer)}
              </div>
            </div>
            ${sourcesHtml}
          </div>
        </div>
      `;
    }

    function getSourceCategory(hierarchy) {
      if (!hierarchy || !hierarchy[0]) return { label: 'Web', cssClass: 'web' };
      const h0 = hierarchy[0];
      if (h0.endsWith('Curriculum')) return { label: 'Curriculum', cssClass: 'curriculum' };
      if (h0 === 'NIH') return { label: 'NIH', cssClass: 'nih' };
      if (h0 === 'Textbook') return { label: 'Textbook', cssClass: 'textbook' };
      if (h0 === 'Podcast') return { label: 'Podcast', cssClass: 'podcast' };
      return { label: 'Web', cssClass: 'web' };
    }

    function getExternalLink(url) {
      if (!url) return { label: '', icon: '', cc: '' };
      const isNIH = url.includes('ods.od.nih.gov');
      const isOpenStax = url.includes('openstax.org');
      const isLibreTexts = url.includes('libretexts.org');
      const isApple = url.includes('podcasts.apple.com');
      const isGaby = url.includes('doctorgaby.com');
      const label = isNIH ? 'View on NIH website' : isOpenStax ? 'View on OpenStax' : isLibreTexts ? 'View on LibreTexts' : isApple ? 'Listen on Apple Podcasts' : isGaby ? 'View on doctorgaby.com' : 'View on NTA website';
      const icon = isNIH
        ? '<path d="M9 12h6m-3-3v6m-7 4h14a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2z"></path>'
        : (isOpenStax || isLibreTexts || isGaby)
        ? '<path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>'
        : isApple
        ? '<path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle>'
        : '<path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line>';
      const cc = isOpenStax ? ' CC BY 4.0' : isLibreTexts ? ' CC BY-SA 4.0' : '';
      return { label, icon, cc };
    }

    function renderExternalLinkHtml(url) {
      if (!url) return '';
      const link = getExternalLink(url);
      return `<a class="view-source-link source-url-link" href="${escapeHtml(url)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${link.icon}</svg>
        ${link.label}
      </a>${link.cc ? `<span style="font-size:0.6rem;color:#6b7280;margin-left:0.25rem;">${link.cc}</span>` : ''}`;
    }

    function renderSectionRow(source, docName, messageId) {
      const title = source.section_title || 'Section';
      const content = source.content || 'Source content not available.';
      const sourceUrl = source.source_url || null;
      const hierarchy = source.section_hierarchy || [];
      const sourceId = `${messageId}-source-${source._originalIndex}`;

      const pathParts = [docName];
      if (hierarchy.length > 0) pathParts.push(...hierarchy);
      if (title && !hierarchy.includes(title) && title !== docName) pathParts.push(title);
      sourceDataStore[sourceId] = { path: pathParts.join(' \u203a '), content, sourceUrl };

      return `<div class="source-section-row">
        <div class="source-section-title">${escapeHtml(title)}</div>
        <div class="source-actions">
          <button class="view-source-link" onclick="openSourceModal('${sourceId}')">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
              <polyline points="14 2 14 8 20 8"></polyline>
              <line x1="16" y1="13" x2="8" y2="13"></line>
              <line x1="16" y1="17" x2="8" y2="17"></line>
            </svg>
            View source text
          </button>
        </div>
      </div>`;
    }

    function renderCategorizedSources(sources, messageId) {
      // Step 1: Tag each source with its category and original index
      const tagged = sources.map((s, i) => ({
        ...s,
        _originalIndex: i,
        _category: getSourceCategory(s.section_hierarchy || [])
      }));

      // Step 2: Group by category
      const categories = {};
      tagged.forEach(s => {
        const key = s._category.cssClass;
        if (!categories[key]) categories[key] = { label: s._category.label, cssClass: s._category.cssClass, sources: [] };
        categories[key].sources.push(s);
      });

      // Step 3: Render category cards (ordered: curriculum, textbook, nih, podcast, web)
      const order = ['curriculum', 'textbook', 'nih', 'podcast', 'web'];
      const cards = order
        .filter(key => categories[key])
        .map(key => {
          const cat = categories[key];
          // Group sources within this category by document_name
          const docs = {};
          cat.sources.forEach(s => {
            const docKey = s.document_name || 'Unknown';
            if (!docs[docKey]) docs[docKey] = [];
            docs[docKey].push(s);
          });

          const docCount = Object.keys(docs).length;
          const sectionCount = cat.sources.length;
          const catId = `${messageId}-cat-${cat.cssClass}`;

          // Header: badge + counts
          const countsText = `${docCount} ${docCount === 1 ? 'document' : 'documents'} \u00b7 ${sectionCount} ${sectionCount === 1 ? 'section' : 'sections'}`;

          // Body content depends on single vs multi document
          let bodyHtml = '';
          if (docCount === 1) {
            // Single document: show external link + sections directly
            const [docName, sections] = Object.entries(docs)[0];
            const firstUrl = sections.find(s => s.source_url)?.source_url || null;
            const linkHtml = renderExternalLinkHtml(firstUrl);
            const linkRow = linkHtml ? `<div class="source-doc-header"><div class="source-doc-name">${escapeHtml(docName)}</div><div class="source-doc-link">${linkHtml}</div></div>` : `<div class="source-doc-header"><div class="source-doc-name">${escapeHtml(docName)}</div></div>`;
            bodyHtml = linkRow + sections.map(s => renderSectionRow(s, docName, messageId)).join('');
          } else {
            // Multiple documents: flat list with document subheaders
            bodyHtml = Object.entries(docs).map(([docName, sections]) => {
              const firstUrl = sections.find(s => s.source_url)?.source_url || null;
              const linkHtml = renderExternalLinkHtml(firstUrl);
              const docHeader = `<div class="source-doc-header"><div class="source-doc-name">${escapeHtml(docName)}</div>${linkHtml ? `<div class="source-doc-link">${linkHtml}</div>` : ''}</div>`;
              return docHeader + sections.map(s => renderSectionRow(s, docName, messageId)).join('');
            }).join('');
          }

          return `<div class="source-category ${cat.cssClass}" id="${catId}">
            <div class="source-category-header" role="button" tabindex="0" aria-expanded="false" onclick="this.parentElement.classList.toggle('expanded'); this.setAttribute('aria-expanded', this.parentElement.classList.contains('expanded'))" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();this.click()}">
              <div class="source-category-info">
                <span class="authority-badge authority-${cat.cssClass}">${cat.label}</span>
                <span class="source-category-counts">${countsText}</span>
              </div>
              <svg class="source-category-chevron" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="9 18 15 12 9 6"></polyline>
              </svg>
            </div>
            <div class="source-category-body">
              ${bodyHtml}
            </div>
          </div>`;
        }).join('');

      return `<div class="sources-section">
        <div class="sources-title">Sources & References</div>
        ${cards}
      </div>`;
    }

    function renderSourceItem(source, index, messageId) {
      const hierarchy = source.section_hierarchy || [];
      const title = source.section_title || hierarchy[hierarchy.length - 1] || 'Unknown Section';
      const docName = source.document_name || 'Document';
      const content = source.content || 'Source content not available.';
      const pageNumber = source.page_number || null;
      const sourceUrl = source.source_url || null;

      // Build full breadcrumb: Document > Hierarchy > Title
      const pathParts = [docName];
      if (hierarchy.length > 0) pathParts.push(...hierarchy);
      if (title && !hierarchy.includes(title) && title !== docName) pathParts.push(title);
      const fullPath = pathParts.join(' \u203a ');

      const sourceId = `${messageId}-source-${index}`;
      sourceDataStore[sourceId] = { path: fullPath, content, sourceUrl };

      const pageHtml = pageNumber ? `<span class="page-badge">Page ${pageNumber}</span>` : '';

      // Dynamic badge: detect source type from hierarchy
      const isCurriculumSource = hierarchy[0] && hierarchy[0].endsWith('Curriculum');
      const isNIHSource = hierarchy[0] === 'NIH';
      const isTextbookSource = hierarchy[0] === 'Textbook';
      const isPodcastSource = hierarchy[0] === 'Podcast';
      const badgeClass = isCurriculumSource ? 'authority-curriculum' : isNIHSource ? 'authority-nih' : isTextbookSource ? 'authority-textbook' : isPodcastSource ? 'authority-podcast' : 'authority-web';
      const badgeLabel = isCurriculumSource ? 'Curriculum' : isNIHSource ? 'NIH' : isTextbookSource ? 'Textbook' : isPodcastSource ? 'Podcast' : 'Web';

      const isTextbook = sourceUrl && sourceUrl.includes('openstax.org');
      const isPodcast = sourceUrl && sourceUrl.includes('podcasts.apple.com');
      const sourceLinkLabel = isTextbook ? 'View on OpenStax' : isPodcast ? 'Listen on Apple Podcasts' : 'View on NTA website';
      const sourceLinkIcon = isTextbook
        ? '<path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>'
        : isPodcast
        ? '<path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle>'
        : '<path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line>';
      const ccBadge = isTextbook ? '<span style="font-size:0.6rem;color:#6b7280;margin-left:0.25rem;">CC BY 4.0</span>' : '';
      const sourceLink = sourceUrl ? `
            <a class="view-source-link source-url-link" href="${escapeHtml(sourceUrl)}" target="_blank" rel="noopener">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                ${sourceLinkIcon}
              </svg>
              ${sourceLinkLabel}
            </a>${ccBadge}` : '';

      return `
        <div class="source-item" id="${sourceId}">
          <div class="source-header">
            <div class="source-info">
              <div class="source-path">${escapeHtml(fullPath)}</div>
              <div class="source-meta">
                <span class="authority-badge ${badgeClass}">${badgeLabel}</span>
                ${pageHtml}
              </div>
            </div>
          </div>
          <div class="source-actions">
            <button class="view-source-link" onclick="openSourceModal('${sourceId}')">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                <polyline points="14 2 14 8 20 8"></polyline>
                <line x1="16" y1="13" x2="8" y2="13"></line>
                <line x1="16" y1="17" x2="8" y2="17"></line>
              </svg>
              View source text
            </button>${sourceLink}
          </div>
        </div>
      `;
    }

    function openSourceModal(sourceId) {
      const data = sourceDataStore[sourceId];
      if (!data) return;
      const modal = document.getElementById('sourceModal');
      document.getElementById('sourceModalTitle').textContent = data.path;
      document.getElementById('sourceModalBody').textContent = data.content;
      modal.classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function closeSourceModal() {
      document.getElementById('sourceModal').classList.remove('active');
      document.body.style.overflow = '';
    }

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') closeSourceModal();
    });

    function formatAnswerText(text) {
      if (!text) return '';
      let html = escapeHtml(text);
      // Inline formatting (order matters: bold before italic)
      html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      html = html.replace(/(?<!\*)\*(?!\*)(.+?)(?<!\*)\*(?!\*)/g, '<em>$1</em>');
      html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
      // Block-level: split into lines and detect lists
      const lines = html.split('\n');
      let listType = null; // 'ul' | 'ol' | null
      let result = [];
      for (let i = 0; i < lines.length; i++) {
        const line = lines[i].trim();
        const bulletMatch = line.match(/^[-\u2022]\s+(.+)/);
        const numberMatch = line.match(/^\d+[.)]\s+(.+)/);
        if (bulletMatch) {
          if (listType !== 'ul') { if (listType) result.push(`</${listType}>`); result.push('<ul>'); listType = 'ul'; }
          result.push(`<li>${bulletMatch[1]}</li>`);
        } else if (numberMatch) {
          if (listType !== 'ol') { if (listType) result.push(`</${listType}>`); result.push('<ol>'); listType = 'ol'; }
          result.push(`<li>${numberMatch[1]}</li>`);
        } else {
          if (listType) { result.push(`</${listType}>`); listType = null; }
          if (line) result.push(`<p>${line}</p>`);
        }
      }
      if (listType) result.push(`</${listType}>`);
      html = result.join('');
      html = html.replace(/<p><\/p>/g, '');
      return html || '<p>No answer available.</p>';
    }

    function toggleConfidenceTooltip(badge, event) {
      event.stopPropagation();
      document.querySelectorAll('.confidence-badge.tooltip-open').forEach(b => {
        if (b !== badge) b.classList.remove('tooltip-open');
      });
      badge.classList.toggle('tooltip-open');
    }

    document.addEventListener('click', function(event) {
      if (!event.target.closest('.confidence-badge')) {
        document.querySelectorAll('.confidence-badge.tooltip-open').forEach(badge => badge.classList.remove('tooltip-open'));
      }
    });

    function copyAnswer(button, messageId) {
      const messageEl = document.getElementById(messageId);
      if (!messageEl) return;
      const answerEl = messageEl.querySelector('.answer-text');
      if (!answerEl) return;
      const rawAnswer = answerEl.getAttribute('data-raw-answer') || answerEl.innerText;
      navigator.clipboard.writeText(rawAnswer).then(() => {
        button.classList.add('copied');
        button.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>`;
        setTimeout(() => {
          button.classList.remove('copied');
          button.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>`;
        }, 2000);
      });
    }

    let _typingCurrentStage = -1;

    function getStageForElapsed(elapsed) {
      let stage = TYPING_STAGES[0];
      for (const s of TYPING_STAGES) {
        if (elapsed >= s.at) stage = s;
      }
      return stage;
