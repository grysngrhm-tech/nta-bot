<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NTA Bot Analytics</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg-primary: #f5f5f0;
      --bg-secondary: #ffffff;
      --text-primary: #1a1a1a;
      --text-secondary: #4a4a4a;
      --text-muted: #777777;
      --accent: #4a7c59;
      --accent-hover: #3d6b4a;
      --accent-subtle: rgba(74, 124, 89, 0.1);
      --border: #d5d5cc;
      --confidence-high: #16a34a;
      --confidence-medium: #ca8a04;
      --confidence-low: #dc2626;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
      --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1);
      --radius-sm: 0.375rem;
      --radius-md: 0.5rem;
      --radius-lg: 0.75rem;
      --radius-xl: 1rem;
      --radius-pill: 25px;
      --transition: 200ms ease;
      --gap-color: #e65100;
      --gap-bg: #fff3e0;
      --row-border: #f0f0eb;
    }

    body {
      font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 15px;
      line-height: 1.6;
      color: var(--text-primary);
      background: var(--bg-primary);
      min-height: 100vh;
    }

    /* ===== HEADER ===== */
    .header {
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      padding: 0 1.5rem;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: var(--shadow-sm);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .header-logo {
      height: 36px;
      width: auto;
    }

    .header-divider {
      width: 1px;
      height: 24px;
      background: var(--border);
    }

    .header-subtitle {
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--text-muted);
      letter-spacing: 0.02em;
    }

    .back-link {
      font-size: 0.8125rem;
      font-weight: 600;
      color: var(--accent);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.375rem;
      transition: color var(--transition);
    }

    .back-link:hover {
      color: var(--accent-hover);
    }

    .back-link svg {
      width: 16px;
      height: 16px;
    }

    /* ===== HERO ===== */
    .dash-hero {
      text-align: center;
      padding: 1.5rem 1rem 0.5rem;
      max-width: 640px;
      margin: 0 auto 1rem;
    }

    .dash-hero h2 {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 0.375rem;
    }

    .dash-hero p {
      font-size: 0.875rem;
      color: var(--text-secondary);
      line-height: 1.6;
    }

    /* ===== MAIN ===== */
    .main {
      max-width: 1080px;
      margin: 0 auto;
      padding: 0 1.5rem 1.5rem;
    }

    /* ===== SECTION ===== */
    .section {
      margin-bottom: 2rem;
    }

    .section-header {
      margin-bottom: 1rem;
    }

    .section-title {
      font-size: 1.125rem;
      font-weight: 700;
      color: var(--text-primary);
      display: inline;
    }

    .section-subtitle {
      font-size: 0.8125rem;
      color: var(--text-muted);
      margin-top: 0.125rem;
    }

    /* ===== INFO TOOLTIPS ===== */
    .info-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: none;
      color: var(--text-muted);
      font-size: 0.625rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      margin-left: 0.375rem;
      vertical-align: middle;
      transition: all var(--transition);
      position: relative;
    }

    .info-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-subtle);
    }

    .info-tooltip {
      display: none;
      position: absolute;
      top: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%);
      width: 320px;
      padding: 0.75rem 1rem;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-lg);
      font-size: 0.8125rem;
      font-weight: 400;
      color: var(--text-secondary);
      line-height: 1.5;
      text-align: left;
      z-index: 100;
      cursor: default;
    }

    .info-tooltip::before {
      content: '';
      position: absolute;
      top: -6px;
      left: 50%;
      transform: translateX(-50%) rotate(45deg);
      width: 10px;
      height: 10px;
      background: var(--bg-secondary);
      border-left: 1px solid var(--border);
      border-top: 1px solid var(--border);
    }

    .info-btn.open .info-tooltip {
      display: block;
    }

    @media (max-width: 560px) {
      .info-tooltip {
        width: 260px;
        left: 0;
        transform: none;
      }
      .info-tooltip::before {
        left: 9px;
        transform: rotate(45deg);
      }
    }

    /* ===== FILTER BAR ===== */
    .active-filter-bar {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1.25rem;
      padding: 0.625rem 1rem;
      background: var(--accent-subtle);
      border: 1px solid var(--accent);
      border-radius: var(--radius-lg);
    }

    .active-filter-bar .filter-label {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .active-filter-bar .filter-value {
      font-size: 0.8125rem;
      font-weight: 600;
      color: var(--text-primary);
    }

    .active-filter-bar .filter-clear {
      margin-left: auto;
      background: none;
      border: none;
      color: var(--accent);
      font-size: 0.8125rem;
      font-weight: 700;
      cursor: pointer;
      padding: 0.125rem 0.375rem;
      border-radius: var(--radius-sm);
      transition: background var(--transition);
    }

    .active-filter-bar .filter-clear:hover {
      background: rgba(74, 124, 89, 0.15);
    }

    /* ===== STATS ===== */
    .stats-row {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .stat-card {
      flex: 1;
      min-width: 120px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1rem 0.75rem;
      box-shadow: var(--shadow-sm);
      text-align: center;
      transition: border-color var(--transition), box-shadow var(--transition);
    }

    .stat-card.clickable {
      cursor: pointer;
    }

    .stat-card.clickable:hover {
      box-shadow: var(--shadow-md);
    }

    .stat-card.active {
      box-shadow: 0 0 0 2px var(--accent);
    }

    .stat-card.conf-high {
      border-left: 4px solid var(--confidence-high);
    }

    .stat-card.conf-high .stat-value {
      color: var(--confidence-high);
    }

    .stat-card.conf-medium {
      border-left: 4px solid var(--confidence-medium);
    }

    .stat-card.conf-medium .stat-value {
      color: var(--confidence-medium);
    }

    .stat-card.conf-low {
      border-left: 4px solid var(--confidence-low);
    }

    .stat-card.conf-low .stat-value {
      color: var(--confidence-low);
    }

    .stat-value {
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--accent);
      line-height: 1.1;
    }

    .stat-label {
      font-size: 0.6875rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-top: 0.375rem;
    }

    .source-pills {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-top: 0.75rem;
    }

    .source-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.375rem;
      padding: 0.3rem 0.75rem;
      border-radius: var(--radius-pill);
      font-size: 0.75rem;
      font-weight: 600;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      cursor: pointer;
      transition: border-color var(--transition), box-shadow var(--transition);
    }

    .source-pill:hover {
      border-color: var(--accent);
    }

    .source-pill.active {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px var(--accent);
    }

    .source-pill .sp-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .source-pill .sp-dot.web { background: #2563eb; }
    .source-pill .sp-dot.podcast { background: #d97706; }
    .source-pill .sp-dot.both { background: #7c3aed; }

    /* ===== TOPIC GAP TABLE ===== */
    .gap-table {
      width: 100%;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
    }

    .gap-table-header {
      display: grid;
      grid-template-columns: 1.5fr 1fr 0.75fr 0.75fr;
      padding: 0.75rem 1.25rem;
      background: var(--bg-primary);
      border-bottom: 1px solid var(--border);
      font-size: 0.6875rem;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .gap-table-row {
      display: grid;
      grid-template-columns: 1.5fr 1fr 0.75fr 0.75fr;
      padding: 0.75rem 1.25rem;
      align-items: center;
      border-bottom: 1px solid var(--row-border);
      font-size: 0.875rem;
      cursor: pointer;
      transition: background var(--transition);
    }

    .gap-table-row:last-child {
      border-bottom: none;
    }

    .gap-table-row:hover {
      background: var(--bg-primary);
    }

    .gap-table-topic {
      font-weight: 600;
      color: var(--text-primary);
    }

    .demand-bar-wrapper {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .demand-bar-track {
      flex: 1;
      height: 8px;
      border-radius: 4px;
      background: #e8e8e2;
    }

    .demand-bar {
      height: 8px;
      border-radius: 4px;
      background: var(--accent);
      transition: width 0.3s ease;
    }

    .demand-count {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-muted);
      min-width: 24px;
    }

    .supply-label {
      font-size: 0.8125rem;
      color: var(--text-secondary);
    }

    .gap-badge {
      font-size: 0.6875rem;
      font-weight: 700;
      padding: 0.2rem 0.5rem;
      border-radius: var(--radius-sm);
      text-align: center;
      white-space: nowrap;
    }

    .gap-badge.high { background: #fef2f2; color: #dc2626; }
    .gap-badge.medium { background: var(--gap-bg); color: var(--gap-color); }
    .gap-badge.covered { background: #f0fdf4; color: var(--confidence-high); }

    /* ===== TRENDING ===== */
    .trending-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .trending-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.375rem;
      padding: 0.375rem 0.75rem;
      border-radius: var(--radius-pill);
      font-size: 0.8125rem;
      font-weight: 600;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      color: var(--text-primary);
      box-shadow: var(--shadow-sm);
      cursor: pointer;
      transition: border-color var(--transition), box-shadow var(--transition);
    }

    .trending-pill:hover {
      border-color: var(--accent);
    }

    .trending-pill .count {
      font-size: 0.6875rem;
      font-weight: 700;
      background: var(--accent-subtle);
      color: var(--accent);
      padding: 0.125rem 0.375rem;
      border-radius: 10px;
    }

    .trending-pill .badge {
      font-size: 0.625rem;
      font-weight: 700;
      padding: 0.125rem 0.375rem;
      border-radius: 10px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .badge-new { background: #dbeafe; color: #1d4ed8; }
    .badge-trending { background: #f0fdf4; color: var(--confidence-high); }

    /* ===== SOURCE USAGE ===== */
    .source-list {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
    }

    .source-row {
      display: grid;
      grid-template-columns: 1fr 120px 50px 60px;
      align-items: center;
      padding: 0.625rem 1.25rem;
      border-bottom: 1px solid var(--row-border);
      font-size: 0.8125rem;
      cursor: pointer;
      transition: background var(--transition);
      gap: 0.75rem;
    }

    .source-row:last-child {
      border-bottom: none;
    }

    .source-row:hover {
      background: var(--bg-primary);
    }

    .source-row-name {
      font-weight: 600;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .source-bar-track {
      height: 6px;
      border-radius: 3px;
      background: #e8e8e2;
    }

    .source-bar {
      height: 6px;
      border-radius: 3px;
      background: var(--accent);
      transition: width 0.3s ease;
    }

    .source-row-count {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--text-muted);
      text-align: right;
    }

    .source-type-badge {
      font-size: 0.625rem;
      font-weight: 700;
      padding: 0.15rem 0.4rem;
      border-radius: var(--radius-sm);
      text-transform: uppercase;
      text-align: center;
      white-space: nowrap;
    }

    .source-type-badge.web { background: #dbeafe; color: #1d4ed8; }
    .source-type-badge.podcast { background: #fef3c7; color: #92400e; }

    .never-cited-note {
      font-size: 0.8125rem;
      color: var(--text-muted);
      padding: 0.75rem 1.25rem;
      border-top: 1px solid var(--row-border);
    }

    /* ===== SESSION REPLAY ===== */
    .session-list {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .session-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
    }

    .session-card-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.875rem 1.25rem;
      cursor: pointer;
      transition: background var(--transition);
    }

    .session-card-header:hover {
      background: var(--bg-primary);
    }

    .session-qcount {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--bg-secondary);
      background: var(--accent);
      padding: 0.2rem 0.5rem;
      border-radius: var(--radius-sm);
      white-space: nowrap;
    }

    .session-meta {
      flex: 1;
      min-width: 0;
    }

    .session-breadcrumb {
      font-size: 0.8125rem;
      font-weight: 600;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .session-time {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 0.125rem;
    }

    .session-chevron {
      width: 16px;
      height: 16px;
      color: var(--text-muted);
      transition: transform var(--transition);
      flex-shrink: 0;
    }

    .session-card.expanded .session-chevron {
      transform: rotate(180deg);
    }

    .session-detail {
      display: none;
      border-top: 1px solid var(--border);
      padding: 1rem 1.25rem;
      background: var(--bg-primary);
    }

    .session-card.expanded .session-detail {
      display: block;
    }

    .profile-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.5rem 1.5rem;
      margin-bottom: 0.75rem;
    }

    @media (max-width: 560px) {
      .profile-grid {
        grid-template-columns: 1fr;
      }
    }

    .profile-item {
      display: flex;
      align-items: baseline;
      gap: 0.5rem;
      font-size: 0.8125rem;
      color: var(--text-secondary);
    }

    .profile-item strong {
      color: var(--text-primary);
    }

    .profile-icon {
      font-size: 0.875rem;
      flex-shrink: 0;
    }

    .profile-confidence {
      display: flex;
      gap: 0.375rem;
      flex-wrap: wrap;
      margin-bottom: 0.75rem;
    }

    .conf-pill {
      font-size: 0.6875rem;
      font-weight: 600;
      padding: 0.2rem 0.5rem;
      border-radius: var(--radius-sm);
    }

    .conf-high { background: rgba(22, 163, 74, 0.1); color: var(--confidence-high); }
    .conf-medium { background: rgba(202, 138, 4, 0.1); color: var(--confidence-medium); }
    .conf-low { background: rgba(220, 38, 38, 0.1); color: var(--confidence-low); }

    .session-table-btn {
      display: block;
      width: 100%;
      padding: 0.5rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 0.75rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background var(--transition);
    }

    .session-table-btn:hover {
      background: var(--accent-hover);
    }


    /* ===== DATA TABLE ===== */
    .table-controls {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 0.75rem;
      flex-wrap: wrap;
    }

    .table-filter-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.375rem;
      padding: 0.3rem 0.625rem;
      border-radius: var(--radius-pill);
      font-size: 0.75rem;
      font-weight: 600;
      background: var(--accent-subtle);
      color: var(--accent);
      border: 1px solid var(--accent);
    }

    .table-filter-pill button {
      background: none;
      border: none;
      color: var(--accent);
      cursor: pointer;
      font-weight: 700;
      font-size: 0.875rem;
      line-height: 1;
      padding: 0;
    }

    .table-search {
      flex: 1;
      min-width: 180px;
      max-width: 320px;
      padding: 0.4rem 0.75rem;
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      font-family: inherit;
      font-size: 0.8125rem;
      background: var(--bg-secondary);
      color: var(--text-primary);
      outline: none;
      transition: border-color var(--transition);
    }

    .table-search:focus {
      border-color: var(--accent);
    }

    .table-search::placeholder {
      color: var(--text-muted);
    }

    .table-row-count {
      font-size: 0.75rem;
      color: var(--text-muted);
      font-weight: 500;
      margin-left: auto;
      white-space: nowrap;
    }

    .data-table {
      width: 100%;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
    }

    .dt-header {
      display: grid;
      grid-template-columns: 100px 130px 1fr 80px 60px 100px;
      padding: 0.625rem 1rem;
      background: var(--bg-primary);
      border-bottom: 1px solid var(--border);
      font-size: 0.6875rem;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .dt-header-cell {
      cursor: pointer;
      user-select: none;
      display: flex;
      align-items: center;
      gap: 0.25rem;
      transition: color var(--transition);
    }

    .dt-header-cell:hover {
      color: var(--text-primary);
    }

    .dt-header-cell.sorted {
      color: var(--accent);
    }

    .sort-arrow {
      font-size: 0.5rem;
    }

    .dt-row {
      display: grid;
      grid-template-columns: 100px 130px 1fr 80px 60px 100px;
      padding: 0.625rem 1rem;
      align-items: center;
      border-bottom: 1px solid var(--row-border);
      font-size: 0.8125rem;
      cursor: pointer;
      transition: background var(--transition);
    }

    .dt-row:hover {
      background: var(--bg-primary);
    }

    .dt-row-time {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .dt-topic-pill {
      font-size: 0.625rem;
      font-weight: 700;
      color: #fff;
      padding: 0.15rem 0.4rem;
      border-radius: var(--radius-sm);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 120px;
      display: inline-block;
      text-transform: uppercase;
      letter-spacing: 0.02em;
    }

    .dt-question {
      font-weight: 500;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .dt-confidence {
      display: flex;
      align-items: center;
      gap: 0.375rem;
      font-size: 0.75rem;
    }

    .confidence-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

      color: var(--text-muted);

    .dt-exp-label:first-child {

    .dt-exp-pill.web { background: #dbeafe; color: #1d4ed8; }

    .dt-exp-meta {

    /* ===== EMPTY / LOADING / MUTED ===== */
    .empty-state {

      padding: 4rem 2rem;
    }

    .empty-state-title {
      font-size: 1.125rem;
      font-weight: 700;

    .empty-state-text {

    .muted-message {
      font-size: 0.875rem;
      color: var(--text-muted);
      font-style: italic;
      padding: 1.5rem;
      text-align: center;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);

    .loading-spinner {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      gap: 0.5rem;
      color: var(--text-muted);
      font-size: 0.875rem;

    .spinner {
      width: 20px;
      height: 20px;
      border: 2.5px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .sentinel {
      height: 1px;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 640px) {
      .header {
        padding: 0 1rem;
      }

      .header-divider,
      .header-subtitle {
        display: none;
      }

      .main {
        padding: 1rem;
      }

      .stat-card {
        min-width: 90px;
      }

      .stat-value {
        font-size: 1.375rem;
      }

      .gap-grid {
        grid-template-columns: 1fr;
      }

      .gap-table-header,
      .gap-table-row {
        grid-template-columns: 1fr 0.75fr 0.6fr 0.6fr;
        padding: 0.625rem 0.75rem;
        font-size: 0.8125rem;
      }

      .dt-header,
      .dt-row {
        grid-template-columns: 80px 100px 1fr 70px 50px;
      }

      .dt-header .dt-header-cell:nth-child(6),
      .dt-row .dt-location {
        display: none;
      }

      .dt-expanded {
        padding-left: 1rem;
      }

      .source-row {
        grid-template-columns: 1fr 80px 40px 50px;
        padding: 0.5rem 0.75rem;
      }

      .timeline-row {
        grid-template-columns: 50px auto 1fr;

      }
    }

    @media (max-width: 420px) {
      .stats-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
      }
    }
  </style>
</head>

    </div>
  </main>

  <script>
    // ===== CONFIG =====
    const SUPABASE_URL = 'https://wdouifomlipmlsksczsv.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indkb3VpZm9tbGlwbWxza3NjenN2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcyMDQ3NTEsImV4cCI6MjA4Mjc4MDc1MX0.lVu6OnArZ_MFXFrx0ljn2GXfFtAM_Ru8xcTUXZbwqn8';

    const CATEGORY_KEYWORDS = {
      'Digestion & Gut Health': ['digestion', 'gut', 'microbiome', 'digestive'],
      'Blood Sugar & Metabolism': ['blood sugar', 'metabolism', 'insulin', 'glucose'],
      'Sleep & Recovery': ['sleep', 'recovery', 'circadian'],
      'Stress & Adrenal Health': ['stress', 'adrenal', 'cortisol', 'hpa'],
      'Nutrient-Dense Diet & Food Quality': ['nutrient', 'diet', 'food quality', 'sourcing', 'traditional'],
      'Supplements & Nutrients': ['supplement', 'vitamin', 'mineral', 'nutrient'],
      'Hormones & Endocrine': ['hormone', 'endocrine', 'thyroid', 'estrogen'],
      'Mental Health & Brain': ['mental', 'brain', 'depression', 'anxiety', 'cognitive'],
      'Fertility & Reproductive Health': ['fertility', 'reproductive', 'pregnancy', 'pcos'],
      'NTP Program & Clinical Tools': ['ntp', 'naca', 'naq', 'nutri-q', 'clinical', 'practitioner'],
      'PHWC Program & Coaching': ['phwc', 'coaching', 'behavior change', 'wellness coach'],
      'Scope of Practice & Credentials': ['scope', 'credential', 'fntp', 'fca', 'board exam'],
      'NTA Philosophy & Mission': ['philosophy', 'mission', 'bio-individuality', 'innate intelligence'],
      'General Wellness': ['wellness', 'health', 'lifestyle']
    };

    // ===== STATE =====
    let allLogs = [];
    let knowledgeTopics = {};
    let knowledgeDocNames = new Set();
    let filterState = { type: null, value: null, label: null };
    let searchQuery = '';
    let sortField = 'created_at';
    let sortDir = 'desc';
    let tableOffset = 0;
    const TABLE_PAGE = 50;
    let tableLoading = false;
    let tableDone = false;
    let tableObserver = null;

    // ===== HELPERS =====
    function relativeTime(dateStr) {
      const now = new Date();
      const date = new Date(dateStr);
      const seconds = Math.floor((now - date) / 1000);
      if (seconds < 60) return 'just now';
      if (seconds < 3600) return Math.floor(seconds / 60) + 'm ago';
      if (seconds < 86400) return Math.floor(seconds / 3600) + 'h ago';
      if (seconds < 172800) return 'Yesterday';
      return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }

    function topicColor(label) {
      if (!label) return 'hsl(0, 0%, 55%)';
      let hash = 0;
      for (let i = 0; i < label.length; i++) hash = label.charCodeAt(i) + ((hash << 5) - hash);
      const h = Math.abs(hash) % 360;
      return `hsl(${h}, 45%, 45%)`;
    }

    function truncate(str, max) {
      if (!str) return '';
      return str.length > max ? str.slice(0, max) + '...' : str;
    }

    function escapeHtml(str) {
      if (!str) return '';
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    function confidenceClass(level) {
      if (!level) return 'low';
      const l = level.toLowerCase();
      if (l === 'high') return 'high';
      if (l === 'medium') return 'medium';
      return 'low';
    }

    function confidenceNumeric(level) {
      if (!level) return 0;
      const l = level.toLowerCase();
      if (l === 'high') return 3;
      if (l === 'medium') return 2;
      return 1;
    }

    function mode(arr) {
      if (!arr || arr.length === 0) return null;
      const freq = {};
      let maxCount = 0;
      let maxVal = null;
      for (const v of arr) {
        if (!v) continue;
        freq[v] = (freq[v] || 0) + 1;
        if (freq[v] > maxCount) {
          maxCount = freq[v];
          maxVal = v;
        }
      }
      return maxVal;
    }

    // ===== FILTER / SORT / SEARCH =====
    function getFilteredLogs() {
      let logs = allLogs;
      if (filterState.type) {
        logs = logs.filter(r => {
          switch (filterState.type) {
            case 'topic_category': return r.topic_category === filterState.value;
            case 'topic_label': return r.topic_label === filterState.value;
            case 'confidence': return (r.confidence_level || '').toLowerCase() === filterState.value;
            case 'source_document': return (r.source_documents || []).includes(filterState.value);
            case 'source_type': {
              const types = r.source_types || [];
              if (filterState.value === 'both') return types.includes('Web') && types.includes('Podcast');
              if (filterState.value === 'Web') return types.includes('Web') && !types.includes('Podcast');
              if (filterState.value === 'Podcast') return types.includes('Podcast') && !types.includes('Web');
              return true;
            }
            case 'session_id': return r.session_id === filterState.value;
            default: return true;
          }
        });
      }
      if (searchQuery) {
        const q = searchQuery.toLowerCase();
        logs = logs.filter(r =>
          (r.question || '').toLowerCase().includes(q) ||
          (r.topic_label || '').toLowerCase().includes(q) ||
          (r.topic_category || '').toLowerCase().includes(q) ||
          (r.answer_summary || '').toLowerCase().includes(q)
        );
      }
      return logs;
    }

    function getSortedLogs(logs) {
      const sorted = [...logs];
      sorted.sort((a, b) => {
        let av, bv;
        switch (sortField) {
          case 'created_at':
            av = new Date(a.created_at).getTime();
            bv = new Date(b.created_at).getTime();
            break;
          case 'topic_category':
            av = (a.topic_category || '').toLowerCase();
            bv = (b.topic_category || '').toLowerCase();
            return sortDir === 'asc' ? av.localeCompare(bv) : bv.localeCompare(av);
          case 'question':
            av = (a.question || '').toLowerCase();
            bv = (b.question || '').toLowerCase();
            return sortDir === 'asc' ? av.localeCompare(bv) : bv.localeCompare(av);
          case 'confidence_level':
            av = confidenceNumeric(a.confidence_level);
            bv = confidenceNumeric(b.confidence_level);
            break;
          case 'source_count':
            av = a.source_count || 0;
            bv = b.source_count || 0;
            break;
          case 'city':
            av = (a.city || '').toLowerCase();
            bv = (b.city || '').toLowerCase();
            return sortDir === 'asc' ? av.localeCompare(bv) : bv.localeCompare(av);
          default:
            av = new Date(a.created_at).getTime();
            bv = new Date(b.created_at).getTime();
        }
        return sortDir === 'asc' ? av - bv : bv - av;
      });
      return sorted;
    }

    function applyFilter(type, value, label) {
      filterState = { type, value, label };
      renderDashboard();
      // Scroll to table
      const table = document.getElementById('data-table-section');
      if (table) table.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function clearFilter() {
      filterState = { type: null, value: null, label: null };
      renderDashboard();
    }

    function setSort(field) {
      if (sortField === field) {
        sortDir = sortDir === 'desc' ? 'asc' : 'desc';
      } else {
        sortField = field;
        sortDir = field === 'created_at' ? 'desc' : 'asc';
      }
      renderDashboard();
    }

    // ===== SUPABASE FETCH =====
    async function supaGet(path) {
      const url = `${SUPABASE_URL}/rest/v1/${path}`;
      const res = await fetch(url, {
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${SUPABASE_KEY}`,
          'Content-Type': 'application/json'
        }
      });
      if (!res.ok) throw new Error(`Supabase ${res.status}: ${await res.text()}`);
      return res.json();
    }

    // ===== DATA LOADING =====
    async function loadData() {
      try {
        const [logs, chunks] = await Promise.all([
          supaGet('nta_query_log?select=*&order=created_at.desc&limit=500'),
          supaGet('nta_knowledge_chunks?select=section_hierarchy&limit=5000')
        ]);

        allLogs = logs || [];
        const chunkData = chunks || [];
        knowledgeTopics = buildKnowledgeIndex(chunkData);
        knowledgeDocNames = buildKnowledgeDocNames(chunkData);

        document.getElementById('loading').remove();

        if (allLogs.length === 0) {
          renderEmptyState();
        } else {
          renderDashboard();
        }
      } catch (err) {
        console.error('Failed to load data:', err);
        document.getElementById('loading').innerHTML =
          '<div style="color:var(--confidence-low);font-size:0.875rem;">Failed to load data. Check console for details.</div>';
      }
    }

    // ===== KNOWLEDGE INDEX =====
    function buildKnowledgeIndex(chunks) {
      const index = {};
      for (const c of chunks) {
        const hier = c.section_hierarchy;
        if (!hier || !Array.isArray(hier)) continue;
        const area = (hier[0] || '').toLowerCase();
        const topic = (hier[1] || '').toLowerCase();
        const key = topic || area;
        if (key) index[key] = (index[key] || 0) + 1;
      }
      return index;
    }

    function buildKnowledgeDocNames(chunks) {
      const names = new Set();
      for (const c of chunks) {
        const hier = c.section_hierarchy;
        if (hier && Array.isArray(hier) && hier.length > 0) {
          // Use first element as a doc-level grouping
          names.add(hier[0]);
        }
      }
      return names;
    }

    function fuzzySupplyForCategory(category) {
      const keywords = CATEGORY_KEYWORDS[category];
      if (!keywords) return 0;
      let total = 0;
      for (const [key, count] of Object.entries(knowledgeTopics)) {
        for (const kw of keywords) {
          if (key.includes(kw)) {
            total += count;
            break; // count each knowledge key once per category
          }
        }
      }
      return total;
    }

    // ===== RENDER EMPTY STATE =====
    function renderEmptyState() {
      document.getElementById('main').innerHTML = `
        <div class="empty-state">
          <div class="empty-state-title">No questions yet</div>
          <div class="empty-state-text">
            Once users start chatting with NTA Bot, their questions and topic trends will appear here.
          </div>
        </div>`;
    }

    // ===== RENDER DASHBOARD =====
    // Tooltip toggle
    function toggleInfo(btn) {
      // Close any other open tooltips first
      document.querySelectorAll('.info-btn.open').forEach(b => {
        if (b !== btn) b.classList.remove('open');
      });
      btn.classList.toggle('open');
    }
    // Close tooltips on click outside
    document.addEventListener('click', (e) => {
      if (!e.target.closest('.info-btn')) {
        document.querySelectorAll('.info-btn.open').forEach(b => b.classList.remove('open'));
      }
    });

    // Section info helper — creates title + info button
    function sectionHeader(title, subtitle, tooltip) {
      return `
        <div class="section-header">
          <div>
            <span class="section-title">${title}</span>
            <button class="info-btn" onclick="event.stopPropagation(); toggleInfo(this)">?<div class="info-tooltip">${tooltip}</div></button>
          </div>
          ${subtitle ? `<div class="section-subtitle">${subtitle}</div>` : ''}
        </div>`;
    }

    function renderDashboard() {
      const main = document.getElementById('main');
      main.innerHTML = '';

      // Disconnect old observer
      if (tableObserver) {
        tableObserver.disconnect();
        tableObserver = null;
      }

      // Hero
      const hero = document.createElement('div');
      hero.className = 'dash-hero';
      hero.innerHTML = `
        <h2>NTA Bot Insights</h2>
        <p>Track what your team is asking, discover trending topics, see which content gets cited most, and identify opportunities for new podcast episodes and curriculum development.</p>`;
      main.appendChild(hero);

      const filtered = getFilteredLogs();

      // Active filter bar (shown at top when a filter is active)
      if (filterState.type) {
        renderActiveFilter(main);
      }

      renderStats(main, filtered);
      renderTopicGapAnalysis(main, filtered);
      renderTrending(main, filtered);
      renderSourceUsage(main, filtered);
      renderSessionReplay(main, filtered);
      renderDataTable(main, filtered);
    }

    // ===== ACTIVE FILTER BAR =====
    function renderActiveFilter(container) {
      const bar = document.createElement('div');
      bar.className = 'active-filter-bar';
      const typeLabels = {
        'topic_category': 'Category',
        'topic_label': 'Topic',
        'confidence': 'Confidence',
        'source_document': 'Source',
        'source_type': 'Source Type',
        'session_id': 'Session'
      };
      bar.innerHTML = `
        <span class="filter-label">${escapeHtml(typeLabels[filterState.type] || filterState.type)}:</span>
        <span class="filter-value">${escapeHtml(filterState.label || filterState.value)}</span>
        <button class="filter-clear" onclick="clearFilter()">Clear</button>`;
      container.appendChild(bar);
    }

    // ===== 1. STATS =====
    function renderStats(container, filtered) {
      const total = filtered.length;
      const sessions = new Set(filtered.map(r => r.session_id).filter(Boolean)).size;

      const highCount = filtered.filter(r => (r.confidence_level || '').toLowerCase() === 'high').length;
      const medCount = filtered.filter(r => (r.confidence_level || '').toLowerCase() === 'medium').length;
      const lowCount = filtered.filter(r => (r.confidence_level || '').toLowerCase() === 'low' || !r.confidence_level).length;

      const latencies = filtered.map(r => r.latency_ms).filter(v => v != null && v > 0);
      const avgLatency = latencies.length > 0 ? (latencies.reduce((a, b) => a + b, 0) / latencies.length / 1000).toFixed(1) : '--';

      // Source type counts
      let webOnly = 0, podcastOnly = 0, bothCount = 0;
      for (const r of filtered) {
        const types = r.source_types || [];
        const hasWeb = types.includes('Web');
        const hasPod = types.includes('Podcast');
        if (hasWeb && hasPod) bothCount++;
        else if (hasWeb) webOnly++;
        else if (hasPod) podcastOnly++;
      }

      const isConfFilter = filterState.type === 'confidence';

      const section = document.createElement('div');
      section.className = 'section';
      section.innerHTML = sectionHeader(
        'Overview',
        null,
        '<strong>What:</strong> Key metrics at a glance — total questions, unique sessions, confidence breakdown, and average response time.<br><br><strong>How:</strong> Every question asked to NTA Bot is logged with its confidence level, source types, and response latency. These cards summarize the data in real time.<br><br><strong>Why:</strong> Click the confidence cards to filter the entire dashboard to just High, Medium, or Low confidence answers. The source type pills show whether answers come from web docs, podcast content, or both.'
      ) + `
        <div class="stats-row">
          <div class="stat-card">
            <div class="stat-value">${total.toLocaleString()}</div>
            <div class="stat-label">Total Questions</div>
          </div>
          <div class="stat-card">
            <div class="stat-value">${sessions.toLocaleString()}</div>
            <div class="stat-label">Unique Sessions</div>
          </div>
          <div class="stat-card clickable conf-high${isConfFilter && filterState.value === 'high' ? ' active' : ''}" onclick="applyFilter('confidence','high','High Confidence')">
            <div class="stat-value">${highCount}</div>
            <div class="stat-label">High Confidence</div>
          </div>
          <div class="stat-card clickable conf-medium${isConfFilter && filterState.value === 'medium' ? ' active' : ''}" onclick="applyFilter('confidence','medium','Medium Confidence')">
            <div class="stat-value">${medCount}</div>
            <div class="stat-label">Medium Confidence</div>
          </div>
          <div class="stat-card clickable conf-low${isConfFilter && filterState.value === 'low' ? ' active' : ''}" onclick="applyFilter('confidence','low','Low Confidence')">
            <div class="stat-value">${lowCount}</div>
            <div class="stat-label">Low Confidence</div>
          </div>
          <div class="stat-card">
            <div class="stat-value">${avgLatency}${avgLatency !== '--' ? 's' : ''}</div>
            <div class="stat-label">Avg Latency</div>
          </div>
        </div>
        <div class="source-pills">
          <div class="source-pill${filterState.type === 'source_type' && filterState.value === 'Web' ? ' active' : ''}" onclick="applyFilter('source_type','Web','Web Sources')">
            <span class="sp-dot web"></span>
            Web: ${webOnly}
          </div>
          <div class="source-pill${filterState.type === 'source_type' && filterState.value === 'Podcast' ? ' active' : ''}" onclick="applyFilter('source_type','Podcast','Podcast Sources')">
            <span class="sp-dot podcast"></span>
            Podcast: ${podcastOnly}
          </div>
          <div class="source-pill${filterState.type === 'source_type' && filterState.value === 'both' ? ' active' : ''}" onclick="applyFilter('source_type','both','Web + Podcast Sources')">
            <span class="sp-dot both"></span>
            Both: ${bothCount}
          </div>
        </div>`;
      container.appendChild(section);
    }

    // ===== 2. CONTENT GAPS =====

    // ===== 3. TOPIC GAP ANALYSIS =====
    function renderTopicGapAnalysis(container, filtered) {
      const demandMap = {};
      for (const r of filtered) {
        const cat = r.topic_category || 'Uncategorized';
        demandMap[cat] = (demandMap[cat] || 0) + 1;
      }

      const rows = [];
      const maxDemand = Math.max(...Object.values(demandMap), 1);

      for (const [category, demand] of Object.entries(demandMap)) {
        const supply = fuzzySupplyForCategory(category);
        const gapScore = demand - (supply / 10);
        rows.push({ category, demand, supply, gapScore });
      }

      rows.sort((a, b) => b.gapScore - a.gapScore);

      const section = document.createElement('div');
      section.className = 'section';

      let inner = sectionHeader(
        'Topic Demand vs Coverage',
        'Question frequency compared to knowledge base content',
        '<strong>What:</strong> Compares how often each topic is asked about (demand) against how much content exists in the knowledge base (supply).<br><br><strong>How:</strong> Topics are grouped into broad categories. Supply is estimated by matching category keywords against the knowledge base\'s section hierarchy.<br><br><strong>Why:</strong> High demand + low supply = an underserved topic that may need more content — a great signal for new podcast episodes or curriculum additions.'
      );

      if (rows.length === 0) {
        inner += '<div class="muted-message">No topic data available yet.</div>';
      } else {
        inner += `
          <div class="gap-table">
            <div class="gap-table-header">
              <div>Category</div>
              <div>Demand</div>
              <div>Supply</div>
              <div>Status</div>
            </div>`;

        for (const r of rows) {
          const barPct = Math.round((r.demand / maxDemand) * 100);
          let badgeClass, badgeLabel;
          if (r.gapScore > 5) { badgeClass = 'high'; badgeLabel = 'High Gap'; }
          else if (r.gapScore > 1) { badgeClass = 'medium'; badgeLabel = 'Low Coverage'; }
          else { badgeClass = 'covered'; badgeLabel = 'Covered'; }

          const escapedCat = escapeHtml(r.category);

          inner += `
            <div class="gap-table-row" onclick="applyFilter('topic_category', '${r.category.replace(/'/g, "\\'")}', '${escapedCat}')">
              <div class="gap-table-topic">${escapedCat}</div>
              <div class="demand-bar-wrapper">
                <div class="demand-bar-track">
                  <div class="demand-bar" style="width:${barPct}%"></div>
                </div>
                <span class="demand-count">${r.demand}</span>
              </div>
              <div class="supply-label">${r.supply} chunk${r.supply !== 1 ? 's' : ''}</div>
              <div><span class="gap-badge ${badgeClass}">${badgeLabel}</span></div>
            </div>`;
        }

        inner += '</div>';
      }

      section.innerHTML = inner;
      container.appendChild(section);
    }

    // ===== 4. TRENDING THIS WEEK =====
    function renderTrending(container, filtered) {
      const now = new Date();
      const oneWeekAgo = new Date(now.getTime() - 7 * 86400000);
      const twoWeeksAgo = new Date(now.getTime() - 14 * 86400000);

      const thisWeek = {};
      const lastWeek = {};

      for (const r of filtered) {
        const cat = r.topic_category;
        if (!cat) continue;
        const d = new Date(r.created_at);
        if (d >= oneWeekAgo) {
          thisWeek[cat] = (thisWeek[cat] || 0) + 1;
        } else if (d >= twoWeeksAgo && d < oneWeekAgo) {
          lastWeek[cat] = (lastWeek[cat] || 0) + 1;
        }
      }

      const pills = [];
      for (const [cat, count] of Object.entries(thisWeek)) {
        const prev = lastWeek[cat] || 0;
        let badge = '';
        if (prev === 0) badge = 'new';
        else if (count > prev) badge = 'trending';
        pills.push({ cat, count, badge });
      }

      pills.sort((a, b) => b.count - a.count);

      const section = document.createElement('div');
      section.className = 'section';

      let inner = sectionHeader(
        'Trending This Week',
        'Week-over-week topic comparison',
        '<strong>What:</strong> Shows which topic categories are being asked about this week, and whether they\'re new or increasing.<br><br><strong>How:</strong> Compares the last 7 days against the previous 7 days. "New" means the topic didn\'t appear at all in the prior week. "Trending" means it\'s asked more frequently than before.<br><br><strong>Why:</strong> Spotting emerging interests early helps you create timely content. Click any topic to filter the table below.'
      );

      if (pills.length === 0) {
        inner += '<div class="muted-message">No activity in the last 7 days.</div>';
      } else {
        inner += '<div class="trending-pills">';
        for (const p of pills) {
          let badgeHtml = '';
          if (p.badge === 'new') badgeHtml = '<span class="badge badge-new">New</span>';
          else if (p.badge === 'trending') badgeHtml = '<span class="badge badge-trending">&#8593; Trending</span>';

          inner += `
            <div class="trending-pill" onclick="applyFilter('topic_category', '${p.cat.replace(/'/g, "\\'")}', '${escapeHtml(p.cat)}')">
              <span style="color:${topicColor(p.cat)}">${escapeHtml(p.cat)}</span>
              <span class="count">${p.count}</span>
              ${badgeHtml}
            </div>`;
        }
        inner += '</div>';
      }

      section.innerHTML = inner;
      container.appendChild(section);
    }

    // ===== 5. SOURCE USAGE =====
    function renderSourceUsage(container, filtered) {
      // Flatten all source_documents
      const docCounts = {};
      for (const r of filtered) {
        const docs = r.source_documents || [];
        for (const doc of docs) {
          docCounts[doc] = (docCounts[doc] || 0) + 1;
        }
      }

      const ranked = Object.entries(docCounts)
        .sort((a, b) => b[1] - a[1])
        .slice(0, 15);

      const maxCount = ranked.length > 0 ? ranked[0][1] : 1;

      // "Never cited" — knowledge base docs that never appear in any log
      const allCitedDocs = new Set();
      for (const r of allLogs) {
        for (const doc of (r.source_documents || [])) {
          allCitedDocs.add(doc);
        }
      }
      const neverCited = [...knowledgeDocNames].filter(d => !allCitedDocs.has(d)).length;

      const section = document.createElement('div');
      section.className = 'section';

      let inner = sectionHeader(
        'Source Usage',
        'Most-cited documents across answers',
        '<strong>What:</strong> Shows which reference documents and podcast episodes the bot cites most frequently when answering questions.<br><br><strong>How:</strong> Every answer cites specific source documents. This section counts how many times each document appears across all answers.<br><br><strong>Why:</strong> Reveals which content is doing the heavy lifting and which episodes or documents are never referenced — helping prioritize content updates. Click any document to filter the table.'
      );

      if (ranked.length === 0) {
        inner += '<div class="muted-message">No source citations recorded yet.</div>';
      } else {
        inner += '<div class="source-list">';
        for (const [docName, count] of ranked) {
          const barPct = Math.round((count / maxCount) * 100);
          const isPodcast = /^Ep\b|^EP\b/.test(docName);
          const typeClass = isPodcast ? 'podcast' : 'web';
          const typeLabel = isPodcast ? 'Podcast' : 'Web';
          const escapedName = escapeHtml(docName);
          const truncName = escapeHtml(truncate(docName, 40));

          inner += `
            <div class="source-row" onclick="applyFilter('source_document', '${docName.replace(/'/g, "\\'")}', '${truncName}')">
              <div class="source-row-name" title="${escapedName}">${escapedName}</div>
              <div class="source-bar-track">
                <div class="source-bar" style="width:${barPct}%"></div>
              </div>
              <div class="source-row-count">${count}</div>
              <div><span class="source-type-badge ${typeClass}">${typeLabel}</span></div>
            </div>`;
        }

        if (neverCited > 0) {
          inner += `<div class="never-cited-note">${neverCited} knowledge base section${neverCited !== 1 ? 's' : ''} never cited in any answer</div>`;
        }

        inner += '</div>';
      }

      section.innerHTML = inner;
      container.appendChild(section);
    }

    // ===== 6. SESSION REPLAY =====
    function renderSessionReplay(container, filtered) {
      // Group by session_id
      const sessionMap = {};
      for (const r of filtered) {
        const sid = r.session_id;
        if (!sid) continue;
        if (!sessionMap[sid]) sessionMap[sid] = [];
        sessionMap[sid].push(r);
      }

      // Only multi-question sessions, sorted by most recent first
      const multiSessions = Object.entries(sessionMap)
        .filter(([, items]) => items.length >= 2)
        .map(([sid, items]) => {
          items.sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
          return { sid, items, firstTime: new Date(items[0].created_at) };
        })
        .sort((a, b) => b.firstTime - a.firstTime)
        .slice(0, 10);

      const section = document.createElement('div');
      section.className = 'section';

      let inner = sectionHeader(
        'Session Replay',
        'Multi-question conversations with user profiles',
        '<strong>What:</strong> Shows sessions where a user asked 2 or more questions, revealing their research journey and interests.<br><br><strong>How:</strong> Questions are grouped by session ID. Each card shows the user\'s device, location, topic progression, and session duration.<br><br><strong>Why:</strong> Understanding how users explore topics reveals deeper intent than individual questions. Click a session to filter the table to just that conversation.'
      );

      if (multiSessions.length === 0) {
        inner += '<div class="muted-message">No multi-question sessions found.</div>';
      } else {
        inner += '<div class="session-list">';

        for (const sess of multiSessions) {
          const categories = [];
          const seen = new Set();
          for (const r of sess.items) {
            const cat = r.topic_category || 'General';
            if (!seen.has(cat)) { seen.add(cat); categories.push(cat); }
          }
          const breadcrumb = categories.map(c => escapeHtml(c)).join(' &#8594; ');
          const cardId = 'sess-' + sess.sid.replace(/[^a-zA-Z0-9]/g, '').slice(-16);

          // User profile from first row (device info is same across session)
          const first = sess.items[0];
          const last = sess.items[sess.items.length - 1];
          const loc = [first.city, first.country].filter(Boolean).join(', ') || 'Unknown location';
          const device = first.device_type || 'Unknown';
          const browser = first.browser || 'Unknown';
          const os = first.os || 'Unknown';
          const screen = first.screen_resolution || '—';
          const startTime = new Date(first.created_at);
          const endTime = new Date(last.created_at);
          const durationMs = endTime - startTime;
          const durationMin = Math.max(1, Math.round(durationMs / 60000));

          // Topic frequency in this session
          const topicCounts = {};
          for (const r of sess.items) {
            const cat = r.topic_category || 'General';
            topicCounts[cat] = (topicCounts[cat] || 0) + 1;
          }
          const topTopic = Object.entries(topicCounts).sort((a, b) => b[1] - a[1])[0];

          // Confidence distribution
          const confCounts = { High: 0, Medium: 0, Low: 0 };
          for (const r of sess.items) {
            const c = r.confidence_level || 'Medium';
            confCounts[c] = (confCounts[c] || 0) + 1;
          }

          // Date/time formatted
          const dateStr = startTime.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
          const timeStr = startTime.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });

          inner += `
            <div class="session-card" id="${cardId}">
              <div class="session-card-header" onclick="document.getElementById('${cardId}').classList.toggle('expanded')">
                <span class="session-qcount">${sess.items.length}Q</span>
                <div class="session-meta">
                  <div class="session-breadcrumb">${breadcrumb}</div>
                  <div class="session-time">${relativeTime(first.created_at)}</div>
                </div>
                <svg class="session-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>
              </div>
              <div class="session-detail">
                <div class="session-profile">
                  <div class="profile-grid">
                    <div class="profile-item">
                      <span class="profile-icon">📅</span>
                      <div><strong>${dateStr}</strong> at ${timeStr}</div>
                    </div>
                    <div class="profile-item">
                      <span class="profile-icon">⏱️</span>
                      <div><strong>${durationMin} min</strong> session, ${sess.items.length} questions</div>
                    </div>
                    <div class="profile-item">
                      <span class="profile-icon">📍</span>
                      <div><strong>${escapeHtml(loc)}</strong></div>
                    </div>
                    <div class="profile-item">
                      <span class="profile-icon">💻</span>
                      <div><strong>${escapeHtml(device)}</strong> &middot; ${escapeHtml(browser)} &middot; ${escapeHtml(os)}</div>
                    </div>
                    <div class="profile-item">
                      <span class="profile-icon">📐</span>
                      <div>${escapeHtml(screen)}</div>
                    </div>
                    <div class="profile-item">
                      <span class="profile-icon">🎯</span>
                      <div>Top topic: <strong>${escapeHtml(topTopic[0])}</strong> (${topTopic[1]} questions)</div>
                    </div>
                  </div>
                  <div class="profile-confidence">
                    ${confCounts.High ? `<span class="conf-pill conf-high">${confCounts.High} High</span>` : ''}
                    ${confCounts.Medium ? `<span class="conf-pill conf-medium">${confCounts.Medium} Medium</span>` : ''}
                    ${confCounts.Low ? `<span class="conf-pill conf-low">${confCounts.Low} Low</span>` : ''}
                  </div>
                </div>
                <button class="session-table-btn" onclick="event.stopPropagation(); applyFilter('session_id', '${sess.sid.replace(/'/g, "\\'")}', 'Session')">View all questions in table ↓</button>
              </div>
            </div>`;
        }

        inner += '</div>';
      }

      section.innerHTML = inner;
      container.appendChild(section);
    }

    // ===== 7. DATA TABLE =====
    function renderDataTable(container, filtered) {
      const sorted = getSortedLogs(filtered);

      const section = document.createElement('div');
      section.className = 'section';
      section.id = 'data-table-section';

      let tableHeader = sectionHeader(
        'All Questions',
        null,
        '<strong>What:</strong> A complete log of every question asked, with full metadata.<br><br><strong>How:</strong> Every question is logged automatically with its topic, confidence level, sources cited, user location, and device info. Click column headers to sort. Use the search box to find specific questions.<br><br><strong>Why:</strong> The raw data behind all the analytics above. Click any topic pill or source tag in the expanded rows to filter across the entire dashboard.'
      );

      // Controls
      let controlsHtml = tableHeader + '<div class="table-controls">';

      if (filterState.type) {
        const typeLabels = {
          'topic_category': 'Category',
          'topic_label': 'Topic',
          'confidence': 'Confidence',
          'source_document': 'Source',
          'source_type': 'Source Type',
          'session_id': 'Session'
        };
        controlsHtml += `
          <div class="table-filter-pill">
            ${escapeHtml(typeLabels[filterState.type] || filterState.type)}: ${escapeHtml(filterState.label || filterState.value)}
            <button onclick="clearFilter()">&times;</button>
          </div>`;
      }

      controlsHtml += `
        <input type="text" class="table-search" placeholder="Search questions, topics, answers..."
          value="${escapeHtml(searchQuery)}"
          oninput="handleSearch(this.value)">
        <span class="table-row-count">Showing <span id="dt-shown">0</span> of ${sorted.length}</span>
      </div>`;

      // Sort arrows helper
      function sortIndicator(field) {
        if (sortField !== field) return '';
        return sortDir === 'asc' ? ' <span class="sort-arrow">&#9650;</span>' : ' <span class="sort-arrow">&#9660;</span>';
      }

      function sortedClass(field) {
        return sortField === field ? ' sorted' : '';
      }

      controlsHtml += `
        <div class="data-table">
          <div class="dt-header">
            <div class="dt-header-cell${sortedClass('created_at')}" onclick="setSort('created_at')">Time${sortIndicator('created_at')}</div>
            <div class="dt-header-cell${sortedClass('topic_category')}" onclick="setSort('topic_category')">Topic${sortIndicator('topic_category')}</div>
            <div class="dt-header-cell${sortedClass('question')}" onclick="setSort('question')">Question${sortIndicator('question')}</div>
            <div class="dt-header-cell${sortedClass('confidence_level')}" onclick="setSort('confidence_level')">Confidence${sortIndicator('confidence_level')}</div>
            <div class="dt-header-cell${sortedClass('source_count')}" onclick="setSort('source_count')">Src${sortIndicator('source_count')}</div>
            <div class="dt-header-cell${sortedClass('city')}" onclick="setSort('city')">Location${sortIndicator('city')}</div>
          </div>
          <div id="dt-body"></div>
        </div>
        <div class="sentinel" id="dt-sentinel"></div>`;

      section.innerHTML = controlsHtml;
      container.appendChild(section);

      // Store sorted data for pagination
      window._dtData = sorted;
      tableOffset = 0;
      tableDone = false;
      tableLoading = false;

      loadTablePage();

      // IntersectionObserver for infinite scroll
      const sentinel = document.getElementById('dt-sentinel');
      if (sentinel) {
        tableObserver = new IntersectionObserver(entries => {
          if (entries[0].isIntersecting && !tableLoading && !tableDone) {
            loadTablePage();
          }
        }, { rootMargin: '200px' });
        tableObserver.observe(sentinel);
      }
    }

    function loadTablePage() {
      if (tableLoading || tableDone) return;
      tableLoading = true;

      const data = window._dtData || [];
      const page = data.slice(tableOffset, tableOffset + TABLE_PAGE);

      if (!page || page.length === 0) {
        tableDone = true;
        tableLoading = false;
        updateShownCount();
        return;
      }

      const body = document.getElementById('dt-body');
      if (!body) { tableLoading = false; return; }

      for (const r of page) {
        appendTableRow(body, r);
      }

      tableOffset += page.length;
      if (page.length < TABLE_PAGE) tableDone = true;
      tableLoading = false;
      updateShownCount();
    }

    function updateShownCount() {
      const el = document.getElementById('dt-shown');
      if (el) el.textContent = tableOffset;
    }

    function appendTableRow(body, r) {
      const cat = r.topic_category || 'General';
      const conf = confidenceClass(r.confidence_level);
      const confLabel = r.confidence_level || 'Low';
      const loc = [r.city, r.country].filter(Boolean).join(', ');

      const row = document.createElement('div');
      row.className = 'dt-row';
      row.innerHTML = `
        <div class="dt-row-time">${relativeTime(r.created_at)}</div>
        <div><span class="dt-topic-pill" style="background:${topicColor(cat)}" title="${escapeHtml(cat)}">${escapeHtml(truncate(cat, 16))}</span></div>
        <div class="dt-question" title="${escapeHtml(r.question)}">${escapeHtml(truncate(r.question, 120))}</div>
        <div class="dt-confidence"><span class="confidence-dot ${conf}"></span> ${escapeHtml(confLabel)}</div>
        <div class="dt-src">${r.source_count != null ? r.source_count : '-'}</div>
        <div class="dt-location">${escapeHtml(loc) || '-'}</div>`;

      row.addEventListener('click', () => {
        row.classList.toggle('expanded');
      });

      body.appendChild(row);

      // Expanded detail
      const expanded = document.createElement('div');
      expanded.className = 'dt-expanded';

      const sources = r.source_documents || [];
      const sourceTypes = r.source_types || [];

      let expHtml = '';

      // Answer summary
      expHtml += '<div class="dt-exp-label">Answer Summary</div>';
      expHtml += '<div class="dt-exp-text">' + (r.answer_summary ? escapeHtml(r.answer_summary) : '<em style="color:var(--text-muted)">No summary recorded</em>') + '</div>';

      // Subtopic
      if (r.topic_label) {
        expHtml += '<div class="dt-exp-label">Subtopic</div>';
        expHtml += '<div class="dt-exp-text">' + escapeHtml(r.topic_label) + '</div>';
      }

      // Source documents
      if (sources.length > 0) {
        expHtml += '<div class="dt-exp-label">Source Documents</div>';
        expHtml += '<div class="dt-exp-tags">';
        for (const s of sources) {
          const truncS = escapeHtml(truncate(s, 40));
          expHtml += `<span class="dt-exp-tag" onclick="event.stopPropagation(); applyFilter('source_document', '${s.replace(/'/g, "\\'")}', '${truncS}')">${escapeHtml(s)}</span>`;
        }
        expHtml += '</div>';
      }

      // Source types + latency
      expHtml += '<div class="dt-exp-meta">';
      if (sourceTypes.length > 0) {
        for (const t of sourceTypes) {
          const cls = t === 'Podcast' ? 'podcast' : 'web';
          expHtml += `<span class="dt-exp-pill ${cls}">${escapeHtml(t)}</span>`;
        }
      }
      if (r.latency_ms) {
        expHtml += `<span class="dt-exp-latency">${r.latency_ms.toLocaleString()}ms</span>`;
      }
      expHtml += '</div>';

      expanded.innerHTML = expHtml;
      body.appendChild(expanded);
    }

    // ===== SEARCH DEBOUNCE =====
    let searchTimer = null;

    function handleSearch(value) {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => {
        searchQuery = value.trim();
        renderDashboard();
      }, 300);
    }

    // ===== INIT =====
    loadData();
  </script>
</body>
</html>
